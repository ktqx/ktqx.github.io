<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🥚 幸运砸金蛋</title>
  <style>
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:     #f7b801;
      --dark-bg:         #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
      --big-prize:       #ff4d4f;
      --mid-prize:       #faad14;
      --small-prize:     #52c41a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      padding-top: 85px;
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 850px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    /* ===== 标题区 ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .config-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-input {
      width: 80px;
      padding: 10px 8px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      text-align: center;
      transition: all 0.3s ease;
    }

    .config-input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 15px rgba(247, 184, 1, 0.3);
    }

    /* ===== 核心操作按钮 ===== */
    .btn-spin {
      width: 200px;
      margin: 0 auto 25px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
      display: block;
    }

    .btn-spin:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
    }

    .btn-spin:active {
      transform: scale(0.98);
    }

    /* ===== 游戏数据统计 ===== */
    .stats {
      margin: 15px 0;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 40px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 10px;
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.4rem;
      text-shadow: 0 0 10px rgba(247, 184, 1, 0.3);
    }

    /* ===== 金蛋矩阵区域 ===== */
    .egg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      perspective: 1000px;
      margin: 25px 0;
      padding: 10px;
      justify-content: center;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 单个金蛋容器 */
    .egg-container {
      width: 100%;
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
    }

    .egg-container:hover:not(.smashed) {
      transform: translateY(-8px) scale(1.05);
    }

    .egg-container.smashed {
      cursor: default;
    }

    /* 3D立体金蛋 */
    .egg {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 35% 30%, #fff380 0%, #f7b801 50%, #cc9900 85%, #664400 100%);
      border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
      box-shadow: 
        inset -6px -12px 25px rgba(0,0,0,0.3),
        inset 4px 8px 12px rgba(255,255,255,0.6),
        0 15px 25px rgba(0, 0, 0, 0.5);
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      transition: all 0.3s ease;
    }

    .egg-container:hover:not(.smashed) .egg {
      transform: translateY(-10px) scale(1.05) rotate(2deg);
      box-shadow: 
        inset -6px -12px 25px rgba(0,0,0,0.3),
        inset 4px 8px 12px rgba(255,255,255,0.6),
        0 25px 35px rgba(247, 184, 1, 0.3);
    }

    /* 金蛋阴影 */
    .egg-shadow {
      position: absolute;
      bottom: 5px;
      width: 80%;
      height: 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      filter: blur(3px);
      z-index: 1;
      transition: transform 0.3s;
    }

    .egg-container:hover:not(.smashed) .egg-shadow {
      transform: scale(0.8);
      background: rgba(0, 0, 0, 0.4);
    }

    /* 破裂后的金蛋 */
    .egg.broken {
      background: none;
      box-shadow: none;
      animation: crackDown 0.6s ease-out forwards;
    }

    @keyframes crackDown {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: translateY(10px) scaleY(0.8); opacity: 1; }
      100% { transform: translateY(20px) scaleY(0.6); opacity: 0; pointer-events: none; }
    }

    /* 破裂后的蛋壳残余 */
    .egg.broken::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 7px;
      width: 90%;
      height: 40px;
      background: radial-gradient(circle at 50% 100%, #f7b801 20%, #cc9900 80%);
      clip-path: polygon(0% 100%, 100% 100%, 95% 40%, 80% 60%, 65% 20%, 50% 50%, 35% 15%, 20% 55%, 5% 30%);
    }

    /* 碎片 */
    .egg-fragment {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }

    @keyframes fragment-fly {
      0% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.3); opacity: 0; }
    }

    /* 奖金显示标签 */
    .prize-label {
      position: absolute;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #ff4d4f, #cf1322);
      padding: 8px 12px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.3);
      transform: scale(0);
      z-index: 3;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.4);
    }

    .egg-container.smashed .prize-label {
      transform: scale(1);
    }

    /* 未砸金蛋的灰色透视样式 */
    .egg-container.dimmed .egg {
      background: radial-gradient(circle at 35% 30%, rgba(200, 200, 200, 0.6) 0%, rgba(150, 150, 150, 0.6) 50%, rgba(100, 100, 100, 0.6) 85%, rgba(60, 60, 60, 0.6) 100%);
      opacity: 0.6;
    }

    .egg-container.dimmed:hover .egg {
      transform: none;
      box-shadow: 
        inset -6px -12px 25px rgba(0,0,0,0.3),
        inset 4px 8px 12px rgba(255,255,255,0.3),
        0 15px 25px rgba(0, 0, 0, 0.3);
    }

    /* 状态与结果展示 */
    .status-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-align: center;
      min-height: 35px;
      margin-top: 15px;
    }

    /* ===== 响应式适配 ===== */
    @media (max-width: 1024px) {
      .egg-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
    }

    @media (max-width: 768px) {
      body { padding-top: 75px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .title { font-size: 1.6rem; }
      
      /* 平板端配置面板 */
      .config-panel { 
        gap: 12px;
        padding: 12px;
      }
      
      .config-input {
        width: 70px;
      }
      
      .btn-spin { width: 180px; }
      
      /* 平板端金蛋：3个一行 */
      .egg-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px;
        max-width: 100%;
      }
      .egg { font-size: 2rem; }
    }

    @media (max-width: 480px) {
      body { padding: 70px 10px 15px; }
      .navbar-nav { display: none; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      
      /* 手机端配置面板 */
      .config-panel {
        gap: 10px;
        padding: 10px;
      }
      
      .config-group {
        flex: 1 1 40%;
        align-items: center;
      }

      .config-input {
        width: 65px;
        font-size: 0.85rem;
      }
      
      .config-label {
        font-size: 0.75rem;
      }
      
      .btn-spin {
        width: 160px;
        font-size: 1rem;
        padding: 10px 15px;
        letter-spacing: 1px;
      }
      
      /* 手机端金蛋：3个一行 */
      .egg-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 10px;
        max-width: 100%;
      }
      .egg { font-size: 1.5rem; }
      .stats { gap: 15px; font-size: 0.95rem; }
      .stat-val { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 飞镖轮盘</a>
      <a href="golden-egg.html" class="active">🥚 砸金蛋</a>

    </div>

  <div class="container">
    <div class="header">
      <div class="title">🥚 幸运砸金蛋</div>
    </div>

    <div class="config-panel">
      <div class="config-group">
        <label class="config-label">促销总额 (元)</label>
        <input type="number" id="totalAmount" class="config-input" value="50" min="1">
      </div>
      <div class="config-group">
        <label class="config-label">最小金额</label>
        <input type="number" id="minAmount" class="config-input" value="2" step="0.1">
      </div>
      <div class="config-group">
        <label class="config-label">最大金额</label>
        <input type="number" id="maxAmount" class="config-input" value="20" step="0.1">
      </div>
      <div class="config-group">
        <label class="config-label">金蛋总数</label>
        <input type="number" id="eggCount" class="config-input" value="8" min="3" max="30">
      </div>
      <div class="config-group">
        <label class="config-label">可砸蛋数</label>
        <input type="number" id="limitCount" class="config-input" value="3" min="1">
      </div>
    </div>

    <button class="btn-spin" onclick="initGame()">重新开始</button>

    <div class="stats">
      <div>剩余机会: <span id="remainingSmashes" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div id="eggGrid" class="egg-grid"></div>

    <div class="status-text" id="statusText">请点击上方按钮初始化或开始砸蛋</div>
  </div>

  <script>
    // 音频上下文
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      if (type === 'smash') {
        // 砸蛋音效 - 重锤敲击
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'crack') {
        // 碎裂音效
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'end') {
        // 游戏结束音效
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }
    }

    let gameState = {
      prizes: [],
      remainingSmashes: 0,
      wonAmount: 0,
      isProcessing: false,
      maxAmount: 0,
      minAmount: 0
    };

    // 智能随机总额算法分配
    function distributePrizes(count, total, min, max) {
      if (count * min > total) {
        showToast("❌ 失败：总额不足以支撑当前最小金额设定");
        return null;
      }
      if (count * max < total) {
        showToast("❌ 失败：总额超出了最大金额设定的上限");
        return null;
      }

      let result = [];
      let remaining = total;
      
      for (let i = 0; i < count - 1; i++) {
        let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
        let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
        
        let amount = Math.random() * (currentMax - currentMin) + currentMin;
        amount = Math.round(amount * 100) / 100;
        
        result.push(amount);
        remaining -= amount;
      }
      
      result.push(Math.round(remaining * 100) / 100);
      
      // 经典洗牌算法打乱
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      
      return result;
    }

    function initGame() {
      const eggCount = parseInt(document.getElementById('eggCount').value) || 8;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 50;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 2;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 20;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      const prizes = distributePrizes(eggCount, totalAmount, minAmount, maxAmount);
      if (!prizes) return;

      gameState.prizes = prizes;
      gameState.remainingSmashes = Math.min(limitCount, eggCount);
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      document.getElementById('statusText').textContent = `游戏就绪！请挑选并砸开您的幸运金蛋吧 👇`;
      updateStats();
      renderEggs();
    }

    function renderEggs() {
      const grid = document.getElementById('eggGrid');
      grid.innerHTML = '';
      
      gameState.prizes.forEach((prize, index) => {
        const container = document.createElement('div');
        container.className = 'egg-container';
        container.id = `egg-${index}`;
        container.onclick = () => smashEgg(index, container);
        
        container.innerHTML = `
          <div class="egg-shadow"></div>
          <div class="egg">🥚</div>
          <div class="prize-label">￥${prize.toFixed(2)}</div>
        `;
        grid.appendChild(container);
      });
    }

    function smashEgg(index, container) {
      if (gameState.remainingSmashes <= 0 || gameState.isProcessing) return;
      if (container.classList.contains('smashed')) return;

      gameState.isProcessing = true;
      playSound('smash');
      setTimeout(() => playSound('crack'), 50);
      
      const eggEl = container.querySelector('.egg');
      eggEl.classList.add('broken');
      container.classList.add('smashed');
      
      // 创建碎片飞溅效果
      createFragments(eggEl, container);
      
      gameState.remainingSmashes--;
      gameState.wonAmount += gameState.prizes[index];
      updateStats();
      
      // 控制状态延时
      setTimeout(() => {
        gameState.isProcessing = false;
        
        // 当砸蛋次数耗尽时触发游戏结束与透视效果
        if (gameState.remainingSmashes === 0) {
          endGameAndRevealOthers();
        }
      }, 300);
    }

    // 创建碎片飞溅效果
    function createFragments(eggEl, container) {
      const rect = eggEl.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      for (let i = 0; i < 12; i++) {
        const frag = document.createElement('div');
        frag.className = 'egg-fragment';
        const size = Math.random() * 15 + 5;
        frag.style.width = size + 'px';
        frag.style.height = size + 'px';
        frag.style.background = 'radial-gradient(circle at 35% 30%, #fff380, #f7b801)';
        frag.style.left = centerX + 'px';
        frag.style.top = centerY + 'px';
        frag.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        
        const tx = (Math.random() - 0.5) * 300;
        const ty = (Math.random() - 0.5) * 300;
        const tr = Math.random() * 720;
        
        frag.style.setProperty('--tx', `${tx}px`);
        frag.style.setProperty('--ty', `${ty}px`);
        frag.style.setProperty('--tr', `${tr}deg`);
        
        frag.style.animation = `fragment-fly ${Math.random() * 0.5 + 0.5}s ease-out forwards`;
        document.body.appendChild(frag);
        setTimeout(() => frag.remove(), 1000);
      }
    }

    // 游戏结束后灰色显示未砸金蛋
    function endGameAndRevealOthers() {
      gameState.isProcessing = true;
      document.getElementById('statusText').innerHTML = `🎉 砸蛋结束！最终共获得：<span style="color:var(--primary-color); font-size:1.4rem;">￥${gameState.wonAmount.toFixed(2)}</span> 元！`;
      playSound('end');

      // 自动翻转所有剩余未砸的金蛋
      gameState.prizes.forEach((_, index) => {
        const container = document.getElementById(`egg-${index}`);
        if (!container.classList.contains('smashed')) {
          container.classList.add('smashed', 'dimmed');
          container.onclick = null;
        }
      });
    }

    function updateStats() {
      document.getElementById('remainingSmashes').innerText = gameState.remainingSmashes;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    function showToast(msg) {
      alert(msg);
    }

    window.onload = initGame;
  </script>
</body>
</html>
