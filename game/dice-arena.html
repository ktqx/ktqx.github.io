<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎲 疯狂摇骰子 - Game Hub</title>
  <style>
    /* ===== 统一导航栏样式 (完全同步对齐 lucky-wheel.html) ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 核心配色变量 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      padding-top: 85px;
      overflow-x: hidden;
    }

    /* ===== 🔴 红包雨特效层 (在最底层飘落，绝不遮挡卡片点击) 🔴 ===== */
    .gold-rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -50px;
      font-weight: 900;
      color: rgba(247, 184, 1, 0.65);
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.3);
      user-select: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(115vh) rotate(360deg); }
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 20, 25, 0.95);
      border: 2px solid var(--accent-gold);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 0 35px rgba(247, 184, 1, 0.15), inset 0 0 15px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 20; /* 确保在雨水上方，利于看清 */
    }

    .header {
      text-align: center;
      margin-bottom: 12px;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* ===== 可变形多功能控制面板 ===== */
    .panel-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 14px;
    }

    /* 1. 默认常规配置状态 */
    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.12), rgba(255, 107, 53, 0.12));
      border: 1px solid rgba(247, 184, 1, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .config-panel.hide {
      opacity: 0;
      transform: scaleY(0);
      height: 0;
      padding: 0;
      margin: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .config-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .config-input, .config-select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(26, 35, 50, 0.9);
      border: 1.5px solid rgba(247, 184, 1, 0.2);
      border-radius: 6px;
      color: var(--light-text);
      font-size: 0.9rem;
      font-weight: 600;
      outline: none;
    }

    /* 2. 🔴 游戏结束时动态无缝滑出的“战报LED霓虹面板” 🔴 */
    .marquee-report-panel {
      width: 100%;
      background: linear-gradient(135deg, #1e1b4b 0%, #090d16 100%);
      border: 2px dashed #ff4757;
      box-shadow: 0 0 25px rgba(255, 71, 87, 0.35), inset 0 0 15px rgba(255, 71, 87, 0.15);
      border-radius: 10px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      opacity: 0;
      transform: translateY(-20px) scale(0.95);
      height: 0;
      margin: 0;
      overflow: hidden;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .marquee-report-panel.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      height: auto;
    }

    .report-item {
      text-align: center;
    }

    .report-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    .report-val-big {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(247, 184, 1, 0.7);
      line-height: 1.1;
    }
    
    .report-val-big.green {
      color: #2ed573;
      text-shadow: 0 0 15px rgba(46, 213, 115, 0.7);
    }

    /* ===== 骰子竞技舞台 ===== */
    .dice-stage {
      width: 100%;
      min-height: 160px; 
      height: auto;      
      background: radial-gradient(circle at center, #111827 0%, #090d12 100%);
      border-radius: 14px;
      border: 2px solid rgba(247, 184, 1, 0.2);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.65);
      position: relative;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      transition: height 0.3s ease; 
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .stage-head b {
      color: var(--accent-gold);
    }

    .dice-display-area {
      width: 100%;
    }

    .dice-row {
      display: flex;
      justify-content: center; 
      align-items: center;
      gap: 15px; 
      width: 100%;
      padding: 14px 0;
      border-bottom: 1px dashed rgba(247, 184, 1, 0.1);
      animation: row-appear 0.4s ease forwards;
    }
    .dice-row:last-child {
      border-bottom: none; 
    }

    @keyframes row-appear {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dice-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2px;
    }

    /* ===== 3D 骰子物理图层 ===== */
    .cube-container {
      width: 68px;
      height: 68px;
      position: relative;
      perspective: 800px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .cube-shadow {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%) scale(1);
      width: 48px;
      height: 6px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 50%;
      filter: blur(3px);
      z-index: 1;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
      z-index: 2;
      transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      transition: transform 1.4s cubic-bezier(0.2, 0.8, 0.25, 1);
    }

    @keyframes dice-impact {
      0%   { transform: translateY(-40px) scaleY(1) scaleX(1); }
      60%  { transform: translateY(0) scaleY(0.9) scaleX(1.05); }
      75%  { transform: translateY(-8px) scaleY(1.02); }
      90%  { transform: translateY(1px) scaleY(0.97); }
      100% { transform: translateY(0) scaleY(1); }
    }

    .cube.impact-effect {
      animation: dice-impact 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .cube-face {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f0f0f0 60%, #bebebe 100%);
      border: 1.5px solid #9f9f9f;
      border-radius: 10px;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.35), 0 1px 1px rgba(0, 0, 0, 0.3);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 5px;
      box-sizing: border-box;
      align-items: center;
      justify-items: center;
    }

    .face-1 { transform: rotateY(0deg)   translateZ(34px); }
    .face-6 { transform: rotateY(180deg)  translateZ(34px); }
    .face-2 { transform: rotateY(90deg)   translateZ(34px); }
    .face-5 { transform: rotateY(-90deg)  translateZ(34px); }
    .face-3 { transform: rotateX(90deg)   translateZ(34px); }
    .face-4 { transform: rotateX(-90deg)  translateZ(34px); }

    .pip {
      width: 13px;
      height: 13px;
      background-color: #151515;
      border-radius: 50%;
      box-shadow: inset 0 1px 1.5px rgba(0, 0, 0, 0.85);
    }

    .pip.red {
      background-color: #d90429 !important;
      box-shadow: inset 0 1.5px 1.5px rgba(0, 0, 0, 0.6) !important;
    }

    .face-1 .pip {
      width: 18px;
      height: 18px;
    }

    .pip.top-left    { grid-area: 1 / 1; }
    .pip.top-right   { grid-area: 1 / 3; }
    .pip.mid-left    { grid-area: 2 / 1; }
    .pip.mid-right   { grid-area: 2 / 3; }
    .pip.center      { grid-area: 2 / 2; }
    .pip.bottom-left { grid-area: 3 / 1; }
    .pip.bottom-right { grid-area: 3 / 3; }

    /* ===== 操作区域 ===== */
    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .btn-spin {
      width: 100%;
      max-width: 300px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 15px rgba(255, 107, 53, 0.25);
      user-select: none;
    }

    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== 底部统计层 ===== */
    .result-panel {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(247, 184, 1, 0.15);
      border-radius: 12px;
      padding: 12px;
      box-shadow: inset 0 0 15px rgba(0,0,0,.3);
      margin-top: 14px;
    }

    .result-title {
      font-size: 0.9rem;
      color: var(--accent-gold);
      margin-bottom: 6px;
      font-weight: 800;
      text-align: center;
    }

    .result-summary {
      display: flex;
      justify-content: space-around;
      color: #dfe4ea;
      font-size: 0.9rem;
    }

    .result-summary b {
      color: var(--accent-gold);
    }

    /* ===== 移动端适配层 ===== */
    @media (max-width: 768px) {
      body { padding-top: 80px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 34px; height: 34px; font-size: 1rem; }
      .navbar-nav { gap: 8px; }
      .navbar-nav a { padding: 5px 8px; font-size: 0.85rem; }
      .title { font-size: 1.5rem; }
    }

    @media (max-width: 580px) {
      .navbar-spacer { display: none; }
      .navbar-nav { width: 100%; justify-content: space-between; overflow-x: auto; padding-bottom: 2px; }
      .navbar { height: auto; padding: 8px; flex-direction: column; gap: 4px; }
      body { padding-top: 105px; padding: 8px; }
      .container { padding: 10px; border-radius: 12px; }
      .cube-container { width: 52px; height: 52px; }
      .dice-row { gap: 8px; padding: 10px 0; }
      .face-1 { transform: rotateY(0deg) translateZ(26px); }
      .face-6 { transform: rotateY(180deg) translateZ(26px); }
      .face-2 { transform: rotateY(90deg) translateZ(26px); }
      .face-5 { transform: rotateY(-90deg) translateZ(26px); }
      .face-3 { transform: rotateX(90deg) translateZ(26px); }
      .face-4 { transform: rotateX(-90deg) translateZ(26px); }
      .report-val-big { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="gold-rain-container" id="goldRainContainer"></div>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span> Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 射击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html">🧧 抢红包</a>
      <a href="dice-arena.html" class="active">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <div class="title">🎲 疯狂摇骰子</div>
    </div>

    <div class="panel-wrapper">
      
      <div class="config-panel" id="configPanel">
        <div class="config-group">
          <label class="config-label">摇骰次数</label>
          <select id="diceCount" class="config-select" onchange="resetGame()">
            <option value="1">1次</option>
            <option value="2">2次</option>
            <option value="3" selected>3次</option>
            <option value="5">5次</option>
            <option value="10">10次</option>
          </select>
        </div>

        <div class="config-group">
          <label class="config-label">单次摇骰数</label>
          <select id="rollBatch" class="config-select" onchange="resetGame()">
            <option value="1">1颗</option>
            <option value="2">2颗</option>
            <option value="3">3颗</option>
            <option value="5" selected>5颗</option>
          </select>
        </div>
      </div>

      <div class="marquee-report-panel" id="marqueeReportPanel">
        <div class="report-item">
          <div class="report-title">🎉 战绩速递</div>
          <div style="font-size: 1.1rem; font-weight: 800; color: #ff4757;">疯狂大捷！</div>
        </div>
        <div class="report-item">
          <div class="report-title">🔥 终极总点数</div>
          <div class="report-val-big" id="ledSum">0</div>
        </div>
        <div class="report-item">
          <div class="report-title">✨ 平均每颗点数</div>
          <div class="report-val-big green" id="ledAvg">0.0</div>
        </div>
      </div>

    </div>

    <div class="dice-stage">
      <div class="stage-head">
        <div>状态: <span id="statusText">准备就绪</span></div>
        <div>总骰子数: <b id="rolledCount">0</b> / <span id="targetTotal">15</span> 颗</div>
      </div>
      
      <div class="dice-display-area" id="diceDisplayArea">
        </div>
    </div>

    <div class="control-panel">
      <button class="btn-spin" id="spinBtn" onclick="handleSpinClick()">
        第 1 次摇一摇
      </button>
    </div>

    <div class="result-panel">
      <div class="result-title">实时数据统计</div>
      <div class="result-summary">
        <div>当前总点数：<b id="sumValue">0</b></div>
        <div>平均点数：<b id="avgValue">0.0</b></div>
      </div>
    </div>
  </div>

  <script>
    /* 音频驱动层 */
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playRollSound(duration) {
      initAudio();
      if (!audioCtx) return;
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(500, audioCtx.currentTime);
      filter.Q.setValueAtTime(3.5, audioCtx.currentTime);
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
      noise.stop(audioCtx.currentTime + duration);
    }

    function playClickSound(pitchFactor = 1.0) {
      initAudio();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const freq = (160 + Math.random() * 140) * pitchFactor;
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.04);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.06);
    }

    /* 3D 转换配置 */
    const facePipsConfig = {
      1: ['center'],
      2: ['top-left', 'bottom-right'],
      3: ['top-left', 'center', 'bottom-right'],
      4: ['top-left', 'top-right', 'bottom-left', 'bottom-right'],
      5: ['top-left', 'top-right', 'center', 'bottom-left', 'bottom-right'],
      6: ['top-left', 'top-right', 'mid-left', 'mid-right', 'bottom-left', 'bottom-right']
    };

    const faceTransforms = {
      1: { x: 0,    y: 0,   z: 0 },
      2: { x: 0,    y: -90, z: 0 },
      3: { x: -90,  y: 0,   z: 0 },
      4: { x: 90,   y: 0,   z: 0 },
      5: { x: 0,    y: 90,  z: 0 },
      6: { x: 180,  y: 0,   z: 0 }
    };

    /* 游戏核心状态器 */
    let state = {
      isRolling: false,
      currentRound: 1,  
      totalRounds: 3,   
      batchSize: 5,     
      rolledDiceCount: 0, 
      sum: 0,
      isFinished: false
    };

    let rainTimer = null; // 红包雨定时器句柄

    function createDie() {
      const card = document.createElement('div');
      card.className = 'dice-card';
      const container = document.createElement('div');
      container.className = 'cube-container';
      const shadow = document.createElement('div');
      shadow.className = 'cube-shadow';
      const cube = document.createElement('div');
      cube.className = 'cube';

      for (let f = 1; f <= 6; f++) {
        const faceDom = document.createElement('div');
        faceDom.className = 'cube-face face-' + f;
        const pipsArr = facePipsConfig[f];
        pipsArr.forEach(pClass => {
          const pip = document.createElement('div');
          pip.className = 'pip ' + pClass;
          if (f === 1 || f === 4) pip.classList.add('red');
          faceDom.appendChild(pip);
        });
        cube.appendChild(faceDom);
      }

      container.appendChild(shadow);
      container.appendChild(cube);
      card.appendChild(container);
      return { card, cube, shadow };
    }

    function updateButtonText() {
      const spinBtn = document.getElementById('spinBtn');
      if (state.isFinished) {
        spinBtn.textContent = '🔄 重新开始';
      } else {
        if (state.totalRounds > 1) {
          spinBtn.textContent = `第 ${state.currentRound} 次摇一摇`;
        } else {
          spinBtn.textContent = '🎲 摇一摇！';
        }
      }
    }

    // 🔴 触发全屏背景金雨 (红包雨逻辑，不干扰骰子赏析) 🔴
    function startGoldRain() {
      const container = document.getElementById('goldRainContainer');
      container.innerHTML = '';
      
      const pool = ['💰', '👑', '🎲', '✨', '7', '8', '6', '★'];
      
      rainTimer = setInterval(() => {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.textContent = pool[Math.floor(Math.random() * pool.length)];
        
        // 随机属性分布
        drop.style.left = Math.random() * 100 + 'vw';
        drop.style.fontSize = Math.random() * 20 + 16 + 'px';
        
        const duration = Math.random() * 2 + 2; // 2s~4s飘完
        drop.style.animationDuration = duration + 's';
        
        container.appendChild(drop);
        
        // 自动出界销毁
        setTimeout(() => drop.remove(), duration * 1000);
      }, 120);
    }

    function stopGoldRain() {
      if (rainTimer) clearInterval(rainTimer);
      document.getElementById('goldRainContainer').innerHTML = '';
    }

    // 重置并清空
    function resetGame() {
      stopGoldRain();

      // 复原顶部面板状态
      document.getElementById('marqueeReportPanel').classList.remove('active');
      document.getElementById('configPanel').classList.remove('hide');

      state.isRolling = false;
      state.currentRound = 1;
      state.isFinished = false;
      state.rolledDiceCount = 0;
      state.sum = 0;

      state.totalRounds = parseInt(document.getElementById('diceCount').value);
      state.batchSize = parseInt(document.getElementById('rollBatch').value);
      
      const totalTargetDice = state.totalRounds * state.batchSize;
      document.getElementById('targetTotal').textContent = totalTargetDice;
      document.getElementById('rolledCount').textContent = '0';
      document.getElementById('sumValue').textContent = '0';
      document.getElementById('avgValue').textContent = '0.0';
      document.getElementById('statusText').textContent = '准备就绪';
      
      const spinBtn = document.getElementById('spinBtn');
      spinBtn.disabled = false;
      updateButtonText();

      document.getElementById('diceDisplayArea').innerHTML = '';
    }

    function handleSpinClick() {
      if (state.isFinished) {
        resetGame();
        return;
      }
      rollNextBatch();
    }

    function rollNextBatch() {
      if (state.isRolling) return;
      state.isRolling = true;
      
      document.getElementById('statusText').textContent = `第 ${state.currentRound} 轮摇动中...`;
      document.getElementById('spinBtn').disabled = true;
      
      const displayArea = document.getElementById('diceDisplayArea');
      const newRow = document.createElement('div');
      newRow.className = 'dice-row';
      const currentBatchDice = [];
      
      for (let i = 0; i < state.batchSize; i++) {
        const dieObj = createDie();
        newRow.appendChild(dieObj.card);
        currentBatchDice.push(dieObj);
      }
      
      displayArea.appendChild(newRow);
      playRollSound(1.2);

      let finishedInBatch = 0;
      const rollDuration = 1400;

      currentBatchDice.forEach((die, i) => {
        const cube = die.cube;
        const shadow = die.shadow;
        const result = Math.floor(Math.random() * 6) + 1;
        state.sum += result;

        const base = faceTransforms[result];
        const rotX = base.x + (4 + Math.floor(Math.random() * 2)) * 360;
        const rotY = base.y + (4 + Math.floor(Math.random() * 2)) * 360;
        const rotZ = base.z + Math.floor(Math.random() * 2) * 180;
        const delay = i * 90;

        setTimeout(() => {
          cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
          shadow.style.transform = 'translateX(-50%) scale(1.3)';
          shadow.style.background = 'rgba(0,0,0,0.1)';
        }, delay);

        setTimeout(() => {
          cube.classList.add('impact-effect');
          shadow.style.transform = 'translateX(-50%) scale(1)';
          shadow.style.background = 'rgba(0,0,0,0.8)';
          playClickSound(0.9 + result * 0.1);

          const face1 = cube.querySelector('.face-1');
          face1.innerHTML = '';
          const pips = facePipsConfig[result];
          pips.forEach(pClass => {
            const pip = document.createElement('div');
            pip.className = 'pip ' + pClass;
            if (result === 1 || result === 4) pip.classList.add('red');
            face1.appendChild(pip);
          });

          finishedInBatch++;
          if (finishedInBatch === state.batchSize) {
            state.rolledDiceCount += state.batchSize;
            
            const avg = (state.sum / state.rolledDiceCount).toFixed(1);
            document.getElementById('rolledCount').textContent = state.rolledDiceCount;
            document.getElementById('sumValue').textContent = state.sum;
            document.getElementById('avgValue').textContent = avg;
            
            state.isRolling = false;

            if (state.currentRound >= state.totalRounds) {
              state.isFinished = true;
              document.getElementById('statusText').textContent = '疯狂摇骰结束！';
              
              // 🔴 两者兼得核心控制逻辑：切换顶部无遮挡高亮战报，同时降下雨水 🔴
              setTimeout(() => {
                document.getElementById('ledSum').textContent = state.sum;
                document.getElementById('ledAvg').textContent = avg;
                
                document.getElementById('configPanel').classList.add('hide');
                document.getElementById('marqueeReportPanel').classList.add('active');
                
                startGoldRain(); // 开启红包雨氛围
                playClickSound(1.5);
              }, 400);

            } else {
              state.currentRound++;
              document.getElementById('statusText').textContent = '准备就绪';
            }
            
            document.getElementById('spinBtn').disabled = false;
            updateButtonText();
          }
        }, delay + rollDuration);
      });
    }

    window.addEventListener('load', resetGame);
  </script>
</body>
</html>
