<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 幸运大翻牌 - Game Hub</title>
  <style>
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
      --big-prize:       #ff4d4f;
      --mid-prize:       #faad14;
      --small-prize:     #52c41a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      padding-top: 85px;
    }

    /* ===== 金币大捷雨 ===== */
    .gold-rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -50px;
      font-weight: 900;
      color: rgba(247, 184, 1, 0.65);
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.3);
      user-select: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(115vh) rotate(360deg); }
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 850px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      z-index: 20;
    }

    /* ===== 标题区与汉堡设置 ===== */
    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      min-height: 50px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* 汉堡齿轮按钮 */
    .settings-toggle {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--accent-gold);
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 110;
    }
    .settings-toggle:hover {
      transform: translateY(-50%) rotate(45deg);
    }

    /* ===== 侧拉/弹窗汉堡配置面板 ===== */
    .config-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .config-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .config-panel {
      position: absolute;
      top: 60px;
      left: 0;
      background: rgba(20, 27, 38, 0.98);
      border: 2px solid var(--accent-gold);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(-20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      text-align: left;
    }

    .config-panel.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .config-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .config-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-gold);
      letter-spacing: 1px;
    }

    .config-input {
      width: 100px;
      padding: 8px;
      background: rgba(10, 14, 23, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      text-align: center;
      transition: all 0.3s ease;
    }

    .config-input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 10px rgba(247, 184, 1, 0.3);
    }

    /* ===== 游戏数据统计 ===== */
    .stats {
      margin: 0 auto 20px;
      font-size: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 40px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.3);
      padding: 12px 20px;
      border-radius: 12px;
      max-width: 600px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.5rem;
      text-shadow: 0 0 10px rgba(247, 184, 1, 0.3);
    }

    /* ===== 🔴 终极战报拉霸LED霓虹闪烁面板 🔴 ===== */
    .status-wrapper {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .marquee-report-panel {
      width: 100%;
      background: linear-gradient(135deg, #1e1b4b 0%, #090d16 100%);
      border: 2px dashed #ff4757;
      box-shadow: 0 0 25px rgba(255, 71, 87, 0.35), inset 0 0 15px rgba(255, 71, 87, 0.15);
      border-radius: 12px;
      padding: 15px 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      opacity: 0;
      transform: scaleY(0);
      height: 0;
      overflow: hidden;
      margin-bottom: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .marquee-report-panel.active {
      opacity: 1;
      transform: scaleY(1);
      height: auto;
    }

    .report-item {
      text-align: center;
    }

    .report-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .report-val-big {
      font-size: 2.3rem;
      font-weight: 900;
      color: #ff4757;
      text-shadow: 0 0 15px rgba(255, 71, 87, 0.7);
      line-height: 1.1;
    }

    .report-val-big.gold {
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(247, 184, 1, 0.7);
    }

    /* ===== 翻牌卡片矩阵区域 ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      perspective: 1000px;
      margin: 0 auto 25px;
      padding: 10px;
      justify-content: center;
      max-width: 600px;
    }

    .card {
      width: 100%;
      aspect-ratio: 0.714;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
      transform-style: flat;
    }

    .card:hover:not(.flipped) {
      transform: translateY(-8px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: bold;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
    }

    .card-front {
      background: linear-gradient(135deg, var(--accent-gold), #b8860b);
      color: #000000;
      font-size: 2.2rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      overflow: hidden;
      z-index: 1;
    }

    .card-front::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.15) 4px, transparent 4px);
      background-size: 30px 30px, 40px 40px, 50px 50px;
    }

    .card-back {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 8px;
      border: 2px solid rgba(247, 184, 1, 0.3);
      overflow: hidden;
    }

    .card-back::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(45deg, rgba(247, 184, 1, 0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(247, 184, 1, 0.05) 25%, transparent 25%);
      background-size: 16px 16px;
      pointer-events: none;
    }

    .card-amount {
      font-size: 1.4rem;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      opacity: 0.8;
      position: relative;
      z-index: 1;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .card-back.big-prize { background: linear-gradient(135deg, #ff4d4f, #cf1322); border-color: rgba(255, 77, 79, 0.6); }
    .card-back.mid-prize { background: linear-gradient(135deg, #2b1055, #511281); border-color: rgba(250, 173, 20, 0.8); color: #f7b801; }
    .card-back.mid-prize .card-label { color: #ffffff; background: rgba(250, 173, 20, 0.3); }
    .card-back.small-prize { background: linear-gradient(135deg, #52c41a, #389e0d); border-color: rgba(82, 196, 26, 0.6); }

    .card.dimmed .card-back {
      filter: grayscale(40%) opacity(0.8) !important; 
      border-color: rgba(255, 255, 255, 0.3) !important;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3) !important;
      background: #BBBBBB !important; 
      color: #ff3399 !important; 
    }
    .card.dimmed .card-label { background: rgba(255,255,255,0.1) !important; color: #ff3399 !important; }

    /* ===== 核心操作按钮 ===== */
    .btn-spin {
      width: 200px;
      margin: 0 auto;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
      display: block;
    }

    .btn-spin:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5); }
    .btn-spin:active { transform: scale(0.98); }

    /* ===== 响应式适配 ===== */
    @media (max-width: 768px) {
      body { padding-top: 75px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .title { font-size: 1.8rem; }
      .card-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .card-amount { font-size: 1.1rem; }
      .report-val-big { font-size: 1.8rem; }
    }

    @media (max-width: 480px) {
      body { padding: 70px 10px 15px; }
      .navbar { padding: 0 10px; justify-content: space-between; }
      .navbar-spacer { display: none; }
      .navbar-nav { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 10px; padding: 0 5px; flex: 1; margin-left: 10px; scrollbar-width: none; }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 5px 10px; font-size: 0.85rem; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.5rem; }
      .settings-toggle { font-size: 1.5rem; }
      .btn-spin { width: 160px; font-size: 1rem; padding: 10px 15px; }
      .card-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .card-amount { font-size: 1rem; }
      .stats { gap: 15px; font-size: 1rem; padding: 10px; }
      .stat-val { font-size: 1.2rem; }
      .marquee-report-panel { padding: 10px 8px; flex-wrap: wrap; gap: 8px; }
      .report-val-big { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="gold-rain-container" id="goldRainContainer"></div>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span> Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html" class="active">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 射击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>

    </div>
  </nav>

  <div class="config-overlay" id="configOverlay" onclick="toggleSettings()"></div>

  <div class="container">
    <div class="header">
      <button class="settings-toggle" onclick="toggleSettings()" title="游戏设置">⚙️</button>
      <div class="title">🎰 幸运大翻牌</div>

      <div class="config-panel" id="configPanel">
        <div class="config-group">
          <label class="config-label">促销总额 (元)</label>
          <input type="number" id="totalAmount" class="config-input" value="50" min="1">
        </div>
        <div class="config-group">
          <label class="config-label">最小金额</label>
          <input type="number" id="minAmount" class="config-input" value="2" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">最大金额</label>
          <input type="number" id="maxAmount" class="config-input" value="10" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">牌总张数</label>
          <input type="number" id="cardCount" class="config-input" value="9" min="3" max="30">
        </div>
        <div class="config-group">
          <label class="config-label">可翻牌数</label>
          <input type="number" id="limitCount" class="config-input" value="3" min="1">
        </div>
      </div>
    </div>

    <div class="stats">
      <div>剩余机会: <span id="remainingFlips" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div class="status-wrapper">
      <div class="marquee-report-panel" id="marqueeReportPanel">
        <div class="report-item">
          <div class="report-title">🎉 战绩速递</div>
          <div style="font-size: 1.1rem; font-weight: 800; color: #ff4757;">翻牌大捷！</div>
        </div>
        <div class="report-item">
          <div class="report-title">🔥 斩获总奖金</div>
          <div class="report-val-big gold" id="ledTotal">￥0.00</div>
        </div>
        <div class="report-item">
          <div class="report-title">✨ 欧气评价</div>
          <div class="report-val-big" id="ledEval" style="font-size: 1.5rem; padding-top: 5px;">一本万利</div>
        </div>
      </div>
    </div>

    <div id="cardGrid" class="card-grid"></div>

    <button class="btn-spin" onclick="initGame()">重新洗牌</button>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;

      if (type === 'flip') {
        const bufferSize = audioCtx.sampleRate * 0.12; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass'; 
        noiseFilter.frequency.setValueAtTime(1200, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(3000, now + 0.1);
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.25, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        noiseNode.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);

        const oscNode = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        oscNode.type = 'triangle';
        oscNode.frequency.setValueAtTime(180, now);
        oscNode.frequency.exponentialRampToValueAtTime(60, now + 0.08);
        oscGain.gain.setValueAtTime(0.35, now);
        oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        oscNode.connect(oscGain);
        oscGain.connect(audioCtx.destination);

        noiseNode.start(now);
        noiseNode.stop(now + 0.12);
        oscNode.start(now);
        oscNode.stop(now + 0.08);

      } else if (type === 'end') {
        const freqs = [523.25, 659.25, 783.99, 1046.50]; 
        freqs.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + idx * 0.08);
          gain.gain.setValueAtTime(0.15, now + idx * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + idx * 0.08);
          osc.stop(now + idx * 0.08 + 0.25);
        });
      }
    }

    let gameState = {
      prizes: [],
      remainingFlips: 0,
      wonAmount: 0,
      isProcessing: false,
      maxAmount: 0,
      minAmount: 0
    };

    let rainTimer = null;

    // 切换设置面板状态
    function toggleSettings() {
      document.getElementById('configPanel').classList.toggle('active');
      document.getElementById('configOverlay').classList.toggle('active');
    }

    function startGoldRain() {
      const container = document.getElementById('goldRainContainer');
      container.innerHTML = '';
      const pool = ['🪙', '💰', '✨', '🃏', '💎', '★'];
      rainTimer = setInterval(() => {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.textContent = pool[Math.floor(Math.random() * pool.length)];
        drop.style.left = Math.random() * 100 + 'vw';
        drop.style.fontSize = Math.random() * 20 + 16 + 'px';
        const duration = Math.random() * 2 + 2;
        drop.style.animationDuration = duration + 's';
        container.appendChild(drop);
        setTimeout(() => drop.remove(), duration * 1000);
      }, 120);
    }

    function stopGoldRain() {
      if (rainTimer) clearInterval(rainTimer);
      document.getElementById('goldRainContainer').innerHTML = '';
    }

    function distributePrizes(count, total, min, max) {
      if (count * min > total) {
        showToast("❌ 失败：总额不足以支撑当前最小金额设定");
        return null;
      }
      if (count * max < total) {
        showToast("❌ 失败：总额超出了最大金额设定的上限");
        return null;
      }
      let result = [];
      let remaining = total;
      for (let i = 0; i < count - 1; i++) {
        let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
        let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
        let amount = Math.random() * (currentMax - currentMin) + currentMin;
        amount = Math.round(amount * 100) / 100;
        result.push(amount);
        remaining -= amount;
      }
      result.push(Math.round(remaining * 100) / 100);
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function getPrizeLevel(amount, minAmount, maxAmount) {
      const range = maxAmount - minAmount;
      if (range <= 0) return 'mid-prize';
      const thresholdBig = minAmount + range * 0.66;
      const thresholdMid = minAmount + range * 0.33;
      if (amount >= thresholdBig) return 'big-prize';
      if (amount >= thresholdMid) return 'mid-prize';
      return 'small-prize';
    }

    function getPrizeLevelText(level) {
      switch(level) {
        case 'big-prize': return '💎 豪礼';
        case 'mid-prize': return '✨ 大礼';
        case 'small-prize': return '🎈 好礼';
        default: return '奖励';
      }
    }

    function initGame() {
      stopGoldRain();

      // 如果洗牌时配置面板开着，自动收起
      document.getElementById('configPanel').classList.remove('active');
      document.getElementById('configOverlay').classList.remove('active');
      document.getElementById('marqueeReportPanel').classList.remove('active');

      const cardCount = parseInt(document.getElementById('cardCount').value) || 9;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 60;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 2;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 25;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      const prizes = distributePrizes(cardCount, totalAmount, minAmount, maxAmount);
      if (!prizes) return;

      gameState.prizes = prizes;
      gameState.remainingFlips = Math.min(limitCount, cardCount);
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      updateStats();
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';
      gameState.prizes.forEach((prize, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.onclick = () => flipCard(index, card);
        const prizeLevel = getPrizeLevel(prize, gameState.minAmount, gameState.maxAmount);
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back ${prizeLevel}">
              <div class="card-amount">￥${prize.toFixed(2)}</div>
              <div class="card-label">${getPrizeLevelText(prizeLevel)}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function flipCard(index, cardElement) {
      if (gameState.remainingFlips <= 0 || gameState.isProcessing) return;
      if (cardElement.classList.contains('flipped')) return;

      gameState.isProcessing = true;
      playSound('flip');
      cardElement.classList.add('flipped');
      
      gameState.remainingFlips--;
      gameState.wonAmount += gameState.prizes[index];
      updateStats();
      
      setTimeout(() => {
        gameState.isProcessing = false;
        if (gameState.remainingFlips === 0) {
          endGameAndRevealOthers();
        }
      }, 300);
    }

    function endGameAndRevealOthers() {
      gameState.isProcessing = true;
      playSound('end');

      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;
      const avgWin = gameState.wonAmount / limitCount;
      let evaluation = '运气平平';
      if (avgWin >= gameState.minAmount + (gameState.maxAmount - gameState.minAmount) * 0.6) {
        evaluation = '欧皇附体🔥';
      } else if (avgWin >= gameState.minAmount + (gameState.maxAmount - gameState.minAmount) * 0.3) {
        evaluation = '手气极佳✨';
      }

      document.getElementById('ledTotal').textContent = `￥${gameState.wonAmount.toFixed(2)}`;
      document.getElementById('ledEval').textContent = evaluation;
      
      document.getElementById('marqueeReportPanel').classList.add('active');
      startGoldRain();

      gameState.prizes.forEach((_, index) => {
        const cardEl = document.getElementById(`card-${index}`);
        if (!cardEl.classList.contains('flipped')) {
          cardEl.classList.add('flipped', 'dimmed'); 
          cardEl.onclick = null; 
        }
      });
    }

    function updateStats() {
      document.getElementById('remainingFlips').innerText = gameState.remainingFlips;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    function showToast(msg) {
      alert(msg);
    }

    window.onload = initGame;
  </script>
</body>
</html>
