<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专属商户互动营销中心</title>
  
  <style>
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%); color: var(--light-text); display: flex; flex-direction: column; justify-content: flex-start; align-items: center; min-height: 100vh; padding: 15px; padding-top: 90px; position: relative; }
    
    #goldRainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
    .container { width: 100%; max-width: 850px; background: rgba(15, 20, 25, 0.95); border: 3px solid var(--accent-gold); border-radius: 25px; padding: 25px; box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05); backdrop-filter: blur(10px); text-align: center; position: relative; z-index: 1; }
    .title { font-size: 2.2rem; font-weight: 900; color: var(--accent-gold); margin-bottom: 20px; text-shadow: 0 0 20px rgba(247, 184, 1, 0.4); letter-spacing: 2px; }
    
    /* 🧱 LED 战报大屏（平时隐藏，结算时由壳子触发显现） */
    .board-wrapper { width: 100%; margin-bottom: 20px; perspective: 1000px; display: none; }
    .board-wrapper.active { display: block; }
    .led-report-panel { background: radial-gradient(circle at center, #110022 0%, #000000 100%); border: 4px solid #ff0055; box-shadow: 0 0 30px #ff0055, inset 0 0 20px #ff0055, 0 0 50px #ffcc00; animation: ledStretch 0.6s ease forwards, ledBlink 1.5s infinite alternate 0.6s; padding: 25px 20px; border-radius: 15px; }
    @keyframes ledStretch { 0% { transform: scale(0.6) rotateX(-30deg); } 60% { transform: scale(1.1) rotateX(10deg); } 100% { transform: scale(1) rotateX(0); } }
    @keyframes ledBlink { 0% { border-color: #ff0055; box-shadow: 0 0 25px #ff0055, inset 0 0 15px #ff0055, 0 0 40px #ffcc00; } 100% { border-color: #ffcc00; box-shadow: 0 0 35px #ffcc00, inset 0 0 25px #ffcc00, 0 0 60px #ff0055; } }
    .led-content { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Impact', 'Arial Black', sans-serif; letter-spacing: 2px; }
    .led-title { font-size: 1.6rem; color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; margin-bottom: 12px; font-weight: bold; }
    .led-result { font-size: 2.6rem; color: #ffcc00; text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff8800; font-weight: 900; }

    /* 商家引流动态看板 */
    .merchant-display-card { background: rgba(0,0,0,0.4); border: 1px dashed var(--accent-gold); border-radius: 12px; padding: 12px; margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center; gap: 10px; }
    .merchant-meta-item { font-size: 0.85rem; color: var(--text-secondary); text-align: left; }
    .merchant-meta-item b { color: var(--accent-gold); }

    /* ========================================================
       🧱 恢复原生 LOGO 与折叠导航栏样式（完美还原 #d946ef 渐变发光）
       ======================================================== -->
    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(10, 14, 39, 0.95); border-bottom: 2px solid #d946ef; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 1000; box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2); }
    .navbar-logo { font-size: 1.5rem; font-weight: 900; color: #d946ef; text-shadow: 0 0 10px rgba(217, 70, 239, 0.5); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .navbar-logo span { width: 40px; height: 40px; background: linear-gradient(135deg, #d946ef, #a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #fff; }
    
    .navbar-nav { display: flex; gap: 15px; align-items: center; transition: all 0.3s ease; }
    .navbar-nav a { color: #a0aec0; text-decoration: none; font-weight: 600; padding: 8px 14px; border-radius: 6px; font-size: 0.95rem; white-space: nowrap; transition: all 0.2s; }
    .navbar-nav a:hover { color: #d946ef; background: rgba(217, 70, 239, 0.1); }
    .navbar-nav a.active { color: #d946ef; background: rgba(217, 70, 239, 0.2); border: 1px solid #d946ef; }
    
    /* 手机端汉堡菜单触控按钮 */
    .menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 26px; height: 20px; background: transparent; border: none; cursor: pointer; z-index: 1100; }
    .menu-toggle span { width: 100%; height: 3px; background-color: #d946ef; border-radius: 2px; transition: all 0.3s ease; box-shadow: 0 0 5px #d946ef; }

    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      .navbar-nav { position: fixed; top: 70px; left: 0; right: 0; background: rgba(10, 14, 39, 0.98); border-bottom: 2px solid #d946ef; flex-direction: column; padding: 20px; gap: 15px; transform: translateY(-150%); opacity: 0; pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
      .navbar-nav.mobile-open { transform: translateY(0); opacity: 1; pointer-events: auto; }
      .menu-toggle.open span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
      .menu-toggle.open span:nth-child(2) { opacity: 0; }
      .menu-toggle.open span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }
    }
    
    #game-stage-viewport { width: 100%; position: relative; z-index: 5; }
  </style>
</head>
<body>
  <canvas id="goldRainCanvas"></canvas>

  <nav class="navbar">
    <a href="#" class="navbar-logo">
      <span>🎮</span> <span id="shell-brand-name">Game Hub</span>
    </a>
    <button class="menu-toggle" id="mobileMenuBtn">
      <span></span><span></span><span></span>
    </button>
    <div class="navbar-nav" id="navbarNav"></div>
  </nav>

  <div id="mainBoard" style="display: none !important;"></div>

  <div class="container">
    <div class="header">
      <div class="title" id="shell-game-title">🥚 幸运砸金蛋</div>
    </div>

    <div class="board-wrapper" id="reportWrapper">
      <div class="led-report-panel" id="ledBoard"></div>
    </div>

    <div id="shell-merchant-dynamic-card"></div>

    <div id="game-stage-viewport"></div>
  </div>

  <script>
    // 自动接入您的实际 Cloudflare Worker 生产环境地址
    const GLOBAL_API_URL = "https://game.hahagw2023.workers.dev/";

    // 💡 终极省心解决方案：以后增删游戏，只需要改下面这个数组，所有页面的导航栏同步更新！
    const GAMES_CONFIG = [
      { name: "首页", url: "index.html" },
      { name: "🎡 大转盘", url: "lucky-wheel.html" },
      { name: "🎯 射击轮盘", url: "dart-wheel.html" },
      { name: "🥚 砸金蛋", url: "golden-egg.html" },
      { name: "🧧 抢红包", url: "red-envelope.html" }
    ];

    // 自动渲染并智能高亮当前游戏链接
    function renderNavbar() {
      const navContainer = document.getElementById('navbarNav');
      const currentFile = window.location.pathname.split('/').pop() || "index.html";
      const urlParams = window.location.search; // 保留商户 ID 传参（如 ?m=starbucks）

      let navHtml = "";
      GAMES_CONFIG.forEach(game => {
        const isActive = currentFile === game.url ? "class='active'" : "";
        // 自动把当前的商户ID拼接到其他游戏链接后面，实现跨游戏无缝带参跳转
        const targetUrl = game.url + urlParams;
        navHtml += `<a href="${targetUrl}" ${isActive}>${game.name}</a>`;
      });
      navContainer.innerHTML = navHtml;
    }
    renderNavbar();

    // 手机端菜单展开折叠
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navbarNav = document.getElementById('navbarNav');
    mobileMenuBtn.onclick = () => {
      mobileMenuBtn.classList.toggle('open');
      navbarNav.classList.toggle('mobile-open');
    };

    // 壳子组件公共总线
    window.ShellCore = {
      triggerLEDReport(finalAmount) {
        const wrapper = document.getElementById('reportWrapper');
        const ledBoard = document.getElementById('ledBoard');
        wrapper.classList.add('active');
        ledBoard.innerHTML = `
          <div class="led-content">
            <div class="led-title">🎰 🔴 FINAL REPORT 🔴 🎰</div>
            <div class="led-result">终极战报：￥${finalAmount.toFixed(2)}</div>
          </div>
        `;
        if(typeof startGoldRain === 'function') startGoldRain();
      },
      resetLEDReport() {
        if(typeof stopGoldRain === 'function') stopGoldRain();
        const wrapper = document.getElementById('reportWrapper');
        wrapper.classList.remove('active');
      }
    };

    window.MERCHANT_CUSTOM_SETTINGS = null;

    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const mId = urlParams.get('m');

      if (mId) {
        try {
          const res = await fetch(GLOBAL_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ merchant_id: mId, game_id: "golden-egg" })
          });
          const result = await res.json();

          if (res.ok && result.success && result.data) {
            const info = result.data;

            if(info.game_custom_settings) {
               window.MERCHANT_CUSTOM_SETTINGS = JSON.parse(info.game_custom_settings);
               // 🧠 核心同步：把云端抓回来的真实配置填入隐藏的输入框中，确保原游戏逻辑正常抓取运行
               setTimeout(() => {
                  if(document.getElementById('totalAmount')) document.getElementById('totalAmount').value = window.MERCHANT_CUSTOM_SETTINGS.totalAmount || 50;
                  if(document.getElementById('minAmount')) document.getElementById('minAmount').value = window.MERCHANT_CUSTOM_SETTINGS.minAmount || 2;
                  if(document.getElementById('maxAmount')) document.getElementById('maxAmount').value = window.MERCHANT_CUSTOM_SETTINGS.maxAmount || 10;
                  if(document.getElementById('eggCount')) document.getElementById('eggCount').value = window.MERCHANT_CUSTOM_SETTINGS.eggCount || 9;
                  if(document.getElementById('limitCount')) document.getElementById('limitCount').value = window.MERCHANT_CUSTOM_SETTINGS.limitCount || 3;
                  // 强制驱动游戏进行初始化渲染
                  if(typeof initGame === 'function') initGame();
               }, 50);
            }

            document.getElementById('shell-brand-name').innerText = info.merchant_name;
            document.getElementById('shell-game-title').innerText = `🥚 ${info.merchant_name}·专属砸金蛋`;

            if(info.contact_info) {
              const metaObj = JSON.parse(info.contact_info);
              let metaHtml = `<div class="merchant-display-card">`;
              for (const [key, value] of Object.entries(metaObj)) {
                metaHtml += `<div class="merchant-meta-item"><b>${key}：</b>${value}</div>`;
              }
              if(info.qr_code) {
                metaHtml += `<div class="merchant-meta-item"><img src="${info.qr_code}" style="width:50px;height:50px;vertical-align:middle;border-radius:4px;margin-left:10px;"></div>`;
              }
              metaHtml += `</div>`;
              document.getElementById('shell-merchant-dynamic-card').innerHTML = metaHtml;
            }
          }
        } catch (e) {
          console.error("🔒 云端数据同步失败，自动切换为默认运营配置:", e);
        }
      }

      initGoldRainEngine();
      loadGameCore();
    });

    // 100%保留原生全屏数字/骰子粒子雨效果
    let animationFrameId = null; let particles = [];
    function initGoldRainEngine() {
      const cvs = document.getElementById('goldRainCanvas'); const ctx = cvs.getContext('2d');
      window.addEventListener('resize', () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; });
      cvs.width = window.innerWidth; cvs.height = window.innerHeight;
      class Particle {
        constructor() { this.reset(); this.y = Math.random() * cvs.height; }
        reset() { this.x = Math.random() * cvs.width; this.y = -50; this.size = Math.random() * 12 + 8; this.speedY = Math.random() * 3 + 2; this.speedX = (Math.random() - 0.5) * 1; this.type = Math.random() > 0.4 ? 'number' : 'dice'; this.text = this.type === 'number' ? Math.floor(Math.random() * 10).toString() : '🎲'; this.opacity = Math.random() * 0.4 + 0.3; this.angle = Math.random() * Math.PI * 2; this.spinSpeed = (Math.random() - 0.5) * 0.05; }
        update() { this.y += this.speedY; this.x += this.speedX; this.angle += this.spinSpeed; if (this.y > cvs.height + 20) this.reset(); }
        draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.globalAlpha = this.opacity; ctx.shadowBlur = 10; ctx.shadowColor = '#fcd34d'; ctx.fillStyle = '#f7b801'; ctx.font = `${this.size}px Arial`; ctx.fillText(this.text, 0, 0); ctx.restore(); }
      }
      window.startGoldRain = function() { window.stopGoldRain(); particles = []; const cnt = Math.min(120, Math.floor(cvs.width / 10)); for (let i = 0; i < cnt; i++) particles.push(new Particle()); function loop() { ctx.clearRect(0, 0, cvs.width, cvs.height); particles.forEach(p => { p.update(); p.draw(); }); animationFrameId = requestAnimationFrame(loop); } loop(); };
      window.stopGoldRain = function() { if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; } ctx.clearRect(0, 0, cvs.width, cvs.height); };
    }

    function loadGameCore() {
      const script = document.createElement('script');
      script.src = "games/golden-egg.js";
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
