<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎯 飞镖转盘 Pro</title>
  <style>
    :root {
      --primary-color: #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold: #f7b801;
      --dark-bg: #0a0e27;
      --light-text: #ffffff;
      --text-secondary: #a0aec0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid var(--primary-color);
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 15px 40px;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-input, .config-select {
      padding: 10px 12px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
    }

    .config-input:focus, .config-select:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 15px rgba(247, 184, 1, 0.3);
    }

    .distribution-preview {
      grid-column: 1 / -1;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 4px solid var(--accent-gold);
    }

    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin-bottom: 25px;
    }

    .wheel-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: crosshair;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 0 8px var(--accent-gold), 0 0 0 12px rgba(247, 184, 1, 0.3);
      position: relative;
      overflow: hidden;
    }

    .wheel svg { width: 100%; height: 100%; }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, var(--accent-gold) 0%, #d4a500 100%);
      border-radius: 50%;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .darts-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .dart {
      position: absolute;
      width: 24px;
      height: 24px;
      font-size: 1.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.6));
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .status-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-align: center;
      min-height: 30px;
    }

    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 18px 30px;
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .main-content { padding: 80px 12px 30px; }
      .title { font-size: 1.6rem; }
      .config-panel { grid-template-columns: 1fr; }
      .wheel-container { max-width: 340px; }
    }

    @media (max-width: 480px) {
      .navbar-nav { display: none; }
      .main-content { padding: 70px 10px 20px; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      .wheel-container { max-width: 280px; }
      .btn-start { font-size: 1rem; padding: 14px 24px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="game-dart-wheel.html" class="active">🎯 飞镖</a>
      <a href="game-flip-card.html">🎰 翻牌</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">
      <div class="header">
        <div class="title">🎯 飞镖转盘 Pro</div>
      </div>

      <div class="config-panel">
        <div class="config-group">
          <label class="config-label">转盘总等分数</label>
          <input type="number" class="config-input" id="sectorCount" value="20" min="4" max="60" onchange="updateWheel()">
        </div>

        <div class="config-group">
          <label class="config-label">转盘文字内容</label>
          <input type="text" class="config-input" id="sectorTexts" value="8,9,10" placeholder="如: 8,9,10" onchange="updateWheel()">
        </div>

        <div class="config-group">
          <label class="config-label">概率分布模式</label>
          <select class="config-select" id="distMode" onchange="updateWheel()">
            <option value="equal">⚖️ 绝对平分</option>
            <option value="jackpot">🏆 大奖模式</option>
          </select>
        </div>

        <div class="distribution-preview" id="distPreview">当前分配：正在计算...</div>
      </div>

      <div class="wheel-section">
        <div class="wheel-container" id="wheelContainer">
          <div class="wheel" id="wheel">
            <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
            <div class="darts-container" id="dartsContainer"></div>
            <div class="wheel-center">🎯</div>
          </div>
        </div>
      </div>

      <div class="control-panel">
        <div class="status-text" id="statusText">准备就绪</div>
        <button class="btn-start" id="startBtn" onclick="startGame()">🚀 开始游戏</button>
      </div>
    </div>
  </div>

  <script>
    const gameState = {
      isSpinning: false,
      currentRotation: 0,
      sectors: [],
      dartAngle: null
    };

    const colors = ["#ff6b35", "#004e89", "#f7b801", "#2ec4b6", "#e71d36", "#7209b7", "#4cc9f0"];

    function updateWheel() {
      const sectorCount = parseInt(document.getElementById('sectorCount').value) || 20;
      const texts = document.getElementById('sectorTexts').value.split(',').map(s => s.trim());
      const mode = document.getElementById('distMode').value;
      
      let counts = [];
      const n = texts.length;

      if (mode === 'equal') {
        const base = Math.floor(sectorCount / n);
        counts = new Array(n).fill(base);
        for(let i=0; i < sectorCount % n; i++) counts[i]++;
      } else {
        counts = new Array(n).fill(Math.floor((sectorCount - 1) / (n - 1)));
        counts[0] = 1;
        let sum = counts.reduce((a,b) => a+b, 0);
        while(sum < sectorCount) { counts[n-1]++; sum++; }
      }

      document.getElementById('distPreview').textContent = `当前分配：` + texts.map((t, i) => `${t}(${counts[i]}份)`).join(' | ');

      gameState.sectors = [];
      texts.forEach((text, i) => {
        for(let j=0; j < counts[i]; j++) gameState.sectors.push(text);
      });
      
      gameState.sectors = smartShuffle(gameState.sectors);
      renderWheel(texts);
    }

    function smartShuffle(arr) {
      let result = [];
      let tempArr = [...arr];
      
      for (let i = tempArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tempArr[i], tempArr[j]] = [tempArr[j], tempArr[i]];
      }

      while (tempArr.length > 0) {
        let found = false;
        for (let i = 0; i < tempArr.length; i++) {
          if (result.length === 0 || tempArr[i] !== result[result.length - 1]) {
            result.push(tempArr.splice(i, 1)[0]);
            found = true;
            break;
          }
        }
        if (!found) {
          result.push(tempArr.splice(0, 1)[0]);
        }
      }

      if (result.length > 1 && result[0] === result[result.length - 1]) {
        for (let i = 1; i < result.length - 1; i++) {
          if (result[i] !== result[0] && result[i+1] !== result[0]) {
            [result[result.length - 1], result[i]] = [result[i], result[result.length - 1]];
            break;
          }
        }
      }

      return result;
    }

    function renderWheel(texts) {
      const svg = document.getElementById('wheelSvg');
      svg.innerHTML = '';
      const sectorCount = gameState.sectors.length;
      const anglePerSector = 360 / sectorCount;
      const colorMap = {};
      texts.forEach((t, i) => colorMap[t] = colors[i % colors.length]);

      gameState.sectors.forEach((text, idx) => {
        const startAngle = idx * anglePerSector;
        const endAngle = (idx + 1) * anglePerSector;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;

        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);

        const path = `M 200 200 L ${x1} ${y1} A 200 200 0 ${anglePerSector > 180 ? 1 : 0} 1 ${x2} ${y2} Z`;
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', path);
        p.setAttribute('fill', colorMap[text]);
        p.setAttribute('stroke', '#fff');
        p.setAttribute('stroke-width', '1');
        svg.appendChild(p);

        const midAngle = (startAngle + endAngle) / 2;
        const midRad = (midAngle - 90) * Math.PI / 180;
        const tx = 200 + 130 * Math.cos(midRad);
        const ty = 200 + 130 * Math.sin(midRad);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', tx); t.setAttribute('y', ty);
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'middle');
        t.setAttribute('font-size', sectorCount > 30 ? '12' : '18');
        t.setAttribute('font-weight', 'bold'); t.setAttribute('fill', '#fff');
        t.setAttribute('transform', `rotate(${midAngle} ${tx} ${ty})`);
        t.textContent = text;
        svg.appendChild(t);
      });
    }

    function startGame() {
      gameState.dartAngle = Math.random() * 360;
      const dartX = 200 + 180 * Math.cos((gameState.dartAngle - 90) * Math.PI / 180);
      const dartY = 200 + 180 * Math.sin((gameState.dartAngle - 90) * Math.PI / 180);
      
      const dartsContainer = document.getElementById('dartsContainer');
      const dart = document.createElement('div');
      dart.className = 'dart';
      dart.style.left = dartX + 'px';
      dart.style.top = dartY + 'px';
      dart.textContent = '🎯';
      dartsContainer.appendChild(dart);

      const sectorCount = gameState.sectors.length;
      const anglePerSector = 360 / sectorCount;
      const sectorIndex = Math.floor((gameState.dartAngle + 90) / anglePerSector) % sectorCount;
      const result = gameState.sectors[sectorIndex];
      
      document.getElementById('statusText').innerHTML = `🎉 飞镖命中：<span style="font-size: 1.8rem; color: #ff6b35;">${result}</span>`;
    }

    window.addEventListener('load', updateWheel);
  </script>
</body>
</html>
