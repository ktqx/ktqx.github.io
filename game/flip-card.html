<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 幸运大翻牌 - Game Hub</title>
  <style>
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.3rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .navbar-logo span {
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      font-size: 0.9rem;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
      --big-prize:       #ff4d4f;
      --mid-prize:       #faad14;
      --small-prize:     #52c41a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      padding-top: 70px; 
    }

    /* ===== 金币大捷雨 ===== */
    .gold-rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -50px;
      font-weight: 900;
      color: rgba(247, 184, 1, 0.75);
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.4);
      user-select: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(115vh) rotate(360deg); }
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 600px; 
      background: rgba(15, 20, 25, 0.95);
      border: 2px solid var(--accent-gold);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 0 40px rgba(247, 184, 1, 0.15);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      z-index: 20;
    }

    /* ===== 标题区 ===== */
    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 8px; 
      min-height: 40px;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(247, 184, 1, 0.4);
      letter-spacing: 1px;
    }

    /* 齿轮配置按钮 */
    .settings-toggle {
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--accent-gold);
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100; /* 确保高于一切面板 */
    }
    .settings-toggle:hover {
      transform: translateY(-50%) rotate(45deg);
    }

    /* ===== 【彻底修复】独立防击穿轻量遮罩层 ===== */
    .config-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999; /* 夹在主页面和设置面板中间 */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .config-overlay.active {
      opacity: 1;
      pointer-events: auto; /* 激活时拦截背景点击以关闭面板 */
    }

    /* ===== 【彻底修复】高对比度、绝对可编辑的全新精简设置面板 ===== */
    .config-panel {
      position: absolute;
      top: 45px;
      left: 4px;
      background: linear-gradient(135deg, #1b1625 0%, #2a1b3d 100%); /* 深邃高级紫金配色，高反差 */
      border: 2px solid #ffd700;
      border-radius: 14px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px;
      width: 280px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(255, 215, 0, 0.1);
      transform: translateY(-10px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1005; /* 核心：确保层级在遮罩层之上 */
      text-align: left;
    }

    .config-panel.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto; /* 激活时内部完全允许输入 */
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .config-group.full-width {
      grid-column: span 2;
    }

    .config-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: #ffd700; /* 明亮金黄色标签 */
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    /* 输入框绝对独立聚焦层级 */
    .config-input {
      width: 100%; 
      padding: 8px;
      background: #000000; /* 纯黑底色，确保输入的白色数字极其醒目 */
      border: 1px solid #ffd700;
      border-radius: 6px;
      color: #ffffff; /* 纯白高亮文字 */
      font-size: 1rem;
      font-weight: 900;
      outline: none;
      text-align: center;
      position: relative;
      z-index: 1010; /* 绝对最高交互层级，100%可点击修改 */
      transition: all 0.2s;
    }
    .config-input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      background: #111111;
    }

    /* ===== 游戏数据统计 ===== */
    .stats {
      margin: 0 auto 10px; 
      font-size: 1rem;
      display: flex;
      justify-content: center;
      gap: 25px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 15px;
      border-radius: 10px;
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.2rem;
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.3);
    }

    /* ===== 游戏核心舞台 ===== */
    .game-stage {
      position: relative;
      width: 100%;
      margin: 0 auto 15px;
    }

    /* ===== LED 自适应中置战报面板 ===== */
    .marquee-report-panel {
      position: absolute;
      top: 33%; 
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: 96%;
      max-width: 480px;
      background: linear-gradient(135deg, rgba(30, 5, 10, 0.98) 0%, rgba(10, 2, 5, 0.99) 100%);
      border: 3px solid #ff4757;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(255, 71, 87, 0.9), inset 0 0 20px rgba(255, 71, 87, 0.4);
      border-radius: 16px;
      padding: 14px 8px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      opacity: 0;
      pointer-events: none; 
      z-index: 90; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .marquee-report-panel.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .report-item { text-align: center; }
    .report-title { font-size: 0.75rem; color: #f3a6b0; margin-bottom: 2px; letter-spacing: 1px; }
    .report-val-big { font-size: 1.5rem; font-weight: 900; color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.6); line-height: 1.1; }
    .report-val-big.gold { color: var(--accent-gold); text-shadow: 0 0 10px rgba(247, 184, 1, 0.6); }

    /* ===== 翻牌卡片矩阵区域 ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; 
      perspective: 1000px;
      padding: 4px;
      width: 100%;
    }

    .card {
      width: 100%;
      aspect-ratio: 0.714;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
      transform-style: flat;
    }

    .card:hover:not(.flipped) {
      transform: translateY(-4px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
    }

    /* ===== 【全新重绘】唯美小圆点与梦幻星光牌面背面图案 ===== */
    .card-front {
      /* 深邃星空蓝背景底色 */
      background-color: #0b112c; 
      background-image: 
        /* 1. 中心散射朦胧微光 */
        radial-gradient(circle at 50% 50%, rgba(255, 220, 100, 0.2) 0%, transparent 65%),
        /* 2. 手工精绘规律排布的半透明小圆点阵列 */
        radial-gradient(rgba(255, 255, 255, 0.15) 15%, transparent 16%),
        radial-gradient(rgba(255, 215, 0, 0.12) 15%, transparent 16%);
      background-size: 100% 100%, 16px 16px, 16px 16px;
      background-position: 0 0, 0 0, 8px 8px;
      
      color: #ffd700;
      font-size: 2.2rem;
      border: 2px solid rgba(255, 215, 0, 0.6);
      /* 纯洁轻盈的星光字影 */
      text-shadow: 0 0 10px rgba(255, 235, 120, 0.6);
      z-index: 1;
      overflow: hidden;
    }
    
    /* 3. 正中心利用伪元素绘制一颗优雅挺拔的十字小星光（✨效果） */
    .card-front::before {
      content: '✦';
      position: absolute;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.85);
      top: 12%;
      left: 15%;
      text-shadow: 0 0 6px #fff;
    }
    .card-front::after {
      content: '✦';
      position: absolute;
      font-size: 0.8rem;
      color: rgba(255, 215, 0, 0.7);
      bottom: 12%;
      right: 15%;
      text-shadow: 0 0 4px #ffd700;
    }

    .card-back {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 4px;
      border: 1.5px solid rgba(247, 184, 1, 0.3);
      overflow: hidden;
    }

    .card-amount { font-size: 1.1rem; font-weight: bold; position: relative; z-index: 1; }
    .card-label { font-size: 0.7rem; opacity: 0.9; position: relative; z-index: 1; background: rgba(0, 0, 0, 0.3); padding: 1px 4px; border-radius: 3px; }

    .card-back.big-prize { background: linear-gradient(135deg, #ff4d4f, #cf1322); border-color: rgba(255, 77, 79, 0.5); }
    .card-back.mid-prize { background: linear-gradient(135deg, #2b1055, #511281); border-color: rgba(250, 173, 20, 0.6); color: #f7b801; }
    .card-back.small-prize { background: linear-gradient(135deg, #52c41a, #389e0d); border-color: rgba(82, 196, 26, 0.5); }

    .card.dimmed {
      opacity: 0.35;
      filter: grayscale(50%);
      transition: all 0.3s ease;
    }

    /* ===== 操作按钮 ===== */
    .btn-spin {
      width: 180px;
      margin: 0 auto;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.25);
      display: block;
    }

    /* ===== 移动端专属响应式微调 ===== */
    @media (max-width: 480px) {
      body { padding: 66px 6px 10px; }
      .navbar { padding: 0 8px; justify-content: space-between; height: 56px; }
      .navbar-spacer { display: none; }
      .navbar-nav { display: flex; overflow-x: auto; gap: 8px; flex: 1; margin-left: 6px; scrollbar-width: none; }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 4px 8px; font-size: 0.8rem; }
      
      .container { padding: 10px 8px; border-radius: 16px; }
      .title { font-size: 1.4rem; }
      .settings-toggle { font-size: 1.4rem; left: 2px; }
      .stats { gap: 15px; font-size: 0.9rem; padding: 6px 10px; margin-bottom: 8px; }
      .stat-val { font-size: 1.05rem; }
      
      .card-grid { gap: 5px; padding: 2px; }
      .card-front { font-size: 1.7rem; border-width: 2px; }
      .card-amount { font-size: 0.95rem; }
      .card-label { font-size: 0.65rem; padding: 1px 3px; }
      
      .btn-spin { width: 150px; font-size: 0.95rem; padding: 8px 12px; }
      
      .marquee-report-panel { 
        padding: 10px 4px; 
        width: 98%; 
        top: 33.5%; 
      }
      .report-val-big { font-size: 1.25rem; }
      .report-title { font-size: 0.7rem; }
      
      .config-panel {
        width: 250px;
        gap: 8px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="gold-rain-container" id="goldRainContainer"></div>

  <nav class="navbar">
    <a href="#" class="navbar-logo">
      <span>🎮</span> Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html" class="active">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 射击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html">🧧 抢红包</a>
      <a href="dice-arena.html">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="config-overlay" id="configOverlay" onclick="toggleSettings()"></div>

  <div class="container">
    <div class="header">
      <button class="settings-toggle" onclick="toggleSettings()" title="游戏设置">⚙️</button>
      <div class="title">🎰 幸运大翻牌</div>

      <div class="config-panel" id="configPanel">
        <div class="config-group full-width">
          <label class="config-label">总奖池金额 (￥)</label>
          <input type="number" id="totalAmount" class="config-input" value="50" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">单张最小</label>
          <input type="number" id="minAmount" class="config-input" value="2" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">单张最大</label>
          <input type="number" id="maxAmount" class="config-input" value="10" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">卡牌总张数</label>
          <input type="number" id="cardCount" class="config-input" value="9" min="3" max="30">
        </div>
        <div class="config-group">
          <label class="config-label">可翻牌次数</label>
          <input type="number" id="limitCount" class="config-input" value="3" min="1">
        </div>
      </div>
    </div>

    <div class="stats">
      <div>剩余机会: <span id="remainingFlips" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div class="game-stage">
      <div class="marquee-report-panel" id="marqueeReportPanel">
        <div class="report-item">
          <div class="report-title">🎉 战绩速递</div>
          <div style="font-size: 0.85rem; font-weight: 800; color: #ff4757;">翻牌大捷！</div>
        </div>
        <div class="report-item">
          <div class="report-title">🔥 斩获总奖金</div>
          <div class="report-val-big gold" id="ledTotal">￥0.00</div>
        </div>
        <div class="report-item">
          <div class="report-title">✨ 欧气评价</div>
          <div class="report-val-big" id="ledEval" style="font-size: 1.05rem; padding-top: 3px;">一本万利</div>
        </div>
      </div>

      <div id="cardGrid" class="card-grid"></div>
    </div>

    <button class="btn-spin" onclick="initGame()">重新洗牌</button>
  </div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;

      if (type === 'flip') {
        const bufferSize = audioCtx.sampleRate * 0.12; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass'; 
        noiseFilter.frequency.setValueAtTime(1200, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(3000, now + 0.1);
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.25, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        noiseNode.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);

        const oscNode = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        oscNode.type = 'triangle';
        oscNode.frequency.setValueAtTime(180, now);
        oscNode.frequency.exponentialRampToValueAtTime(60, now + 0.08);
        oscGain.gain.setValueAtTime(0.35, now);
        oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        oscNode.connect(oscGain);
        oscGain.connect(audioCtx.destination);

        noiseNode.start(now);
        noiseNode.stop(now + 0.12);
        oscNode.start(now);
        oscNode.stop(now + 0.08);

      } else if (type === 'end') {
        const freqs = [523.25, 659.25, 783.99, 1046.50]; 
        freqs.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + idx * 0.08);
          gain.gain.setValueAtTime(0.15, now + idx * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + idx * 0.08);
          osc.stop(now + idx * 0.08 + 0.25);
        });
      }
    }

    let gameState = {
      prizes: [],
      remainingFlips: 0,
      wonAmount: 0,
      isProcessing: false,
      maxAmount: 0,
      minAmount: 0
    };

    let rainTimer = null;

    function toggleSettings() {
      document.getElementById('configPanel').classList.toggle('active');
      document.getElementById('configOverlay').classList.toggle('active');
    }

    function startGoldRain() {
      const container = document.getElementById('goldRainContainer');
      container.innerHTML = '';
      const pool = ['🪙', '💰', '✨', '🃏', '💎', '★'];
      rainTimer = setInterval(() => {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.textContent = pool[Math.floor(Math.random() * pool.length)];
        drop.style.left = Math.random() * 100 + 'vw';
        drop.style.fontSize = Math.random() * 16 + 14 + 'px';
        const duration = Math.random() * 2 + 1.5;
        drop.style.animationDuration = duration + 's';
        container.appendChild(drop);
        setTimeout(() => drop.remove(), duration * 1000);
      }, 140);
    }

    function stopGoldRain() {
      if (rainTimer) clearInterval(rainTimer);
      document.getElementById('goldRainContainer').innerHTML = '';
    }

    function distributePrizes(count, total, min, max) {
      if (count * min > total) {
        showToast("❌ 失败：总额不足以支撑当前最小金额设定");
        return null;
      }
      if (count * max < total) {
        showToast("❌ 失败：总额超出了最大金额设定的上限");
        return null;
      }
      let result = [];
      let remaining = total;
      for (let i = 0; i < count - 1; i++) {
        let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
        let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
        let amount = Math.random() * (currentMax - currentMin) + currentMin;
        amount = Math.round(amount * 100) / 100;
        result.push(amount);
        remaining -= amount;
      }
      result.push(Math.round(remaining * 100) / 100);
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function getPrizeLevel(amount, minAmount, maxAmount) {
      const range = maxAmount - minAmount;
      if (range <= 0) return 'mid-prize';
      const thresholdBig = minAmount + range * 0.66;
      const thresholdMid = minAmount + range * 0.33;
      if (amount >= thresholdBig) return 'big-prize';
      if (amount >= thresholdMid) return 'mid-prize';
      return 'small-prize';
    }

    function getPrizeLevelText(level) {
      switch(level) {
        case 'big-prize': return '💎 豪礼';
        case 'mid-prize': return '✨ 大礼';
        case 'small-prize': return '🎈 好礼';
        default: return '奖励';
      }
    }

    function initGame() {
      stopGoldRain();

      document.getElementById('configPanel').classList.remove('active');
      document.getElementById('configOverlay').classList.remove('active');
      document.getElementById('marqueeReportPanel').classList.remove('active');

      const cardCount = parseInt(document.getElementById('cardCount').value) || 12;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 50;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 2;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 10;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      const grid = document.getElementById('cardGrid');
      grid.style.gridTemplateColumns = 'repeat(3, 1fr)';

      const prizes = distributePrizes(cardCount, totalAmount, minAmount, maxAmount);
      if (!prizes) return;

      gameState.prizes = prizes;
      gameState.remainingFlips = Math.min(limitCount, cardCount);
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      updateStats();
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';
      gameState.prizes.forEach((prize, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.onclick = () => flipCard(index, card);
        const prizeLevel = getPrizeLevel(prize, gameState.minAmount, gameState.maxAmount);
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back ${prizeLevel}">
              <div class="card-amount">￥${prize.toFixed(2)}</div>
              <div class="card-label">${getPrizeLevelText(prizeLevel)}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function flipCard(index, cardElement) {
      if (gameState.remainingFlips <= 0 || gameState.isProcessing) return;
      if (cardElement.classList.contains('flipped')) return;

      gameState.isProcessing = true;
      playSound('flip');
      cardElement.classList.add('flipped');
      
      gameState.remainingFlips--;
      gameState.wonAmount += gameState.prizes[index];
      updateStats();
      
      setTimeout(() => {
        gameState.isProcessing = false;
        if (gameState.remainingFlips === 0) {
          endGameAndRevealOthers();
        }
      }, 250);
    }

    function endGameAndRevealOthers() {
      gameState.isProcessing = true;
      playSound('end');

      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;
      const avgWin = gameState.wonAmount / limitCount;
      let evaluation = '运气平平';
      if (avgWin >= gameState.minAmount + (gameState.maxAmount - gameState.minAmount) * 0.6) {
        evaluation = '欧皇附体🔥';
      } else if (avgWin >= gameState.minAmount + (gameState.maxAmount - gameState.minAmount) * 0.3) {
        evaluation = '手气极佳✨';
      }

      document.getElementById('ledTotal').textContent = `￥${gameState.wonAmount.toFixed(2)}`;
      document.getElementById('ledEval').textContent = evaluation;
      
      document.getElementById('marqueeReportPanel').classList.add('active');
      startGoldRain();

      gameState.prizes.forEach((_, index) => {
        const cardEl = document.getElementById(`card-${index}`);
        if (!cardEl.classList.contains('flipped')) {
          cardEl.classList.add('flipped', 'dimmed'); 
          cardEl.onclick = null; 
        }
      });
    }

    function updateStats() {
      document.getElementById('remainingFlips').innerText = gameState.remainingFlips;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    function showToast(msg) {
      alert(msg);
    }

    window.onload = initGame;
  </script>
</body>
</html>
