<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎲 骰子对战竞技场</title>
  <style>
    :root {
      --primary-color: #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold: #f7b801;
      --dark-bg: #0a0e27;
      --light-text: #ffffff;
      --text-secondary: #a0aec0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid var(--primary-color);
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 15px 40px;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .config-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .config-item label {
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .config-item input {
      padding: 8px 12px;
      border-radius: 5px;
      border: 2px solid rgba(247, 184, 1, 0.2);
      background: rgba(26, 35, 50, 0.9);
      color: var(--light-text);
      width: 90px;
      font-size: 0.95rem;
    }

    .btn-start {
      padding: 10px 30px;
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 15px;
      align-self: center;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .game-area {
      margin: 30px 0;
      text-align: center;
    }

    .players-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin: 30px 0;
    }

    .player {
      background: rgba(217, 70, 239, 0.1);
      border: 2px solid rgba(217, 70, 239, 0.3);
      border-radius: 15px;
      padding: 20px;
    }

    .player-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin-bottom: 15px;
    }

    .dice-display {
      font-size: 4rem;
      margin: 20px 0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dice-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--secondary-color);
    }

    .player-score {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-top: 15px;
    }

    .score-value {
      font-size: 1.8rem;
      color: var(--accent-gold);
      font-weight: bold;
    }

    .result-message {
      font-size: 1.3rem;
      font-weight: bold;
      margin: 20px 0;
      color: var(--accent-gold);
      min-height: 30px;
    }

    .btn-roll {
      padding: 15px 40px;
      background: linear-gradient(135deg, #7209b7, #b5179e);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      margin: 10px;
    }

    .btn-roll:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(114, 9, 183, 0.3);
    }

    .btn-roll:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .main-content { padding: 80px 12px 30px; }
      .title { font-size: 1.6rem; }
      .players-container { gap: 15px; margin: 20px 0; }
      .dice-display { font-size: 3rem; min-height: 60px; }
    }

    @media (max-width: 480px) {
      .navbar-nav { display: none; }
      .main-content { padding: 70px 10px 20px; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      .config-panel { gap: 8px; padding: 12px; }
      .config-item input { width: 60px; font-size: 0.8rem; }
      .players-container { grid-template-columns: 1fr; gap: 15px; }
      .dice-display { font-size: 2.5rem; }
      .btn-roll { padding: 12px 30px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="game-dice-arena.html" class="active">🎲 骰子</a>
      <a href="game-golden-egg.html">🥚 金蛋</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">
      <div class="header">
        <div class="title">🎲 骰子对战竞技场</div>
      </div>

      <div class="config-panel">
        <div class="config-item">
          <label>骰子面数</label>
          <input type="number" id="diceSize" value="6" min="4" max="20">
        </div>
        <div class="config-item">
          <label>对战轮数</label>
          <input type="number" id="rounds" value="5" min="1" max="20">
        </div>
        <button class="btn-start" onclick="initGame()">开始新游戏</button>
      </div>

      <div class="game-area">
        <div class="result-message" id="resultMessage">准备就绪</div>

        <div class="players-container">
          <div class="player">
            <div class="player-name">👤 玩家 1</div>
            <div class="dice-display" id="player1Dice">🎲</div>
            <div class="player-score">
              得分: <span class="score-value" id="player1Score">0</span>
            </div>
            <button class="btn-roll" id="btn1" onclick="rollDice(1)">投掷</button>
          </div>

          <div class="player">
            <div class="player-name">🤖 玩家 2</div>
            <div class="dice-display" id="player2Dice">🎲</div>
            <div class="player-score">
              得分: <span class="score-value" id="player2Score">0</span>
            </div>
            <button class="btn-roll" id="btn2" onclick="rollDice(2)">投掷</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let gameState = {
      diceSize: 6,
      rounds: 5,
      currentRound: 0,
      player1Score: 0,
      player2Score: 0,
      player1Rolled: false,
      player2Rolled: false,
      isProcessing: false
    };

    function initGame() {
      gameState.diceSize = parseInt(document.getElementById('diceSize').value) || 6;
      gameState.rounds = parseInt(document.getElementById('rounds').value) || 5;
      gameState.currentRound = 0;
      gameState.player1Score = 0;
      gameState.player2Score = 0;
      gameState.player1Rolled = false;
      gameState.player2Rolled = false;

      document.getElementById('player1Score').textContent = '0';
      document.getElementById('player2Score').textContent = '0';
      document.getElementById('player1Dice').textContent = '🎲';
      document.getElementById('player2Dice').textContent = '🎲';
      document.getElementById('resultMessage').textContent = `第 1/${gameState.rounds} 轮 - 准备就绪`;
      document.getElementById('btn1').disabled = false;
      document.getElementById('btn2').disabled = false;
    }

    function rollDice(player) {
      if (gameState.isProcessing) return;
      if (gameState.currentRound >= gameState.rounds) {
        document.getElementById('resultMessage').textContent = '游戏已结束！';
        return;
      }

      const btn = document.getElementById('btn' + player);
      btn.disabled = true;
      gameState.isProcessing = true;

      const value = Math.floor(Math.random() * gameState.diceSize) + 1;
      const diceDisplay = document.getElementById('player' + player + 'Dice');
      
      let rollCount = 0;
      const rollInterval = setInterval(() => {
        const tempValue = Math.floor(Math.random() * gameState.diceSize) + 1;
        diceDisplay.innerHTML = `<span class="dice-value">${tempValue}</span>`;
        rollCount++;
        if (rollCount >= 10) {
          clearInterval(rollInterval);
          diceDisplay.innerHTML = `<span class="dice-value">${value}</span>`;
          
          if (player === 1) {
            gameState.player1Score += value;
            gameState.player1Rolled = true;
            document.getElementById('player1Score').textContent = gameState.player1Score;
          } else {
            gameState.player2Score += value;
            gameState.player2Rolled = true;
            document.getElementById('player2Score').textContent = gameState.player2Score;
          }

          if (gameState.player1Rolled && gameState.player2Rolled) {
            gameState.currentRound++;
            setTimeout(() => {
              if (gameState.currentRound < gameState.rounds) {
                document.getElementById('resultMessage').textContent = `第 ${gameState.currentRound + 1}/${gameState.rounds} 轮`;
                gameState.player1Rolled = false;
                gameState.player2Rolled = false;
                document.getElementById('btn1').disabled = false;
                document.getElementById('btn2').disabled = false;
              } else {
                const winner = gameState.player1Score > gameState.player2Score ? '玩家 1' : 
                               gameState.player2Score > gameState.player1Score ? '玩家 2' : '平局';
                document.getElementById('resultMessage').textContent = `🏆 游戏结束！${winner} 获胜！`;
              }
              gameState.isProcessing = false;
            }, 500);
          } else {
            gameState.isProcessing = false;
            const otherPlayer = player === 1 ? 2 : 1;
            document.getElementById('btn' + otherPlayer).disabled = false;
          }
        }
      }, 50);
    }

    window.addEventListener('load', initGame);
  </script>
</body>
</html>
