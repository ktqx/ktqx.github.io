<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧧 疯狂抢红包 - Game Hub</title>
  
  <style>
    :root {
      --primary-color:   #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold:      #f7b801;
      --gold-light:       #fff380;
      --dark-bg:          #0a0e27;
      --light-text:      #ffffff;
      --text-secondary:  #a0aec0;
      --glass-bg:         rgba(20, 25, 50, 0.5);
      --glass-border:     rgba(217, 70, 239, 0.2);
      
      /* 红包分级颜色 */
      --pkg-normal: linear-gradient(135deg, #ef4444, #991b1b);
      --pkg-medium: linear-gradient(135deg, #f59e0b, #b45309);
      --pkg-epic:   linear-gradient(135deg, #ec4899, #be185d);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%); color: var(--light-text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 75px 10px 10px; position: relative; }

    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(10, 14, 39, 0.95); border-bottom: 2px solid var(--primary-color); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 20px; z-index: 10000; box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2); }
    .navbar-logo { font-size: 1.3rem; font-weight: 900; color: var(--primary-color); display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .navbar-logo span { width: 35px; height: 35px; background: linear-gradient(135deg, var(--primary-color), #a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .navbar-spacer { flex: 1; }
    .btn-customize { background: linear-gradient(135deg, #ec4899, #d946ef); color: white !important; font-weight: bold; border: 1px solid #f472b6; box-shadow: 0 0 10px rgba(217, 70, 239, 0.4); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.9rem; }

    .gold-particle { position: fixed; pointer-events: none; z-index: 1; user-select: none; will-change: transform; animation: goldFall linear forwards; }
    @keyframes goldFall { 0% { transform: translate3d(0, -50px, 0) rotate(0deg); opacity: 0; } 10% { opacity: var(--target-op, 0.6); } 90% { opacity: var(--target-op, 0.6); } 100% { transform: translate3d(var(--drift-x, 50px), 105vh, 0) rotate(var(--target-rot, 360deg)); opacity: 0; } }

    .container { width: 100%; max-width: 600px; background: rgba(15, 20, 45, 0.85); border-radius: 16px; position: relative; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 35px rgba(247, 184, 1, 0.15); backdrop-filter: blur(15px); z-index: 10; }
    .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 16px; padding: 2px; background: linear-gradient(135deg, var(--accent-gold), var(--primary-color), var(--secondary-color)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: -1; }
    
    .page-title-zone { text-align: center; margin-bottom: 10px; }
    .page-title-zone h1 { font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, var(--accent-gold), #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .header-stats { padding: 10px; background: rgba(20, 25, 50, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; margin-bottom: 12px; display: flex; justify-content: space-around; text-align: center; }
    .stat-box { flex: 1; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 2px; }
    .stat-value { font-size: 1.4rem; font-weight: 900; color: #ef4444; }
    .budget-info { font-size: 0.7rem; color: #718096; margin-top: 1px; }

    @media (max-width: 480px) { body { padding-top: 66px; } .navbar { padding: 0 10px; } }
  </style>

  <style>
    .game-area { flex: 1; min-height: 400px; position: relative; background: rgba(5, 5, 15, 0.4); border-radius: 12px; overflow: hidden; border: 1px solid rgba(217, 70, 239, 0.1); }
    
    .settlement-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(6, 8, 24, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 20px; }
    .settlement-overlay.show { opacity: 1; pointer-events: auto; }
    .settle-card { width: 100%; max-width: 450px; background: linear-gradient(180deg, #1f1202 0%, #0c0601 100%); border: 5px solid #2b1803; box-shadow: 0 0 0 3px #f7b801, 0 0 25px rgba(247, 184, 1, 0.6), inset 0 0 20px rgba(255, 140, 0, 0.4); border-radius: 8px; padding: 25px 15px; text-align: center; position: relative; overflow: hidden; animation: popScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .settle-card::before { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 2px dashed #f7b801; opacity: 0.8; border-radius: 4px; pointer-events: none; animation: ledBlink 0.6s infinite alternate steps(2); }
    @keyframes ledBlink { 0% { border-color: #f7b801; opacity: 0.9; filter: drop-shadow(0 0 4px #f7b801); } 100% { border-color: #ef4444; opacity: 0.4; filter: drop-shadow(0 0 1px #ef4444); } }
    @keyframes popScale { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    .settle-title { font-size: 1.6rem; font-weight: 900; color: #fff380; text-shadow: 0 0 10px #f7b801, 0 0 20px #f59e0b; margin-bottom: 12px; letter-spacing: 2px; }
    .settle-main-score { font-size: 4rem; font-weight: 900; color: #ff3b30; font-family: 'Impact', 'Arial Black', sans-serif; text-shadow: 0 0 15px rgba(255,59,48,0.8), 0 0 30px rgba(255,59,48,0.4); margin-bottom: 10px; background: rgba(0, 0, 0, 0.4); border-radius: 6px; padding: 5px 0; border: 1px solid #3a1a02; }
    .settle-sub-count { font-size: 1.2rem; color: #06b6d4; text-shadow: 0 0 8px rgba(6,182,212,0.8); font-weight: 800; }

    .envelope { position: absolute; top: 0; left: 0; width: 55px; height: 75px; cursor: pointer; user-select: none; z-index: 10; will-change: transform; transform: translate3d(0, -90px, 0); background: transparent !important; border: none !important; padding: 12px; margin-top: -12px; margin-left: -12px; }
    .envelope-inner { width: 100%; height: 100%; border-radius: 8px; border: 2px solid var(--accent-gold); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); }
    .envelope-inner::after { content: '🧧'; font-size: 1.7rem; }

    .pkg-normal .envelope-inner { background: var(--pkg-normal); }
    .pkg-medium .envelope-inner { background: var(--pkg-medium); box-shadow: 0 0 12px rgba(245, 158, 11, 0.7); }
    .pkg-epic .envelope-inner { background: var(--pkg-epic); border-color: #fff380; animation: superGlow 0.6s infinite alternate ease-in-out; }
    @keyframes superGlow { 0% { box-shadow: 0 0 8px #d946ef; filter: brightness(1.1); } 100% { box-shadow: 0 0 20px #f7b801; filter: brightness(1.3); } }

    .envelope.hit { animation: hitAnim 0.18s ease-out forwards; pointer-events: none; }
    @keyframes hitAnim { 0% { transform: translate3d(var(--tx), var(--ty), 0) scale(1); opacity: 1; } 100% { transform: translate3d(var(--tx), var(--ty), 0) scale(1.4); opacity: 0; } }

    .float-text { position: absolute; font-weight: 900; color: var(--gold-light); pointer-events: none; z-index: 50; animation: floatUp 0.5s ease-out forwards; text-shadow: 0 0 6px rgba(247,184,1,0.8), 0 1px 3px #000; font-size: 1.2rem; }
    @keyframes floatUp { 0% { transform: translate3d(0, 0, 0) scale(0.8); opacity: 1; } 100% { transform: translate3d(0, -50px, 0) scale(1.2); opacity: 0; } }

    .legend-bar { display: flex; justify-content: center; gap: 12px; padding: 10px 5px 0; font-size: 0.75rem; color: var(--text-secondary); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .footer { padding-top: 15px; display: flex; justify-content: center; }
    .main-btn { width: 100%; max-width: 400px; height: 48px; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--primary-color), #a855f7); color: white; font-size: 1rem; font-weight: 800; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4); z-index: 20; }
    .main-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217, 70, 239, 0.6); }
    .main-btn.running { cursor: not-allowed; transform: none; box-shadow: none; background: #1a1e36; border: 1px solid var(--glass-border); }
    .main-btn.settled { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
    .btn-progress { position: absolute; left: 0; top: 0; height: 100%; background: rgba(255, 255, 255, 0.15); width: 0%; }
    .btn-content { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 6px; }

    @media (max-width: 480px) { .envelope { width: 48px; height: 66px; padding: 8px; margin-top: -8px; margin-left: -8px; } .envelope-inner::after { font-size: 1.4rem; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo"><span>🎮</span> Game Hub</a>
    <div class="navbar-spacer"></div>
    <a href="#" class="btn-customize" onclick="shellCustomizeLink()">✨ 定制本游戏</a>
  </nav>

  <div class="container">
    <div class="page-title-zone">
      <h1 id="shellGameTitle">正在载入...</h1>
    </div>

    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-label">已抢总金额</div>
        <div class="stat-value" id="scoreBox">¥<span id="score">0.00</span></div>
        <div class="budget-info">剩余可用预算: ¥<span id="remBudget">0.00</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">击中红包数</div>
        <div class="stat-value" id="countBox"><span id="count">0</span></div>
        <div class="budget-info">未掉落/落空: <span id="remCount">0</span>个</div>
      </div>
    </div>

    <div class="game-area" id="gameArea">
      <div class="settlement-overlay" id="settleOverlay">
        <div class="settle-card">
          <div class="settle-title">🎰 终极战报 🎰</div>
          <div class="settle-main-score" id="settleScore">¥0.00</div>
          <div class="settle-sub-count" id="settleCount">共击中 0 个红包</div>
        </div>
      </div>
    </div>

    <div class="legend-bar">
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div>普通包 (稳速)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>好运包 (中速)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ec4899;"></div>至尊爆金包 (极速)</div>
    </div>

    <div class="footer">
      <button class="main-btn" id="mainBtn" onclick="handleBtnClick()">
        <div class="btn-progress" id="btnProgress"></div>
        <span class="btn-content" id="btnText">🚀 开启红包雨</span>
      </button>
    </div>
  </div>

  <script>
    const CURRENT_GAME_ID = "red-envelope"; 
    const DEFAULT_GAME_TITLE = "🧧 疯狂抢红包";

    // 默认红包雨玩法核心参数配置
    let SERVER_CONFIG = {
      title: DEFAULT_GAME_TITLE, 
      totalAmount: 50,    // 对应原本的 cfgTotalBudget (总预算)
      cardCount: 50,      // 对应原本的 cfgTotalCount (红包总数)
      minAmount: 0.2,     // 对应原本的 cfgMinAmt (单项最小)
      maxAmount: 3.0      // 对应原本的 cfgMaxAmt (单项最大)
    };

    function shellLoadConfig() {
      const urlParams = new URLSearchParams(window.location.search);
      const merchantId = urlParams.get('merchant');
      const localCustomConfig = localStorage.getItem(`config_${merchantId}_${CURRENT_GAME_ID}`);
      
      if (localCustomConfig) {
        SERVER_CONFIG = JSON.parse(localCustomConfig);
      } else if (merchantId) {
        SERVER_CONFIG.title = "🏪 商家专属·限时特惠红包雨";
        SERVER_CONFIG.totalAmount = 100;
        SERVER_CONFIG.cardCount = 60;
      }
      document.getElementById('shellGameTitle').innerText = SERVER_CONFIG.title;
      document.title = SERVER_CONFIG.title + " - Game Hub";
    }

    function shellCustomizeLink() {
      window.location.href = `register.html?game_id=${CURRENT_GAME_ID}`;
    }

    window.onload = function() {
      shellLoadConfig();
      initCustomGame(SERVER_CONFIG);
    };
  </script>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClickSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    const gameArea = document.getElementById('gameArea');
    const mainBtn = document.getElementById('mainBtn');
    const btnProgress = document.getElementById('btnProgress');
    const btnText = document.getElementById('btnText');
    const settleOverlay = document.getElementById('settleOverlay');
    const settleScore = document.getElementById('settleScore');
    const settleCount = document.getElementById('settleCount');

    const GAME_DURATION = 10; 

    let state = { active: false, settled: false, score: 0, count: 0, timeLeft: 0, remBudget: 0, remCount: 0, cfg: {} };
    let lanes = []; let lastPickedLaneId = -1; let activeEnvelopes = []; let precalculatedAmounts = []; 
    let gameTimer = null; let spawnTimer = null; let goldRainTimer = null;

    function handleBtnClick() {
      if (state.active) return;
      if (state.settled) { resetGame(); } else { startGame(); }
    }

    function initLanes() {
      const areaWidth = gameArea.clientWidth;
      const envelopeWidth = areaWidth <= 480 ? 48 : 55;
      const laneCount = Math.floor(areaWidth / (envelopeWidth + 16));
      const spacing = (areaWidth - (laneCount * envelopeWidth)) / (laneCount + 1);
      lanes = [];
      for (let i = 0; i < laneCount; i++) { lanes.push({ id: i, leftPos: spacing + i * (envelopeWidth + spacing) }); }
    }

    function generateAmountPool(totalBudget, totalCount, minAmt, maxAmt) {
      let pool = []; let remainingBudget = totalBudget;
      for (let i = 0; i < totalCount - 1; i++) {
        let remainingCount = totalCount - i; let safetyBuffer = (remainingCount - 1) * minAmt;
        let currentMax = Math.min(maxAmt, remainingBudget - safetyBuffer);
        let avg = remainingBudget / remainingCount; let limit = Math.min(currentMax, avg * 2);
        if (limit < minAmt) limit = minAmt;
        let amt = Math.random() * (limit - minAmt) + minAmt; amt = Math.round(amt * 100) / 100;
        pool.push(amt); remainingBudget -= amt;
      }
      pool.push(Math.round(remainingBudget * 100) / 100);
      for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
      return pool;
    }

    function initCustomGame(serverConfig) {
      state.cfg = {
        totalBudget: parseFloat(serverConfig.totalAmount) || 50,
        totalCount: parseInt(serverConfig.cardCount) || 50,
        minAmt: parseFloat(serverConfig.minAmount) || 0.2,
        maxAmt: parseFloat(serverConfig.maxAmount) || 3.0,
        duration: GAME_DURATION
      };
      state.remBudget = state.cfg.totalBudget;
      state.remCount = state.cfg.totalCount;
      updateDisplay();
    }

    function startGame() {
      if (state.cfg.minAmt * state.cfg.totalCount > state.cfg.totalBudget) {
        alert("❌ 配置冲突：最小金额 × 总数量 已经超出了总预算，请联系商家重置！");
        return;
      }

      initLanes();
      settleOverlay.classList.remove('show');
      stopGoldRain();

      precalculatedAmounts = generateAmountPool(state.cfg.totalBudget, state.cfg.totalCount, state.cfg.minAmt, state.cfg.maxAmt);

      state.active = true; state.settled = false; state.score = 0; state.count = 0;
      state.timeLeft = state.cfg.duration; state.remBudget = state.cfg.totalBudget; state.remCount = state.cfg.totalCount;

      mainBtn.className = 'main-btn running'; 
      updateDisplay();

      btnProgress.style.transition = 'none'; btnProgress.style.width = '0%';
      setTimeout(() => { btnProgress.style.transition = `width ${state.cfg.duration}s linear`; btnProgress.style.width = '100%'; }, 50);

      btnText.textContent = `⏱️ 倒计时: ${state.timeLeft}s`;
      gameTimer = setInterval(() => {
        state.timeLeft--;
        if (state.timeLeft <= 0) { btnText.textContent = `⏱️ 冲刺收尾中...`; clearInterval(gameTimer); } 
        else { btnText.textContent = `⏱️ 倒计时: ${state.timeLeft}s`; }
      }, 1000);

      requestAnimationFrame(updateGamePhysics);
      spawnController();
    }

    function spawnController() {
      if (!state.active || state.remCount <= 0) return;
      let availableLanes = lanes;
      if (lanes.length > 2) { availableLanes = lanes.filter(l => Math.abs(l.id - lastPickedLaneId) > 1); } 
      else if (lanes.length > 1) { availableLanes = lanes.filter(l => l.id !== lastPickedLaneId); }
      
      const pickedLane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
      lastPickedLaneId = pickedLane.id;
      createEnvelope(pickedLane);

      if (state.remCount > 0) {
        const interval = (state.timeLeft * 1000) / (state.remCount + 1);
        const nextDelay = Math.max(90, Math.min(interval, 400));
        spawnTimer = setTimeout(spawnController, nextDelay);
      }
    }

    function createEnvelope(lane) {
      if (precalculatedAmounts.length === 0) return;
      const envelope = document.createElement('div'); envelope.className = 'envelope';
      const inner = document.createElement('div'); inner.className = 'envelope-inner';
      envelope.appendChild(inner);

      const amount = precalculatedAmounts.pop();
      const range = (state.cfg.maxAmt - state.cfg.minAmt) / 3;
      let speed = 5.0; 

      if (amount < state.cfg.minAmt + range) { envelope.classList.add('pkg-normal'); speed = 3.5 + Math.random() * 0.8; } 
      else if (amount < state.cfg.minAmt + (range * 2)) { envelope.classList.add('pkg-medium'); speed = 4.8 + Math.random() * 1.0; } 
      else { envelope.classList.add('pkg-epic'); speed = 6.2 + Math.random() * 1.2; }

      state.remCount--; updateDisplay();
      gameArea.appendChild(envelope);

      activeEnvelopes.push({ el: envelope, x: lane.leftPos, y: -90, speed: speed, amount: amount });
      envelope.onpointerdown = () => { onHit(envelope); };
    }

    function updateGamePhysics() {
      if (!state.active && activeEnvelopes.length === 0) return;
      const viewHeight = gameArea.clientHeight;

      for (let i = activeEnvelopes.length - 1; i >= 0; i--) {
        const p = activeEnvelopes[i];
        if (!state.active) { p.el.remove(); activeEnvelopes.splice(i, 1); continue; }
        p.y += p.speed; p.el.style.transform = `translate3d(${p.x}px, ${p.y}px, 0)`;

        if (p.y > viewHeight) { state.remBudget -= p.amount; p.el.remove(); activeEnvelopes.splice(i, 1); updateDisplay(); }
      }

      if (state.remCount === 0 && activeEnvelopes.length === 0 && state.active) { endGame(); return; }
      if (state.active || activeEnvelopes.length > 0) { requestAnimationFrame(updateGamePhysics); }
    }

    function onHit(el) {
      const idx = activeEnvelopes.findIndex(item => item.el === el); if (idx === -1) return;
      const data = activeEnvelopes[idx];
      el.style.setProperty('--tx', `${data.x}px`); el.style.setProperty('--ty', `${data.y}px`);
      el.classList.add('hit'); playClickSound();

      const finalAmt = Math.min(data.amount, state.remBudget);
      state.score += finalAmt; state.count++; state.remBudget -= finalAmt;

      showFloatText(data.x, data.y, `+¥${finalAmt.toFixed(2)}`);
      updateDisplay();
      activeEnvelopes.splice(idx, 1);
      setTimeout(() => el.remove(), 180);
    }

    function showFloatText(x, y, text) {
      const ft = document.createElement('div'); ft.className = 'float-text'; ft.style.transform = `translate3d(${x + 10}px, ${y}px, 0)`; ft.textContent = text;
      gameArea.appendChild(ft); setTimeout(() => ft.remove(), 500);
    }

    function updateDisplay() {
      document.getElementById('score').textContent = state.score.toFixed(2);
      document.getElementById('count').textContent = state.count;
      document.getElementById('remBudget').textContent = Math.max(0, state.remBudget).toFixed(2);
      document.getElementById('remCount').textContent = Math.max(0, state.remCount);
    }

    function startGoldRain() {
      if (goldRainTimer) clearInterval(goldRainTimer);
      const elements = ["🧧", "💰", "✨", "🎉", "8", "6"];
      goldRainTimer = setInterval(() => {
        const particle = document.createElement('div'); particle.className = 'gold-particle';
        const isText = Math.random() > 0.4;
        if (isText) {
          particle.textContent = elements[Math.floor(Math.random() * elements.length)];
          particle.style.fontSize = `${Math.random() * 16 + 14}px`; particle.style.fontWeight = "bold";
          particle.style.color = Math.random() > 0.5 ? "var(--accent-gold)" : "var(--gold-light)";
          particle.style.textShadow = "0 0 5px rgba(247,184,1,0.5)";
        } else {
          particle.style.width = `${Math.random() * 12 + 6}px`; particle.style.height = `${Math.random() * 6 + 4}px`;
          particle.style.background = Math.random() > 0.5 ? "linear-gradient(90deg, #f7b801, #fff380)" : "linear-gradient(90deg, #ff3b30, #ff9500)";
          particle.style.borderRadius = "2px";
        }
        particle.style.left = `${Math.random() * 100}vw`;
        const duration = Math.random() * 2 + 2; const opacity = Math.random() * 0.4 + 0.4; const driftX = Math.random() * 160 - 80; const rotation = Math.random() * 360 + 360;
        particle.style.animationDuration = `${duration}s`; particle.style.setProperty('--target-op', opacity); particle.style.setProperty('--drift-x', `${driftX}px`); particle.style.setProperty('--target-rot', `${rotation}deg`);
        document.body.appendChild(particle);
        setTimeout(() => { particle.remove(); }, duration * 1000);
      }, 60);
    }

    function stopGoldRain() { if (goldRainTimer) { clearInterval(goldRainTimer); goldRainTimer = null; } const leftovers = document.querySelectorAll('.gold-particle'); leftovers.forEach(p => p.remove()); }

    function endGame() {
      if (gameTimer) clearInterval(gameTimer); if (spawnTimer) clearTimeout(spawnTimer);
      state.active = false; state.settled = true;
      activeEnvelopes.forEach(item => item.el.remove()); activeEnvelopes = [];
      
      settleScore.textContent = `¥${state.score.toFixed(2)}`;
      settleCount.textContent = `共击中 ${state.count} 个红包`;
      settleOverlay.classList.add('show');

      mainBtn.className = 'main-btn settled'; btnProgress.style.width = '0%';
      btnText.innerHTML = `✨ 结算完毕 | 点此重新开始`;
      startGoldRain();
    }

    function resetGame() {
      if (spawnTimer) clearTimeout(spawnTimer);
      state.settled = false; stopGoldRain();
      const floats = gameArea.querySelectorAll('.float-text, .envelope'); floats.forEach(f => f.remove());
      settleOverlay.classList.remove('show');
      mainBtn.className = 'main-btn'; btnText.textContent = '🚀 开启红包雨'; btnProgress.style.width = '0%';
      state.score = 0; state.count = 0; precalculatedAmounts = [];
      initCustomGame(SERVER_CONFIG);
    }
  </script>
  <script src="navbar.js"></script>
</body>
</html>
