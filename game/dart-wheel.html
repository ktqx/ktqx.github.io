<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎯 射击大转盘</title>
  <style>
    /* ===== CSS 变量 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:     #f7b801;
      --dark-bg:         #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      padding-top: 85px;
      cursor: crosshair;
    }

    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 手机端导航栏适配 ===== */
    @media (max-width: 480px) {
      body { padding: 70px 10px 15px; }
      .navbar { padding: 0 10px; justify-content: space-between; }
      .navbar-spacer { display: none; }
      .navbar-nav {
        display: flex; 
        overflow-x: auto; 
        -webkit-overflow-scrolling: touch;
        gap: 10px;
        padding: 0 5px;
        flex: 1;
        margin-left: 10px;
        scrollbar-width: none; 
      }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 5px 10px; font-size: 0.85rem; }
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    .header { text-align: center; margin-bottom: 25px; }
    .title { font-size: 2.2rem; font-weight: 900; color: var(--accent-gold); margin-bottom: 8px; text-shadow: 0 0 20px rgba(247, 184, 1, 0.4); letter-spacing: 2px; }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      width: 100%;
      overflow: hidden;
    }

    .config-input, .config-select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
    }

    .config-group { display: flex; flex-direction: column; gap: 6px; }
    .config-label { font-size: 0.85rem; font-weight: 700; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 1px; }
    .config-input:focus, .config-select:focus { border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(247, 184, 1, 0.3); }

    .distribution-preview {
      grid-column: 1 / -1;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 4px solid var(--accent-gold);
      margin-top: 5px;
    }

    /* ===== 转盘区域 ===== */
    .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-bottom: 25px; }
    .wheel-container { position: relative; width: 100%; max-width: 480px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; cursor: crosshair; }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 0 0 8px var(--accent-gold),
        0 0 0 12px rgba(247, 184, 1, 0.3);
      position: relative;
      overflow: hidden;
      transition: transform 0.05s linear;
    }

    .wheel svg { width: 100%; height: 100%; }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, var(--accent-gold) 0%, #d4a500 100%);
      border-radius: 50%;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .darts-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }

    /* 精准无争议：子弹弹孔样式 */
    .bullet-hole {
      position: absolute;
      width: 30px;
      height: 30px;
      /* 将绝对中心点对齐在判定坐标上 */
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    /* 弹孔视觉中心点 */
    .bullet-hole::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #11141a;
      border-radius: 50%;
      border: 1.5px solid #ff3333;
      box-shadow: 0 0 8px #ff3333;
    }

    /* 弹孔周边的开裂/火花层 */
    .bullet-hole::after {
      content: '💥';
      font-size: 1.6rem;
      position: absolute;
      transform: scale(1.1);
      opacity: 0.9;
    }

    /* 击中冲击波涟漪 */
    .hit-ripple {
      position: absolute;
      border: 2px solid rgba(255, 60, 60, 0.8);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: rippleEffect 0.4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 60px; height: 60px; opacity: 0; }
    }

    .crosshair { position: absolute; width: 40px; height: 40px; pointer-events: none; z-index: 6; display: none; }
    .crosshair.active { display: block; }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: var(--accent-gold); box-shadow: 0 0 10px var(--accent-gold); }
    .crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .crosshair::after { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }

    /* ===== 控制面板 ===== */
    .control-panel { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
    .status-text { font-size: 1.1rem; font-weight: 700; color: var(--accent-gold); text-align: center; min-height: 30px; }

    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 18px 30px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }
    .btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5); }
    .btn-start:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 768px) {
      .container { padding: 15px; }
      .title { font-size: 1.6rem; }
      .config-panel { grid-template-columns: 1fr; }
      .wheel-container { max-width: 340px; }
    }
</style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span> Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html">🎰 幸运牌</a>
      <a href="dart-wheel.html" class="active">🎯 射击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html">🧧 抢红包</a>
      <a href="dice-arena.html">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <div class="title">🎯 射击大转盘</div>
    </div>

    <div class="config-panel">
      <div class="config-group">
        <label class="config-label">转盘等分</label>
        <input type="number" class="config-input" id="sectorCount" value="20" min="4" max="60" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">转盘内容</label>
        <input type="text" class="config-input" id="sectorTexts" value="好,中,差" placeholder="如: 8,9,10" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">概率分布</label>
        <select class="config-select" id="distMode" onchange="updateWheel()">
          <option value="jackpot">🏆 大奖模式 (首项稀有，其余平分)</option>
          <option value="polar">🔥 极化分布 (两头多，中间少)</option>
          <option value="equal">⚖️ 绝对平分 (所有项概率相同)</option>
          <option value="asc">📈 递增分布 (按顺序概率变大)</option>
          <option value="desc">📉 递减分布 (按顺序概率变小)</option>
        </select>
      </div>

      <div class="config-group" id="manualInputGroup" style="display: none;">
        <label class="config-label">手动分配数量 (需总和等于等分数)</label>
        <input type="text" class="config-input" id="sectorCounts" value="7,7,6" placeholder="如: 7,7,6" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">减速时长(秒)</label>
        <input type="number" class="config-input" id="decelerationTime" value="5" min="1" max="20" step="0.5">
      </div>

      <div class="distribution-preview" id="distPreview">当前分配：正在计算...</div>
    </div>

    <div class="wheel-section">
      <div class="wheel-container" id="wheelContainer">
        <div class="crosshair" id="crosshair"></div>
        <div class="wheel" id="wheel">
          <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
          <div class="darts-container" id="dartsContainer"></div>
          <div class="wheel-center">🎯</div>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <div class="status-text" id="statusText">准备就绪</div>
      <button class="btn-start" id="startBtn" onclick="startGame()">🚀 开始游戏</button>
    </div>
  </div>

  <script>
    /* ===== 游戏状态 ===== */
    const gameState = {
      isSpinning: false,
      isDecelerating: false,
      currentRotation: 0,
      wheelRotationSpeed: 0,
      sectors: [],
      dartAngle: null,
      decelerationRate: 0.992
    };

    const colors = ["#ff6b35", "#004e89", "#f7b801", "#2ec4b6", "#e71d36", "#7209b7", "#4cc9f0"];

    /* ===== 智能交叉洗牌算法 ===== */
    function distributeSectorsEvenly(pool) {
      const frequencyMap = new Map();
      pool.forEach(item => {
        const count = frequencyMap.get(item.text) || { item: item, count: 0 };
        count.count++;
        frequencyMap.set(item.text, count);
      });

      const sortedGroups = Array.from(frequencyMap.values()).sort((a, b) => b.count - a.count);
      const totalSize = pool.length;
      const result = new Array(totalSize).fill(null);

      let pointer = 0;
      sortedGroups.forEach(group => {
        for (let i = 0; i < group.count; i++) {
          while (result[pointer] !== null) {
            pointer = (pointer + 1) % totalSize;
          }
          result[pointer] = { ...group.item };
          pointer = (pointer + 2) % totalSize;
        }
      });

      for (let i = 0; i < totalSize; i++) {
        const next = (i + 1) % totalSize;
        if (result[i].text === result[next].text) {
          for (let j = 2; j < totalSize - 1; j++) {
            const target = (i + j) % totalSize;
            if (result[target].text !== result[i].text && result[(target + 1) % totalSize].text !== result[i].text) {
              [result[next], result[target]] = [result[target], result[next]];
              break;
            }
          }
        }
      }
      return result;
    }

    /* ===== 初始化转盘 ===== */
    function updateWheel() {
      const sectorCount = parseInt(document.getElementById('sectorCount').value) || 20;
      const texts = document.getElementById('sectorTexts').value.split(',').map(s => s.trim());
      const mode = document.getElementById('distMode').value;
      
      const manualGroup = document.getElementById('manualInputGroup');
      manualGroup.style.display = (mode === 'manual') ? 'flex' : 'none';

      let counts = [];
      const n = texts.length;

      if (mode === 'equal') {
        const base = Math.floor(sectorCount / n);
        counts = new Array(n).fill(base);
        for(let i=0; i < sectorCount % n; i++) counts[i]++;
      } 
      else if (mode === 'jackpot') {
        counts = new Array(n).fill(Math.floor((sectorCount - 1) / (n - 1)));
        counts[0] = 1;
        let sum = counts.reduce((a,b) => a+b, 0);
        while(sum < sectorCount) { counts[n-1]++; sum++; }
      }
      else if (mode === 'asc' || mode === 'desc') {
        let totalWeight = (n * (n + 1)) / 2;
        let unit = sectorCount / totalWeight;
        counts = texts.map((_, i) => Math.max(1, Math.round((i + 1) * unit)));
        if (mode === 'desc') counts.reverse();
        adjustCounts(counts, sectorCount);
      }
      else if (mode === 'polar') {
        counts = texts.map((_, i) => {
          const mid = (n - 1) / 2;
          const dist = Math.abs(i - mid);
          return Math.max(1, Math.round(dist + 1));
        });
        adjustCounts(counts, sectorCount);
      }
      else if (mode === 'manual') {
        counts = document.getElementById('sectorCounts').value.split(',').map(s => parseInt(s.trim()) || 0);
        while(counts.length < n) counts.push(0);
        counts = counts.slice(0, n);
        adjustCounts(counts, sectorCount);
      }

      let rawPool = [];
      counts.forEach((count, i) => {
        for(let j=0; j<count; j++) {
          rawPool.push({ text: texts[i], color: colors[i % colors.length] });
        }
      });

      gameState.sectors = distributeSectorsEvenly(rawPool);
      const preview = texts.map((t, i) => `${t}: ${counts[i]}格`).join(' | ');
      document.getElementById('distPreview').innerText = `当前分配：${preview} (总计 ${gameState.sectors.length} 格)`;
      drawWheel();
    }

    function adjustCounts(counts, target) {
      let sum = counts.reduce((a,b) => a+b, 0);
      while(sum !== target) {
        if(sum < target) { counts[counts.length-1]++; sum++; }
        else {
          let maxIdx = counts.indexOf(Math.max(...counts));
          if(counts[maxIdx] > 1) { counts[maxIdx]--; sum--; } else break;
        }
      }
    }

    function drawWheel() {
      const svg = document.getElementById('wheelSvg');
      svg.innerHTML = '';
      const n = gameState.sectors.length;
      const angleStep = 360 / n;
      gameState.sectors.forEach((s, i) => {
        const start = i * angleStep;
        const end = (i + 1) * angleStep;
        const path = createArcPath(200, 200, 190, start, end);
        const pEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
        pEl.setAttribute("d", path); pEl.setAttribute("fill", s.color);
        pEl.setAttribute("stroke", "rgba(255,255,255,0.2)"); pEl.setAttribute("stroke-width", "1"); svg.appendChild(pEl);

        const tAngle = start + angleStep / 2;
        const tEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        
        const textRadius = 165; 
        const x = 200 + textRadius * Math.cos((tAngle - 90) * Math.PI / 180);
        const y = 200 + textRadius * Math.sin((tAngle - 90) * Math.PI / 180);
        
        tEl.setAttribute("x", x); tEl.setAttribute("y", y); tEl.setAttribute("fill", "#fff");
        tEl.setAttribute("font-size", n > 30 ? "9" : "13"); tEl.setAttribute("font-weight", "bold");
        tEl.setAttribute("text-anchor", "middle"); tEl.setAttribute("transform", `rotate(${tAngle}, ${x}, ${y})`);
        tEl.textContent = s.text; svg.appendChild(tEl);
      });
    }

    function createArcPath(x, y, r, start, end) {
      const s = polarToCartesian(x, y, r, end), e = polarToCartesian(x, y, r, start);
      return ["M", x, y, "L", s.x, s.y, "A", r, r, 0, (end-start > 180 ? "1" : "0"), 0, e.x, e.y, "Z"].join(" ");
    }

    function polarToCartesian(cx, cy, r, angle) {
      const rad = (angle - 90) * Math.PI / 180.0;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    /* ===== 游戏逻辑 ===== */
    function startGame() {
      if (gameState.isSpinning) return;
      
      const decelTimeInput = parseFloat(document.getElementById('decelerationTime').value) || 5;
      gameState.decelerationRate = Math.pow(0.02 / 15, 1 / (decelTimeInput * 60));

      gameState.isSpinning = true;
      gameState.isDecelerating = false;
      gameState.wheelRotationSpeed = 15;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('statusText').innerText = "💥 武器已充能，请瞄准区域射击开火！";
      document.getElementById('crosshair').classList.add('active');
      document.getElementById('dartsContainer').innerHTML = '';
      
      const wheelContainer = document.getElementById('wheelContainer');
      wheelContainer.onclick = (e) => shootDart(e);
      
      requestAnimationFrame(updateAnimation);
    }

    function updateAnimation() {
      if (!gameState.isSpinning) return;
      gameState.currentRotation += gameState.wheelRotationSpeed;
      document.getElementById('wheel').style.transform = `rotate(${gameState.currentRotation}deg)`;
      
      if (gameState.isDecelerating) {
        gameState.wheelRotationSpeed *= gameState.decelerationRate;
        if (gameState.wheelRotationSpeed < 0.05) {
          gameState.isSpinning = false;
          finishGame();
          return;
        }
      }
      requestAnimationFrame(updateAnimation);
    }

    function shootDart(e) {
      if (!gameState.isSpinning || gameState.isDecelerating) return;
      
      const rect = document.getElementById('wheelContainer').getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const cx = rect.width / 2, cy = rect.height / 2;
      const dist = Math.sqrt((x - cx)**2 + (y - cy)**2);
      
      if (dist > rect.width / 2 || dist < 35) return; 

      let clickAngle = Math.atan2(y - cy, x - cx) * 180 / Math.PI + 90;
      if (clickAngle < 0) clickAngle += 360;
      
      gameState.dartAngle = (clickAngle - (gameState.currentRotation % 360) + 360) % 360;

      const localAngle = (clickAngle - gameState.currentRotation) * Math.PI / 180;
      const localX = cx + dist * Math.cos(localAngle - Math.PI/2);
      const localY = cy + dist * Math.sin(localAngle - Math.PI/2);

      const dartsContainer = document.getElementById('dartsContainer');

      // 击中开火波纹动效
      const ripple = document.createElement('div');
      ripple.className = 'hit-ripple';
      ripple.style.left = localX + 'px';
      ripple.style.top = localY + 'px';
      dartsContainer.appendChild(ripple);

      // 生成绝无争议的中心对称弹孔
      const bulletHole = document.createElement('div');
      bulletHole.className = 'bullet-hole';
      bulletHole.style.left = localX + 'px';
      bulletHole.style.top = localY + 'px';
      
      dartsContainer.appendChild(bulletHole);
      
      gameState.isDecelerating = true;
      document.getElementById('crosshair').classList.remove('active');
      document.getElementById('statusText').innerText = "💥 击穿目标！正在核对受损区域...";
    }

    function finishGame() {
      const n = gameState.sectors.length;
      const angleStep = 360 / n;
      const index = Math.floor(gameState.dartAngle / angleStep) % n;
      const result = gameState.sectors[index];
      
      document.getElementById('statusText').innerHTML = `命中目标：<span style="color:${result.color}; font-size:1.5rem;">${result.text}</span>`;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').innerText = "🔄 再次开火";
    }

    document.getElementById('wheelContainer').onmousemove = (e) => {
      if (!gameState.isSpinning || gameState.isDecelerating) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const ch = document.getElementById('crosshair');
      ch.style.left = (e.clientX - rect.left - 20) + 'px';
      ch.style.top = (e.clientY - rect.top - 20) + 'px';
    };

    window.onload = updateWheel;
  </script>
</body>
</html>
