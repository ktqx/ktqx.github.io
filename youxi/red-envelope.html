<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专属商户互动抽奖</title>

  <style>
    :root {
      --primary-color: #ef4444; /* 主色调，默认中国红（也可通过JS从商家配置中覆盖） */
      --secondary-color: #f59e0b; 
      --accent-gold: #fde047; 
      --dark-bg: #0a0505;
      --light-text: #ffffff;
      --text-secondary: #fca5a5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
    body { background: linear-gradient(135deg, #0a0505 0%, #2d0a0a 100%); color: var(--light-text); display: flex; flex-direction: column; min-height: 100vh; padding-top: 85px; }

    /* 🧱 块 A：Logo + 导航栏样式 */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: rgba(10, 5, 5, 0.95); border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 30px; z-index: 1000;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
    }
    .navbar-logo { font-size: 1.5rem; font-weight: 900; color: var(--primary-color); display: flex; align-items: center; gap: 10px; text-decoration: none; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
    .navbar-logo img { height: 40px; width: auto; border-radius: 6px; }
    .navbar-logo span.logo-box { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #b91c1c); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .navbar-spacer { flex: 1; }
    .navbar-nav { display: flex; gap: 15px; align-items: center; }
    .navbar-nav a { color: var(--text-secondary); text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 6px; transition: all 0.3s; }
    .navbar-nav a.active { color: var(--light-text); background: rgba(239, 68, 68, 0.2); border: 1px solid var(--primary-color); }

    /* 🧱 块 C：LED 战报结算大弹窗样式 */
    .marquee-report-panel { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); 
      width: 90%; max-width: 480px; background: linear-gradient(135deg, rgba(30, 5, 10, 0.98) 0%, rgba(10, 2, 5, 0.99) 100%); 
      border: 3px solid #ef4444; backdrop-filter: blur(12px); box-shadow: 0 0 50px rgba(239, 68, 68, 0.8);
      border-radius: 16px; padding: 20px 10px; display: flex; justify-content: space-around; align-items: center; 
      opacity: 0; pointer-events: none; z-index: 2000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .marquee-report-panel.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
    .report-item { text-align: center; }
    .report-val-big { font-size: 1.6rem; font-weight: 900; color: #ef4444; }
    .report-val-big.gold { color: var(--accent-gold); }

    /* 🧱 统一的右下角商户引流看板样式 */
    .merchant-float-board { 
      position: fixed; bottom: 15px; right: 15px; width: 300px; background: rgba(20, 5, 5, 0.95); 
      border: 2px solid var(--secondary-color); border-radius: 16px; padding: 15px; text-align: center; z-index: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    }
    .merchant-float-board h4 { color: var(--accent-gold); font-size: 0.95rem; margin-bottom: 8px; font-weight: bold; }
    .merchant-info-item { font-size: 0.8rem; color: #fca5a5; margin: 4px 0; text-align: left; }
    .merchant-qr-zone img { width: 100px; height: 100px; border: 2px solid #fff; border-radius: 6px; margin: 8px auto 4px; display: block;}
    .merchant-qr-zone p { font-size: 0.75rem; color: var(--accent-gold); }

    /* 🎮 独立承载主体游戏的黄金容器区域（撑满全屏） */
    .game-viewport { flex: 1; width: 100%; height: 100%; position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; padding: 10px; }

    @media (max-width: 768px) { body { padding-top: 75px; } .navbar { height: 60px; padding: 0 15px; } .merchant-float-board { width: calc(100% - 20px); left: 10px; bottom: 10px; right: 10px; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="navbar-logo" id="shell-logo-zone">
      <span class="logo-box" id="shell-logo-default">🧧</span>
      <span id="shell-merchant-name">疯狂红包大作战</span>
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="#" class="active">🎮 疯狂抢红包</a>
      <a href="#" id="shell-nav-report">📊 实时战报</a>
    </div>
  </nav>

  <div class="game-viewport">
    <div id="envelope-game-core" style="width: 100%; max-width: 800px; position: relative;">
        </div>
  </div>

  <div id="shell-merchant-portal"></div>

  <div class="marquee-report-panel" id="shell-ledger-popup">
    <div class="report-item">
      <div style="font-size: 0.8rem; color: #fca5a5;">🎉 战绩速递</div>
      <div style="font-size: 0.9rem; font-weight: 800; color: #ef4444;" id="ledger-title">大捷！</div>
    </div>
    <div class="report-item">
      <div style="font-size: 0.8rem; color: #fca5a5;">🔥 斩获总额</div>
      <div class="report-val-big gold" id="ledger-amount">0🪙</div>
    </div>
    <div class="report-item">
      <div style="font-size: 0.8rem; color: #fca5a5;">✨ 欧气评价</div>
      <div class="report-val-big" id="ledger-eval" style="font-size: 1.1rem; padding-top:3px;">等候揭晓</div>
    </div>
  </div>


  <script>
    // 换成你刚才部署的 Cloudflare Worker 真实的完整 API 地址
    const WORKER_ROUTE_URL = "https://game.hahagw2023.workers.dev/api/get_config";

    // 暴露给具体游戏JS随时调用的 LED 统一弹窗接口
    window.ShellUI = {
      showLedger(title, amount, evaluation, closeCallback) {
        document.getElementById('ledger-title').innerText = title;
        document.getElementById('ledger-amount').innerText = amount;
        document.getElementById('ledger-eval').innerText = evaluation;
        const popup = document.getElementById('shell-ledger-popup');
        popup.classList.add('active');
        popup.onclick = () => {
          popup.classList.remove('active');
          if (closeCallback) closeCallback();
        };
      }
    };

    // 全局商户游戏定制参数挂载寄存器
    window.CLOUD_GAME_CONFIG = null;

    document.addEventListener("DOMContentLoaded", async () => {
      // 🧠 解析商家的专属推广链接参数（如 red-envelope.html?m=starbucks）
      const urlParams = new URLSearchParams(window.location.search);
      const merchantId = urlParams.get('m');

      if (merchantId) {
        try {
          const response = await fetch(WORKER_ROUTE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ merchant_id: merchantId, game_id: "red-envelope" })
          });
          const result = await response.json();

          if (response.ok && result.success && result.data) {
            const config = result.data;

            // 1. 解析并把该商家在后台定制的爆率、金额存进全局变量，供底部的核心游戏JS读取
            if (config.game_custom_settings) {
              window.CLOUD_GAME_CONFIG = JSON.parse(config.game_custom_settings);
            }

            // 2. 块 A 动态定制替换：把导航栏店名和Logo换成该商家的
            document.getElementById('shell-merchant-name').innerText = config.merchant_name;
            if (config.merchant_logo) {
              document.getElementById('shell-logo-zone').innerHTML = `<img src="${config.merchant_logo}"> ${config.merchant_name}`;
            }

            // 3. 渲染出该商家的右下角引流专属浮动板
            let qrCodeHtml = config.qr_code ? `<div class="merchant-qr-zone"><img src="${config.qr_code}"><p>📌 长按识别关注领奖</p></div>` : "";
            document.getElementById('shell-merchant-portal').innerHTML = `
              <div class="merchant-float-board">
                <h4>🎁 ${config.merchant_name}</h4>
                <div class="merchant-info-item">📍 <b>门店：</b>${config.address || '线上直发'}</div>
                <div class="merchant-info-item">📞 <b>热线：</b>${config.contact || '暂无'}</div>
                ${qrCodeHtml}
              </div>
            `;
          }
        } catch (e) {
          console.error("🔒 后端未响应或未找到商家，降级为默认通用版本运行:", e);
        }
      }

      // 🔌 壳子加载完毕，立刻拉起该页面的游戏主体逻辑
      loadGameCoreScript();
    });

    function loadGameCoreScript() {
      const script = document.createElement('script');
      script.src = "games/red-envelope.js"; // 游戏核心主体JS文件路径
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
