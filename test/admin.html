<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Game Hub 促销游戏商户管理后台</title>
  <style>
    body { background: #0f1419; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: #1a2332; padding: 24px; border-radius: 12px; border: 1px solid #f7b801; }
    h2 { color: #f7b801; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .game-item { background: #0f1419; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #d946ef; }
    label { display: block; margin: 10px 0 5px; font-size: 0.9rem; color: #cbd5e1; }
    input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #fff; box-sizing: border-box;}
    button { background: #f7b801; color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 15px; }
    .result-link { margin-top: 15px; padding: 12px; background: #047857; color: #fff; border-radius: 4px; display: none; word-break: break-all; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🛠️ 促销活动定制后台 (<span id="merchantName" style="color: #d946ef;">商户</span>)</h2>
    
    <div class="game-item">
      <h3>🎰 幸运大翻牌活动配置</h3>
      
      <label>商户专属活动名称：</label>
      <input type="text" id="title" value="🏪 欢迎光临本店！感恩大翻牌">
      
      <label>总奖池金额 (￥)：</label>
      <input type="number" id="totalAmount" value="150">
      
      <label>单张最小金额 (￥)：</label>
      <input type="number" id="minAmount" value="1">
      
      <label>单张最大金额 (￥)：</label>
      <input type="number" id="maxAmount" value="20">
      
      <label>卡牌总张数：</label>
      <input type="number" id="cardCount" value="12">
      
      <label>每人可翻牌次数：</label>
      <input type="number" id="limitCount" value="4">
      
      <button onclick="generateCustomLink('flip-card')">🚀 生成我专属的翻牌游戏链接</button>
      <div id="resultBox" class="result-link"></div>
    </div>
    
    <div class="game-item" style="opacity: 0.5;">
      <h3>🎡 大转盘活动配置 (暂未装载游戏积木)</h3>
      <p style="font-size: 0.85rem; color: #94a3b8;">后续上传了新游戏，直接在这里加上表单即可</p>
    </div>
  </div>

  <script>
    // 检查登录状态
    const mId = localStorage.getItem('current_merchant_id') || 'GuestMerchant';
    document.getElementById('merchantName').innerText = mId;

    function generateCustomLink(gameId) {
      // 收集表单数据
      const configData = {
        title: document.getElementById('title').value,
        totalAmount: parseFloat(document.getElementById('totalAmount').value),
        minAmount: parseFloat(document.getElementById('minAmount').value),
        maxAmount: parseFloat(document.getElementById('maxAmount').value),
        cardCount: parseInt(document.getElementById('cardCount').value),
        limitCount: parseInt(document.getElementById('limitCount').value)
      };

      // 核心保存逻辑：将配置存入本地，键名为 `config_商户ID_游戏ID`
      localStorage.setItem(`config_${mId}_${gameId}`, JSON.stringify(configData));

      // 动态生成属于该商户的专属在线推广链接
      // 实际线上路径对应你的 https://ktqx.github.io/test/flip-card.html?merchant=xxxx
      const baseUrl = window.location.href.split('admin.html')[0];
      const finalPromoLink = `${baseUrl}${gameId}.html?merchant=${mId}`;

      // 展示结果
      const resBox = document.getElementById('resultBox');
      resBox.innerHTML = `<strong>您的专属推广链接已生成：</strong><br><a href="${finalPromoLink}" target="_blank" style="color: #fff;">${finalPromoLink}</a><br><br><span style="font-size:0.8rem; opacity:0.8;">(提示: 如果在同一台电脑测试，点击此链接打开的游戏将完全应用你刚才输入的配置！)</span>`;
      resBox.style.display = 'block';
    }
  </script>
</body>
</html>
