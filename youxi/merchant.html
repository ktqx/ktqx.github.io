<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Hub - 商家超级管理后台</title>
  <style>
    :root { --primary-color: #ff6b35; --accent-gold: #f7b801; --dark-bg: #0f1419; --light-text: #ffffff; --text-secondary: #b0b3c1; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%); color: #fff; padding: 30px 15px; }
    .container { max-width: 800px; margin: 0 auto; background: rgba(15, 20, 25, 0.95); border: 2px solid var(--accent-gold); border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(247,184,1,0.1); }
    h2 { color: var(--accent-gold); text-align: center; margin-bottom: 20px; font-weight: 900; }
    .section-title { font-size: 1.1rem; color: var(--primary-color); border-left: 4px solid var(--primary-color); padding-left: 10px; margin: 25px 0 15px; font-weight: bold; }
    .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    @media (max-width: 600px) { .grid-form { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; margin-bottom: 12px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 5px; text-align: left; }
    input, textarea, select { padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 0.95rem; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent-gold); }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary-color), #ff8c42); border: none; border-radius: 8px; color: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
    .result-box { display: none; margin-top: 25px; background: rgba(247,184,1,0.05); border: 1px dashed var(--accent-gold); border-radius: 12px; padding: 20px; text-align: center; }
    .link-display { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 6px; color: #2ecc71; font-weight: bold; word-break: break-all; margin: 10px 0; font-size: 0.9rem; }
    .game-dynamic-box { background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
    .logout-btn { background: none; border: 1px solid #ff4d4f; color: #ff4d4f; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-left: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>🛠️ 专属促销游戏定制中心</h2>
    <div style="text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;">
      当前活动商户: <span id="merchantNameDisplay" style="color:var(--accent-gold); font-weight:bold;">验证中...</span>
      <button class="logout-btn" onclick="handleLogout()">退出登录</button>
    </div>

    <form id="configForm" onsubmit="saveGameConfig(event)">
      <div class="section-title">一、活动方与基础信息配置（公共）</div>
      <div class="grid-form">
        <div class="form-group"><label>活动方品牌名称</label><input type="text" id="merchant_name" placeholder="请输入您的品牌/公司名" required></div>
        <div class="form-group"><label>活动促销周期</label><input type="text" id="activity_time" placeholder="如：2026.07.01 - 07.08" required></div>
        <div class="form-group full"><label>活动线下地址（选填）</label><input type="text" id="address" placeholder="引流到店的实体店地址"></div>
        <div class="form-group"><label>核心联系方式</label><input type="text" id="contact" placeholder="电话或微信号" required></div>
        
        <div class="form-group">
          <label>选择要定制的促销游戏</label>
          <select id="game_type" onchange="switchDynamicGameFields()">
            <option value="flip-card">🎰 幸运大翻牌 (经典营销)</option>
            <option value="red-envelope">🧧 疯狂抢红包 (互动吸粉)</option>
          </select>
        </div>
        
        <div class="form-group"><label>上传引导吸粉二维码</label><input type="file" id="qr_code" accept="image/*" onchange="encodeQRToBase64()"></div>
        <div class="form-group"><label>二维码引导文案说明</label><input type="text" id="qr_desc" placeholder="例如：长按识别加客服微信领奖"></div>
        <div class="form-group full"><label>自定义补充公告 / 领奖规则描述</label><textarea id="custom_content" rows="2" placeholder="在此输入附加的兑奖规则说明..."></textarea></div>
      </div>

      <div class="section-title">二、该款游戏内部核心机制参数设置（专属）</div>
      <div id="dynamicGameFieldsContainer" class="game-dynamic-box">
        </div>

      <button type="submit" class="submit-btn">✨ 锁定配置并生成专属促销链接</button>
    </form>

    <div id="resultBox" class="result-box">
      <h3 style="color: #2ecc71;">🎉 您的专属促销游戏已配置成功！</h3>
      <p style="font-size: 0.9rem; margin-top: 5px; color: var(--text-secondary);">请复制下方专属推广链接进行投放与宣传：</p>
      <div id="promoLink" class="link-display"></div>
      <p style="font-size: 0.8rem; color: #faad14; margin: 10px 0;">💡 玩家点击该链接将直接进入包含您品牌信息和定制奖池的专属游戏中！</p>
      <button class="submit-btn" style="width:140px; background:#2ecc71; margin-top:10px; padding:8px;" onclick="window.location.reload()">继续配置其他游戏</button>
      <button class="submit-btn" style="width:120px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); margin-top:10px; padding:8px; margin-left: 10px;" onclick="window.location.href='index.html'">回大厅</button>
    </div>
  </div>

  <script>
    // 🧠 替换为你部署好的 Cloudflare Worker 的 API 网址
    const WORKER_URL = "https://game-auth-worker.hahagw2023.workers.dev/api/auth";
    
    let base64QR = "";
    const currentMerchant = localStorage.getItem("game_username");
    const merchantToken = localStorage.getItem("game_token"); // 获取登录时保存的安全 Token

    // 登录保护拦截
    if (!currentMerchant || !merchantToken) {
      alert("⚠️ 您尚未登录或登录已过期，请先登录账户！");
      window.location.href = 'register.html';
    } else {
      document.getElementById('merchantNameDisplay').innerText = currentMerchant;
    }

    // 万能参数表单模板：未来想加一二十个游戏，直接在这个字典里无限追加！
    const GAME_FIELDS_TEMPLATES = {
      "flip-card": `
        <div class="grid-form">
          <div class="form-group"><label>总投入福利预算 (元)</label><input type="number" id="param_total" value="100.00" step="0.01"></div>
          <div class="form-group"><label>版面卡牌总数 (推荐9宫格)</label><input type="number" id="param_grid" value="9"></div>
          <div class="form-group"><label>单张最小中奖额 (元)</label><input type="number" id="param_min" value="0.50" step="0.01"></div>
          <div class="form-group"><label>单张最大中奖额 (元)</label><input type="number" id="param_max" value="10.00" step="0.01"></div>
          <div class="form-group"><label>每人每局可翻牌数量 (张)</label><input type="number" id="param_flips" value="3"></div>
        </div>
      `,
      "red-envelope": `
        <div class="grid-form">
          <div class="form-group"><label>红包雨持续时间 (秒)</label><input type="number" id="param_duration" value="15"></div>
          <div class="form-group"><label>单个红包最大金额 (元)</label><input type="number" id="param_max_env" value="5.00" step="0.01"></div>
          <div class="form-group"><label>夹带炸弹扣分概率 (%)</label><input type="number" id="param_bomb_rate" value="10"></div>
        </div>
      `
    };

    // 动态根据下拉菜单切换游戏设置表单
    function switchDynamicGameFields() {
      const selectedGame = document.getElementById('game_type').value;
      document.getElementById('dynamicGameFieldsContainer').innerHTML = GAME_FIELDS_TEMPLATES[selectedGame] || "<p>此游戏无需专属参数</p>";
    }

    // 将上传的文件转换为 Base64
    function encodeQRToBase64() {
      const file = document.getElementById('qr_code').files[0];
      const reader = new FileReader();
      reader.onloadend = () => { base64QR = reader.result; };
      if (file) reader.readAsDataURL(file);
    }

    // 登出处理
    function handleLogout() {
      localStorage.removeItem("game_username");
      localStorage.removeItem("game_token");
      window.location.href = 'register.html';
    }

    // 页面加载时默认选第一个游戏的表单
    window.onload = switchDynamicGameFields;

    // 保存配置并生成链接
    async function saveGameConfig(e) {
      e.preventDefault();
      const submitBtn = document.querySelector('.submit-btn');
      const gameId = document.getElementById('game_type').value;
      submitBtn.disabled = true;
      submitBtn.innerText = "正在同步加密上传云端...";

      // 🧠 骚操作：遍历动态表单中所有以 param_ 开头的输入，自动打包成 JSON 对象
      let customSettingsObj = {};
      document.querySelectorAll("[id^='param_']").forEach(input => {
        const key = input.id.replace("param_", "");
        customSettingsObj[key] = isNaN(input.value) ? input.value : parseFloat(input.value);
      });

      const payload = {
        action: "save_config",
        username: currentMerchant,
        token: merchantToken, // 携带安全 Token
        game_id: gameId,
        merchant_name: document.getElementById('merchant_name').value,
        activity_time: document.getElementById('activity_time').value,
        address: document.getElementById('address').value,
        contact: document.getElementById('contact').value,
        qr_code: base64QR,
        qr_desc: document.getElementById('qr_desc').value,
        game_custom_settings: JSON.stringify(customSettingsObj),
        custom_content: document.getElementById('custom_content').value
      };

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        
        if (res.ok && data.success) {
          document.getElementById('configForm').style.display = 'none';
          document.getElementById('resultBox').style.display = 'block';
          
          // 生成附带商户身份锚点和游戏路由的专属推广链接
          const uniqueLink = `${window.location.origin}/youxi/index.html?m=${currentMerchant}#${gameId}`;
          document.getElementById('promoLink').innerText = uniqueLink;
        } else {
          alert("❌ 配置保存失败: " + (data.message || "未知错误"));
          submitBtn.disabled = false;
          submitBtn.innerText = "✨ 确定并生成专属促销链接";
        }
      } catch (err) {
        alert("❌ 与 Cloudflare Worker 通信异常，请检查配置。");
        submitBtn.disabled = false;
        submitBtn.innerText = "✨ 确定并生成专属促销链接";
      }
    }
  </script>
</body>
</html>
