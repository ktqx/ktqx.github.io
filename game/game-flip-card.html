<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运翻牌 - 华丽版</title>
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --bg-color: #f0f2f5;
            --primary-color: #ff4d4f;
            --big-prize: #ff4d4f;
            --mid-prize: #faad14;
            --small-prize: #52c41a;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle, #2c3e50, #000);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            margin: 20px 0 30px 0;
            letter-spacing: 3px;
        }

        /* 配置面板 */
        .config-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .config-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .config-item label {
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #ccc;
        }

        .config-item input {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 90px;
            font-size: 0.95rem;
        }

        .config-item input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-start {
            padding: 10px 30px;
            background: linear-gradient(to bottom, #ff4d4f, #cf1322);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            align-self: center;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 77, 79, 0.5);
        }

        .btn-start:active {
            transform: scale(0.98);
        }

        /* 统计信息 */
        .stats {
            margin: 20px 0;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #ddd;
        }

        .stat-val {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* 牌组容器 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            perspective: 1000px;
            margin: 40px 0;
            padding: 20px;
            justify-items: center;
            align-items: start;
        }

        /* 单张牌 - 扑克牌比例 1:1.4 */
        .card {
            width: 100%;
            max-width: 120px;
            aspect-ratio: 0.714;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s;
            transform-style: flat;
        }

        .card:hover:not(.flipped) {
            transform: translateY(-5px);
        }

        .card.flipped {
            cursor: default;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            top: 0;
            left: 0;
        }

        .card-front {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #b8860b;
            font-size: 2rem;
            border: 2px solid rgba(184, 134, 11, 0.5);
            position: absolute;
            overflow: hidden;
            z-index: 1;
        }

        /* 牌背面的神秘图案 */
        .card-front::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(184, 134, 11, 0.3) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.3) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, rgba(184, 134, 11, 0.2) 3px, transparent 3px);
            background-size: 30px 30px, 40px 40px, 60px 60px;
            background-position: 0 0, 10px 10px, 20px 20px;
        }

        .card-back {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            transform: rotateY(180deg);
            flex-direction: column;
            gap: 8px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* 牌背面的神秘图案 */
        .card-back::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(255, 215, 0, 0.1) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 215, 0, 0.1) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 215, 0, 0.1) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 215, 0, 0.1) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            pointer-events: none;
        }

        .card-amount {
            font-size: 1.8rem;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .card-label {
            font-size: 0.75rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        /* 根据奖项等级的颜色 */
        .card-back.big-prize {
            background: linear-gradient(135deg, #ff4d4f, #cf1322);
            border-color: rgba(255, 77, 79, 0.5);
        }

        .card-back.mid-prize {
            background: linear-gradient(135deg, #faad14, #f7b500);
            border-color: rgba(250, 173, 20, 0.5);
            color: #000;
        }

        .card-back.small-prize {
            background: linear-gradient(135deg, #52c41a, #389e0d);
            border-color: rgba(82, 196, 26, 0.5);
        }

        /* 最终结果提示 */
        .final-result {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: var(--gold);
            padding: 15px 30px;
            border-radius: 20px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        .final-result.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin: 15px 0 20px 0;
            }

            .config-panel {
                gap: 10px;
                padding: 15px;
            }

            .config-item label {
                font-size: 0.75rem;
            }

            .config-item input {
                width: 70px;
                font-size: 0.85rem;
            }

            .btn-start {
                font-size: 0.95rem;
                padding: 8px 25px;
            }

            .stats {
                gap: 15px;
                font-size: 0.95rem;
            }

            .stat-val {
                font-size: 1.1rem;
            }

            .card-grid {
                gap: 15px;
                padding: 15px;
                margin: 30px 0;
            }

            .card {
                max-width: 100px;
            }

            .card-front {
                font-size: 1.5rem;
            }

            .card-amount {
                font-size: 1.4rem;
            }

            .card-label {
                font-size: 0.65rem;
            }

            .final-result {
                font-size: 0.95rem;
                padding: 12px 25px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
                margin: 10px 0 15px 0;
            }

            .config-panel {
                gap: 8px;
                padding: 12px;
            }

            .config-item input {
                width: 60px;
                font-size: 0.8rem;
            }

            .stats {
                gap: 10px;
                font-size: 0.85rem;
            }

            .stat-val {
                font-size: 1rem;
            }

            .card-grid {
                gap: 12px;
                padding: 10px;
                margin: 20px 0;
            }

            .card {
                max-width: 85px;
            }

            .card-front {
                font-size: 1.2rem;
            }

            .card-amount {
                font-size: 1.2rem;
            }

            .card-label {
                font-size: 0.6rem;
            }

            .final-result {
                font-size: 0.85rem;
                padding: 10px 20px;
                bottom: 20px;
            }
        }
    
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* 响应式导航 */
    @media (max-width: 768px) {
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .navbar-nav { gap: 10px; }
      .navbar-nav a { padding: 6px 10px; font-size: 0.9rem; }
    }

    @media (max-width: 480px) {
      .navbar-nav { display: none; }
    }

</style>
</head>
<body>
  <!-- 统一导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="game-lucky-wheel.html">🎡 幸运转盘</a>

    <div class="container">
        <h1>🎰 幸运翻牌</h1>

        <div class="config-panel">
            <div class="config-item">
                <label>牌张数</label>
                <input type="number" id="cardCount" value="9" min="1" max="20">
            </div>
            <div class="config-item">
                <label>促销总额</label>
                <input type="number" id="totalAmount" value="60" min="1">
            </div>
            <div class="config-item">
                <label>最小金额</label>
                <input type="number" id="minAmount" value="3" step="0.1">
            </div>
            <div class="config-item">
                <label>最大金额</label>
                <input type="number" id="maxAmount" value="20" step="0.1">
            </div>
            <div class="config-item">
                <label>可翻牌数</label>
                <input type="number" id="limitCount" value="3" min="1">
            </div>
            <button class="btn-start" onclick="initGame()">重新翻牌</button>
        </div>

        <div class="stats">
            <div>剩余次数: <span id="remainingFlips" class="stat-val">0</span></div>
            <div>已翻总额: <span id="wonAmount" class="stat-val">0.00</span></div>
        </div>

        <div id="cardGrid" class="card-grid">
            <!-- 牌将在这里生成 -->
        </div>
    </div>

    <div id="finalResult" class="final-result"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playFlipSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        let gameState = {
            prizes: [],
            remainingFlips: 0,
            wonAmount: 0,
            isProcessing: false,
            totalFlips: 0,
            maxAmount: 0,
            minAmount: 0
        };

        // 智能随机分配金额
        function distributePrizes(count, total, min, max) {
            if (count * min > total) {
                showToast("总额不足以支撑最小金额设定");
                return null;
            }
            if (count * max < total) {
                showToast("总额超出了最大金额设定的上限");
                return null;
            }

            let result = [];
            let remaining = total;
            
            for (let i = 0; i < count - 1; i++) {
                let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
                let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
                
                let amount = Math.random() * (currentMax - currentMin) + currentMin;
                amount = Math.round(amount * 100) / 100;
                
                result.push(amount);
                remaining -= amount;
            }
            
            result.push(Math.round(remaining * 100) / 100);
            
            // 洗牌
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            
            return result;
        }

        // 根据金额判断奖项等级
        function getPrizeLevel(amount, minAmount, maxAmount) {
            const range = maxAmount - minAmount;
            const thresholdBig = minAmount + range * 0.66;    // 大奖：上三分之一
            const thresholdMid = minAmount + range * 0.33;    // 中奖：中三分之一
            
            if (amount >= thresholdBig) {
                return 'big-prize';
            } else if (amount >= thresholdMid) {
                return 'mid-prize';
            } else {
                return 'small-prize';
            }
        }

        function initGame() {
            const cardCount = parseInt(document.getElementById('cardCount').value);
            const totalAmount = parseFloat(document.getElementById('totalAmount').value);
            const minAmount = parseFloat(document.getElementById('minAmount').value);
            const maxAmount = parseFloat(document.getElementById('maxAmount').value);
            const limitCount = parseInt(document.getElementById('limitCount').value);

            const prizes = distributePrizes(cardCount, totalAmount, minAmount, maxAmount);
            if (!prizes) return;

            gameState.prizes = prizes;
            gameState.remainingFlips = Math.min(limitCount, cardCount);
            gameState.totalFlips = gameState.remainingFlips;
            gameState.wonAmount = 0;
            gameState.isProcessing = false;
            gameState.maxAmount = maxAmount;
            gameState.minAmount = minAmount;

            // 清除最终结果提示
            document.getElementById('finalResult').classList.remove('show');

            updateStats();
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            
            gameState.prizes.forEach((prize, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = (e) => flipCard(index, card, e);
                
                const prizeLevel = getPrizeLevel(prize, gameState.minAmount, gameState.maxAmount);
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back ${prizeLevel}">
                            <div class="card-amount">￥${prize.toFixed(2)}</div>
                            <div class="card-label">${getPrizeLevelText(prizeLevel)}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function getPrizeLevelText(level) {
            switch(level) {
                case 'big-prize': return '大奖';
                case 'mid-prize': return '中奖';
                case 'small-prize': return '小奖';
                default: return '中奖';
            }
        }

        function flipCard(index, cardElement, event) {
            if (gameState.remainingFlips <= 0 || gameState.isProcessing) return;
            
            if (cardElement.classList.contains('flipped')) return;

            gameState.isProcessing = true;
            
            setTimeout(() => {
                playFlipSound();
                cardElement.classList.add('flipped');
                
                gameState.remainingFlips--;
                gameState.wonAmount += gameState.prizes[index];
                updateStats();
                
                setTimeout(() => {
                    gameState.isProcessing = false;
                    
                    if (gameState.remainingFlips === 0) {
                        setTimeout(() => {
                            showFinalResult();
                        }, 300);
                    }
                }, 100);
            }, 100);
        }

        function showFinalResult() {
            const resultEl = document.getElementById('finalResult');
            resultEl.innerHTML = `恭喜，本次共获取 <span style="color: #ff4d4f; font-size: 1.3em;">￥${gameState.wonAmount.toFixed(2)}</span> 元！`;
            resultEl.classList.add('show');
        }

        function updateStats() {
            document.getElementById('remainingFlips').innerText = gameState.remainingFlips;
            document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
        }

        function showToast(msg) {
            alert(msg);
        }

        window.onload = initGame;
    </script>
</body>
</html>
