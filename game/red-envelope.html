<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧧 疯狂抢红包 - Game Hub</title>
  <style>
    /* ===== CSS 变量与主题 ===== */
    :root {
      --primary-color: #ef4444; /* 红包专属主色调：中国红 */
      --secondary-color: #f59e0b; /* 琥珀金 */
      --accent-gold: #fde047; /* 闪耀金 */
      --dark-bg: #0a0505;
      --light-text: #ffffff;
      --text-secondary: #fca5a5;
      --glass-bg: rgba(30, 10, 10, 0.6);
      --glass-border: rgba(239, 68, 68, 0.2);
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #2d0a0a 100%);
      color: var(--light-text);
      min-height: 100vh;
      padding-top: 85px; /* 为顶部固定导航栏留出空间 */
    }

    /* =================================================== */
    /* 🛠️ 新增：统一导航栏样式 (直接塞在游戏样式最前面) */
    /* =================================================== */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0; height: 70px;
      background: rgba(10, 5, 5, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; padding: 0 30px; z-index: 1000;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
    }
    .navbar-logo {
      font-size: 1.5rem; font-weight: 900; color: var(--primary-color);
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); letter-spacing: 2px;
      display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0;
    }
    .navbar-logo span {
      width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #b91c1c);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .navbar-spacer { flex: 1; }
    .navbar-nav { display: flex; gap: 15px; align-items: center; }
    .navbar-nav a {
      color: var(--text-secondary); text-decoration: none; font-weight: 600;
      transition: all 0.3s ease; padding: 8px 12px; border-radius: 6px; white-space: nowrap;
    }
    .navbar-nav a:hover, .navbar-nav a.active {
      color: var(--light-text); background: rgba(239, 68, 68, 0.2); border: 1px solid var(--primary-color);
    }
    .wallet-container {
      display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.05);
      padding: 6px 12px; border-radius: 20px; border: 1px solid var(--glass-border); margin-left: 15px;
    }
    .wallet-item { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #fde047; }
    .btn-reset { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; transition: color 0.3s; display: flex; align-items: center; }
    .btn-reset:hover { color: #ffffff; }

    @media (max-width: 768px) {
      body { padding-top: 75px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
    }
    @media (max-width: 480px) {
      body { padding: 70px 10px 15px; }
      .navbar { padding: 0 10px; justify-content: space-between; }
      .navbar-spacer { display: none; }
      .navbar-nav { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 10px; padding: 0 5px; flex: 1; margin-left: 10px; scrollbar-width: none; }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 5px 10px; font-size: 0.85rem; }
      .wallet-container { padding: 4px 8px; margin-left: 5px; font-size: 0.8rem; }
    }
    /* =================================================== */

    /* ===== 主容器 ===== */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    /* ===== 控制面板（毛玻璃科技感） ===== */
    .control-panel {
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    .game-title {
      font-size: 2.5rem;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f43f5e, var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
    }

    .game-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 25px;
    }

    /* 状态与统计栏 */
    .status-bar {
      display: flex;
      justify-content: space-around;
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-gold);
    }

    /* 核心操作按钮 */
    .btn-container {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .btn {
      padding: 14px 35px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-start {
      background: linear-gradient(135deg, var(--primary-color), #b91c1c);
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
    }

    .btn-start:disabled {
      background: #4a5568;
      color: #a0aec0;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ===== 红包雨画布区域 ===== */
    .game-stage {
      position: relative;
      width: 100%;
      height: 550px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      border: 2px solid var(--glass-border);
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    /* 倒计时叠加层 */
    .countdown-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      font-weight: 900;
      color: var(--accent-gold);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .countdown-overlay.show {
      opacity: 1;
    }

    /* 动态生成的红包 DOM 元素样式 */
    .envelope {
      position: absolute;
      width: 55px;
      height: 75px;
      background: linear-gradient(145deg, #ef4444, #991b1b);
      border: 2px solid #fde047;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      user-select: none;
      transform-origin: center;
      transition: transform 0.1s ease;
    }

    /* 红包中间的“倒福”或“🧧”金圈装饰 */
    .envelope::before {
      content: '🧧';
      font-size: 1.5rem;
    }

    /* 红包中奖/爆裂动画 */
    @keyframes burst {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); color: var(--accent-gold); }
      100% { transform: scale(0); opacity: 0; }
    }

    .envelope.clicked {
      animation: burst 0.2s ease-out forwards;
      pointer-events: none;
    }

    /* ===== 飘字特效（+88金币） ===== */
    .floating-text {
      position: absolute;
      font-size: 1.2rem;
      font-weight: 900;
      color: #fde047;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: floatUp 0.6s ease-out forwards;
      z-index: 150;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
    }

    /* ===== 公告/爆率提示区 ===== */
    .announcement {
      margin-top: 15px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* 手机端紧凑优化 */
    @media (max-width: 480px) {
      .container { padding: 8px; }
      .control-panel { padding: 15px 10px; border-radius: 16px; margin-bottom: 10px; }
      .game-title { font-size: 1.8rem; }
      .game-desc { font-size: 0.8rem; margin-bottom: 15px; }
      .status-bar { padding: 8px; border-radius: 10px; margin-bottom: 15px; }
      .status-value { font-size: 1.1rem; }
      .status-label { font-size: 0.75rem; }
      .btn { padding: 10px 20px; font-size: 0.95rem; border-radius: 10px; }
      .game-stage { height: 420px; border-radius: 16px; }
      .envelope { width: 44px; height: 60px; }
      .envelope::before { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <section class="control-panel">
      <h1 class="game-title">疯狂抢红包</h1>
      <p class="game-desc">手速对决！每次点击消耗 20 金币，漫天红包雨等你抢，最高可得 200 金币大奖！</p>
      
      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">倒计时</span>
          <span class="status-value" id="timer-val">00s</span>
        </div>
        <div class="status-item">
          <span class="status-label">本轮斩获</span>
          <span class="status-value" id="score-val">0</span>
        </div>
        <div class="status-item">
          <span class="status-label">我的资产</span>
          <span class="status-value" id="balance-val" style="color: #f59e0b;">1000</span>
        </div>
      </div>

      <div class="btn-container">
        <button class="btn btn-start" id="start-btn">消耗20🪙 开启红包雨</button>
      </div>
    </section>

    <div class="game-stage" id="game-stage">
      <div class="countdown-overlay" id="countdown-layer">3</div>
    </div>

    <div class="announcement">
      🧧 提示：红包包含普通包（+10~30🪙）与超级福袋（极低概率爆出 +100~200🪙）！
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'game_hub_user_coins';
    const GAME_COST = 20;
    const GAME_DURATION = 15; // 游戏持续15秒

    let userCoins = parseInt(localStorage.getItem(STORAGE_KEY)) || 1000;
    let isPlaying = false;
    let score = 0;
    let gameTimer = null;
    let spawnTimer = null;
    let timeLeft = 0;

    const startBtn = document.getElementById('start-btn');
    const timerVal = document.getElementById('timer-val');
    const scoreVal = document.getElementById('score-val');
    const balanceVal = document.getElementById('balance-val');
    const gameStage = document.getElementById('game-stage');
    const countdownLayer = document.getElementById('countdown-layer');

    // 初始化本地资产数
    function initWallet() {
      userCoins = parseInt(localStorage.getItem(STORAGE_KEY)) || 1000;
      balanceVal.textContent = userCoins;
      // 顺便兼容外部导航栏的同步刷新（如果有的话）
      const globalCoinSpan = document.getElementById('global-coins');
      if (globalCoinSpan) globalCoinSpan.textContent = userCoins;
    }
    initWallet();

    // 写入资产
    function updateWallet(amount) {
      userCoins += amount;
      localStorage.setItem(STORAGE_KEY, userCoins);
      balanceVal.textContent = userCoins;
      const globalCoinSpan = document.getElementById('global-coins');
      if (globalCoinSpan) globalCoinSpan.textContent = userCoins;
    }

    // 点击开始游戏按钮
    startBtn.addEventListener('click', () => {
      if (isPlaying) return;

      if (userCoins < GAME_COST) {
        alert('您的金币不足 20 枚，无法开启红包雨！请在导航栏或首页重置资产。');
        return;
      }

      // 扣除入场费
      updateWallet(-GAME_COST);
      startBtn.disabled = true;
      score = 0;
      scoreVal.textContent = '0';
      
      runCountdown();
    });

    // 3-2-1 倒计时
    function runCountdown() {
      countdownLayer.classList.add('show');
      let count = 3;
      countdownLayer.textContent = count;

      const countInterval = setInterval(() => {
        count--;
        if (count > 0) {
          countdownLayer.textContent = count;
        } else if (count === 0) {
          countdownLayer.textContent = "GO!";
        } else {
          clearInterval(countInterval);
          countdownLayer.classList.remove('show');
          startGameLoop();
        }
      }, 800);
    }

    // 正式启动红包雨主循环
    function startGameLoop() {
      isPlaying = true;
      timeLeft = GAME_DURATION;
      timerVal.textContent = timeLeft + 's';

      // 倒计时定时器
      gameTimer = setInterval(() => {
        timeLeft--;
        timerVal.textContent = timeLeft + 's';
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      // 红包生成速度：每 300 毫秒掉落一个
      spawnTimer = setInterval(() => {
        createEnvelope();
      }, 300);
    }

    // 创建单个红包对象
    function createEnvelope() {
      if (!isPlaying) return;

      const env = document.createElement('div');
      env.className = 'envelope';

      // 随机横向位置
      const stageWidth = gameStage.clientWidth;
      const startX = Math.random() * (stageWidth - 60); 
      env.style.left = startX + 'px';
      env.style.top = '-80px'; // 舞台上方看不见的地方开始下落

      // 随机下落速度与摇摆角度（增强科技动感）
      const duration = Math.random() * 2 + 1.8; // 1.8s ~ 3.8s 落地
      const rotation = Math.random() * 40 - 20; // -20deg ~ 20deg 倾斜

      env.style.transform = `rotate(${rotation}deg)`;
      gameStage.appendChild(env);

      // 使用 JS 原生 Web Animations API 控制下落线
      const animation = env.animate([
        { top: '-80px' },
        { top: gameStage.clientHeight + 'px' }
      ], {
        duration: duration * 1000,
        easing: 'linear'
      });

      // 监听点击事件（抢红包）
      env.addEventListener('click', () => {
        if (env.classList.contains('clicked')) return;
        env.classList.add('clicked');
        
        // 计算奖励：92% 概率为普通红包，8% 概率为超级大福袋
        let reward = 0;
        const roll = Math.random() * 100;
        if (roll < 92) {
          reward = Math.floor(Math.random() * 21) + 10; // 10 ~ 30 金币
        } else {
          reward = Math.floor(Math.random() * 101) + 100; // 100 ~ 200 超级大奖
          createFloatingText(env.offsetLeft + 20, env.offsetTop, '👑 超级福袋!');
        }

        score += reward;
        scoreVal.textContent = score;
        updateWallet(reward);

        // 飘字特效
        createFloatingText(env.offsetLeft + 10, env.offsetTop + 10, `+${reward}🪙`);

        // 动画播完后移除
        setTimeout(() => env.remove(), 200);
      });

      // 动画自然结束（未被点击漏掉的红包）则自动销毁
      animation.onfinish = () => {
        env.remove();
      };
    }

    // 生成飘字动画特效
    function createFloatingText(x, y, text) {
      const ft = document.createElement('div');
      ft.className = 'floating-text';
      ft.style.left = x + 'px';
      ft.style.top = y + 'px';
      ft.textContent = text;
      gameStage.appendChild(ft);
      setTimeout(() => ft.remove(), 600);
    }

    // 游戏结束
    function endGame() {
      isPlaying = false;
      clearInterval(gameTimer);
      clearInterval(spawnTimer);
      
      // 清空舞台上还残留的红包
      const remainingEnvelopes = gameStage.querySelectorAll('.envelope');
      remainingEnvelopes.forEach(e => e.remove());

      alert(`🎉 恭喜！本轮红包雨你成功抢到了 ${score} 枚金币！`);
      startBtn.disabled = false;
    }
  </script>

  <script src="navbar.js"></script>

</body>
</html>
