<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Hub - 聚合大厅</title>
  <style>
    /* ===== 统一视觉变量 ===== */
    :root {
      --primary-color: #ff6b35;
      --accent-gold: #f7b801;
      --dark-bg: #0f1419;
      --light-text: #ffffff;
      --text-secondary: #b0b3c1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    
    body { 
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; 
      background: #0f1419; 
      color: var(--light-text); 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
      padding-top: 70px; /* 仅留出顶部导航高度 */
      transition: background 0.5s ease; /* 换游戏时背景丝滑过渡 */
    }

    /* ===== 模块1：顶部统一导航 ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 70px;
      background: rgba(10, 14, 39, 0.95); border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 30px; z-index: 1000;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
      transition: all 0.3s ease;
    }
    .navbar-logo {
      font-size: 1.5rem; font-weight: 900; color: var(--primary-color);
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.5); letter-spacing: 2px;
      display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0;
    }
    .navbar-logo span {
      width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
    }
    .navbar-spacer { flex: 1; }
    .navbar-nav { display: flex; gap: 15px; align-items: center; }
    .navbar-nav a {
      color: var(--text-secondary); text-decoration: none; font-weight: 600;
      transition: all 0.3s ease; padding: 8px 12px; border-radius: 6px; white-space: nowrap;
    }
    .navbar-nav a:hover, .navbar-nav a.active {
      color: var(--light-text); background: rgba(255, 107, 53, 0.2); border: 1px solid var(--primary-color);
    }

    /* ===== 🚀 核心重构：沉浸式全屏舞台（干掉金框限制） ===== */
    .app-main-container {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #game-stage {
      flex: 1;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* ===== 👑 商家看板：改为底部悬浮式营销挂件 ===== */
    .merchant-float-board { 
      position: fixed; bottom: 15px; right: 15px; width: 300px;
      background: rgba(15, 20, 25, 0.95); border: 2px solid var(--accent-gold); 
      border-radius: 16px; padding: 15px; text-align: center; z-index: 500;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .merchant-float-board h4 { color: var(--accent-gold); font-size: 0.95rem; margin-bottom: 8px; font-weight: bold; }
    .merchant-info-item { font-size: 0.8rem; color: #b0b3c1; margin: 4px 0; text-align: left; }
    .merchant-qr-zone img { width: 100px; height: 100px; border: 2px solid #fff; border-radius: 6px; margin: 8px auto 4px; display: block;}
    .merchant-qr-zone p { font-size: 0.75rem; color: var(--accent-gold); }

    /* ===== 模块3：通用最高层级 LED 战报大弹窗 ===== */
    .marquee-report-panel { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); 
      width: 90%; max-width: 480px; background: linear-gradient(135deg, rgba(30, 5, 10, 0.98) 0%, rgba(10, 2, 5, 0.99) 100%); 
      border: 3px solid #ff4757; backdrop-filter: blur(12px); box-shadow: 0 0 50px rgba(255, 71, 87, 0.9), inset 0 0 20px rgba(255, 71, 87, 0.4); 
      border-radius: 16px; padding: 20px 10px; display: flex; justify-content: space-around; align-items: center; 
      opacity: 0; pointer-events: none; z-index: 2000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .marquee-report-panel.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
    .report-item { text-align: center; }
    .report-title { font-size: 0.8rem; color: #f3a6b0; margin-bottom: 4px; }
    .report-val-big { font-size: 1.6rem; font-weight: 900; color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.6); }
    .report-val-big.gold { color: var(--accent-gold); }

    /* 手机端响应式适配 */
    @media (max-width: 768px) { 
      body { padding-top: 60px; } 
      .navbar { padding: 0 15px; height: 60px; } 
      .navbar-logo { font-size: 1.2rem; } 
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .merchant-float-board { width: calc(100% - 20px); left: 10px; bottom: 10px; right: 10px; }
    }
    @media (max-width: 480px) { 
      .navbar-spacer { display: none; } 
      .navbar-nav { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 10px; padding: 0 5px; flex: 1; margin-left: 10px; scrollbar-width: none; } 
      .navbar-nav::-webkit-scrollbar { display: none; } 
      .navbar-nav a { padding: 5px 10px; font-size: 0.85rem; } 
    }
  </style>
</head>
<body>

  <div id="global-navbar-portal" style="width: 100%;"></div>

  <div class="app-main-container">
    
    <div id="game-stage"></div>

    <div id="global-merchant-board-portal"></div>

  </div>

  <div class="marquee-report-panel" id="global-ledger-panel">
    <div class="report-item">
      <div class="report-title">🎉 战绩速递</div>
      <div style="font-size: 0.9rem; font-weight: 800; color: #ff4757;" id="ledger-title">大捷！</div>
    </div>
    <div class="report-item">
      <div class="report-title">🔥 斩获总额</div>
      <div class="report-val-big gold" id="ledger-amount">￥0.00</div>
    </div>
    <div class="report-item">
      <div class="report-title">✨ 欧气评价</div>
      <div class="report-val-big" id="ledger-eval" style="font-size: 1.1rem; padding-top: 3px;">等候揭晓</div>
    </div>
  </div>

  <script src="config.js"></script>
  
  <script>
    const CLOUDFLARE_WORKER_API = "https://game-auth-worker.hahagw2023.workers.dev/api/auth";
    window.CURRENT_MERCHANT_CONFIG_JSON = null;

    // 统一结算弹窗接口
    window.GameUI = {
      showLedger(title, amount, evaluation, closeCallback) {
        document.getElementById('ledger-title').innerText = title;
        document.getElementById('ledger-amount').innerText = amount;
        document.getElementById('ledger-eval').innerText = evaluation;
        const panel = document.getElementById('global-ledger-panel');
        panel.classList.add('active');
        
        panel.onclick = () => {
          panel.classList.remove('active');
          if(closeCallback) closeCallback();
        };
      },
      hideLedger() {
        document.getElementById('global-ledger-panel').classList.remove('active');
      }
    };

    document.addEventListener("DOMContentLoaded", async () => {
      renderNavbar();

      const urlParams = new URLSearchParams(window.location.search);
      const merchantId = urlParams.get('m');
      if (merchantId) {
        await fetchMerchantCloudConfig(merchantId);
      }

      window.addEventListener("hashchange", dispatchRouter);
      
      if (!window.location.hash && window.GAMES_LIST.length > 0) {
        window.location.hash = window.GAMES_LIST[0].id;
      } else {
        dispatchRouter();
      }
    });

    async function fetchMerchantCloudConfig(merchantId) {
      const currentHash = window.location.hash.replace('#', '') || window.GAMES_LIST[0].id;
      try {
        const response = await fetch(CLOUDFLARE_WORKER_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: "get_config", username: merchantId, game_id: currentHash })
        });
        const result = await response.json();
        if (response.ok && result.success && result.data) {
          const config = result.data;
          window.CURRENT_MERCHANT_CONFIG_JSON = config.game_custom_settings;
          document.getElementById('global-navbar-logo-text').innerHTML = `<span>🏪</span> ${config.merchant_name}`;
          renderMerchantFloatBoard(config);
        }
      } catch (e) {
        console.error("🔒 降级为默认模式:", e);
      }
    }

    function renderMerchantFloatBoard(config) {
      const portal = document.getElementById('global-merchant-board-portal');
      if (!portal) return;

      let qrImageHtml = "";
      if (config.qr_code && config.qr_code.startsWith('data:image')) {
        qrImageHtml = `
          <div class="merchant-qr-zone">
            <img src="${config.qr_code}">
            <p>📌 长按识别关注兑奖</p>
          </div>
        `;
      }

      portal.innerHTML = `
        <div class="merchant-float-board">
          <h4>🎁 ${config.merchant_name}</h4>
          <div class="merchant-info-item">📍 <b>门店：</b>${config.address || '线上直发'}</div>
          <div class="merchant-info-item">📞 <b>热线：</b>${config.contact}</div>
          ${qrImageHtml}
        </div>
      `;
    }

    function renderNavbar() {
      const username = localStorage.getItem("game_username");
      let userTag = username ? `<span style="color:#f7b801; font-size:0.85rem; background:rgba(247,184,1,0.15); padding:4px 8px; border-radius:4px; border:1px solid rgba(247,184,1,0.3)">👤 ${username}</span>` : '';

      let navHtml = `
        <nav class="navbar">
          <a href="#" class="navbar-logo" id="global-navbar-logo-text"><span>🎮</span> Game Hub</a>
          <div class="navbar-spacer"></div>
          <div class="navbar-nav">
      `;
      window.GAMES_LIST.forEach(game => {
        navHtml += `<a href="#${game.id}" id="nav-${game.id}">${game.name}</a>`;
      });
      if (window.FIXED_RIGHT_NAV) {
        navHtml += `<a href="${window.FIXED_RIGHT_NAV.url}" style="border: 1px dashed #f7b801; color: #f7b801;">${window.FIXED_RIGHT_NAV.name}</a>`;
      }
      navHtml += `
            ${userTag}
          </div>
        </nav>
      `;
      document.getElementById('global-navbar-portal').innerHTML = navHtml;
    }

    async function dispatchRouter() {
      const currentHash = window.location.hash.replace('#', '');
      const gameConfig = window.GAMES_LIST.find(g => g.id === currentHash);
      if (!gameConfig) return;

      // 🎨 根据游戏不同，动态切换 body 整体的底色背景，无缝复刻独立单网页氛围
      if (currentHash === 'red-envelope') {
        document.body.style.background = "linear-gradient(135deg, #0a0505 0%, #2d0a0a 100%)"; // 红包雨切到中国红暗底
      } else if (currentHash === 'dart-wheel') {
        document.body.style.background = "linear-gradient(135deg, #0b0f19 0%, #111827 100%)"; // 轮盘切到酷黑蓝
      } else {
        document.body.style.background = "linear-gradient(135deg, #0f1419 0%, #1a2332 100%)"; // 默认黑金
      }

      document.querySelectorAll('.navbar-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById(`nav-${currentHash}`)?.classList.add('active');

      if (window.currentGameDestroy) {
        window.currentGameDestroy();
        window.currentGameDestroy = null;
      }
      GameUI.hideLedger(); 
      document.getElementById('game-stage').innerHTML = `<p style="padding:100px; text-align:center; color:var(--text-secondary);">全屏引擎加载中...</p>`;

      const oldScript = document.getElementById('dynamic-game-loader');
      if (oldScript) oldScript.remove();

      const urlParams = new URLSearchParams(window.location.search);
      const merchantId = urlParams.get('m');
      if (merchantId) {
         await fetchMerchantCloudConfig(merchantId);
      }

      const script = document.createElement('script');
      script.id = 'dynamic-game-loader';
      script.src = gameConfig.file;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
