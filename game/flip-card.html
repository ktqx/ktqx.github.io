<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 幸运翻牌</title>
  <style>
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:     #f7b801;
      --dark-bg:         #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
      --big-prize:       #ff4d4f;
      --mid-prize:       #faad14;
      --small-prize:     #52c41a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      padding-top: 85px;
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 850px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    /* ===== 标题区 ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .config-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-input {
      width: 80px;
      padding: 10px 8px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      text-align: center;
      transition: all 0.3s ease;
    }

    .config-input:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 15px rgba(247, 184, 1, 0.3);
    }

    /* ===== 核心操作按钮 ===== */
    .btn-spin {
      width: 200px;
      margin: 0 auto 25px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
      display: block;
    }

    .btn-spin:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
    }

    .btn-spin:active {
      transform: scale(0.98);
    }

    /* ===== 游戏数据统计 ===== */
    .stats {
      margin: 15px 0;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 40px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 10px;
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.4rem;
      text-shadow: 0 0 10px rgba(247, 184, 1, 0.3);
    }

    /* ===== 翻牌卡片矩阵区域 ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      perspective: 1000px;
      margin: 25px 0;
      padding: 10px;
      justify-content: center;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 单张牌 1:1.4 比例 */
    .card {
      width: 100%;
      aspect-ratio: 0.714;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
      transform-style: flat;
    }

    .card:hover:not(.flipped) {
      transform: translateY(-8px);
    }

    .card.flipped {
      cursor: default;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: bold;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
    }

    /* 卡牌正面（覆盖状态） - 金色奢华质感 */
    .card-front {
      background: linear-gradient(135deg, var(--accent-gold), #b8860b);
      color: #0f1419;
      font-size: 2.2rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      overflow: hidden;
      z-index: 1;
    }

    .card-front::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.2) 2px, transparent 2px),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.15) 4px, transparent 4px);
      background-size: 30px 30px, 40px 40px, 50px 50px;
    }

    /* 卡牌背面（翻开状态） */
    .card-back {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 8px;
      border: 2px solid rgba(247, 184, 1, 0.3);
      overflow: hidden;
    }

    .card-back::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(45deg, rgba(247, 184, 1, 0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(247, 184, 1, 0.05) 25%, transparent 25%);
      background-size: 16px 16px;
      pointer-events: none;
    }

    .card-amount {
      font-size: 1.4rem;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      opacity: 0.8;
      position: relative;
      z-index: 1;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* 不同奖项等级颜色 */
    .card-back.big-prize {
      background: linear-gradient(135deg, #ff4d4f, #cf1322);
      border-color: rgba(255, 77, 79, 0.6);
    }

    .card-back.mid-prize {
      background: linear-gradient(135deg, #faad14, #f7b500);
      border-color: rgba(250, 173, 20, 0.6);
      color: #000;
    }
    .card-back.mid-prize .card-label {
      color: #000;
      background: rgba(255, 255, 255, 0.3);
    }

    .card-back.small-prize {
      background: linear-gradient(135deg, #52c41a, #389e0d);
      border-color: rgba(82, 196, 26, 0.6);
    }

    /* ===== 【核心新增特性】未选中卡牌淡灰色透视样式 ===== */
    .card.dimmed .card-back {
      filter: grayscale(100%) opacity(0.35) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
      box-shadow: none !important;
      background: #232d3d !important;
      color: #8a96a3 !important;
    }
    .card.dimmed .card-label {
      background: rgba(0,0,0,0.1) !important;
      color: #8a96a3 !important;
    }

    /* 状态与结果展示 */
    .status-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-align: center;
      min-height: 35px;
      margin-top: 15px;
    }

    /* ===== 响应式适配 ===== */
    @media (max-width: 1024px) {
      .card-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
    }

    @media (max-width: 768px) {
      body { padding-top: 75px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .title { font-size: 1.6rem; }
      
      /* 平板端配置面板 */
      .config-panel { 
        gap: 12px;
        padding: 12px;
      }
      
      .config-input {
        width: 70px;
      }
      
      .btn-spin { width: 180px; }
      
      /* 平板端卡牌：3个一行 */
      .card-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px;
        max-width: 100%;
      }
      .card-amount { font-size: 1.1rem; }
    }

    @media (max-width: 480px) {
      body { padding: 70px 10px 15px; }
      .navbar-nav { display: none; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      
      /* 手机端配置面板 */
      .config-panel {
        gap: 10px;
        padding: 10px;
      }
      
      .config-group {
        flex: 1 1 40%;
        align-items: center;
      }

      .config-input {
        width: 65px;
        font-size: 0.85rem;
      }
      
      .config-label {
        font-size: 0.75rem;
      }
      
      .btn-spin {
        width: 160px;
        font-size: 1rem;
        padding: 10px 15px;
        letter-spacing: 1px;
      }
      
      /* 手机端卡牌：3个一行 */
      .card-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 8px;
        max-width: 100%;
      }
      .card-amount { font-size: 1rem; }
      .stats { gap: 15px; font-size: 0.95rem; }
      .stat-val { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html" class="active">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 飞镖轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html">🧧 抢红包</a>
      <a href="dice-arena.html">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <div class="title">🎰 幸运翻牌 Pro</div>
    </div>

    <div class="config-panel">
      <div class="config-group">
        <label class="config-label">促销总额 (元)</label>
        <input type="number" id="totalAmount" class="config-input" value="50" min="1">
      </div>
      <div class="config-group">
        <label class="config-label">最小金额</label>
        <input type="number" id="minAmount" class="config-input" value="2" step="0.1">
      </div>
      <div class="config-group">
        <label class="config-label">最大金额</label>
        <input type="number" id="maxAmount" class="config-input" value="20" step="0.1">
      </div>
      <div class="config-group">
        <label class="config-label">牌总张数</label>
        <input type="number" id="cardCount" class="config-input" value="8" min="3" max="30">
      </div>
      <div class="config-group">
        <label class="config-label">可翻牌数</label>
        <input type="number" id="limitCount" class="config-input" value="3" min="1">
      </div>
    </div>

    <button class="btn-spin" onclick="initGame()">重新洗牌</button>

    <div class="stats">
      <div>剩余机会: <span id="remainingFlips" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div id="cardGrid" class="card-grid"></div>

    <div class="status-text" id="statusText">请点击上方按钮初始化或开始翻牌</div>
  </div>

  <script>
    // 简易原生音频上下文，带来震撼的交互反馈
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      if (type === 'flip') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'end') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
      }
    }

    let gameState = {
      prizes: [],
      remainingFlips: 0,
      wonAmount: 0,
      isProcessing: false,
      maxAmount: 0,
      minAmount: 0
    };

    // 智能随机总额算法分配
    function distributePrizes(count, total, min, max) {
      if (count * min > total) {
        showToast("❌ 失败：总额不足以支撑当前最小金额设定");
        return null;
      }
      if (count * max < total) {
        showToast("❌ 失败：总额超出了最大金额设定的上限");
        return null;
      }

      let result = [];
      let remaining = total;
      
      for (let i = 0; i < count - 1; i++) {
        let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
        let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
        
        let amount = Math.random() * (currentMax - currentMin) + currentMin;
        amount = Math.round(amount * 100) / 100;
        
        result.push(amount);
        remaining -= amount;
      }
      
      result.push(Math.round(remaining * 100) / 100);
      
      // 经典洗牌算法打乱
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      
      return result;
    }

    function getPrizeLevel(amount, minAmount, maxAmount) {
      const range = maxAmount - minAmount;
      if (range <= 0) return 'mid-prize';
      const thresholdBig = minAmount + range * 0.66;
      const thresholdMid = minAmount + range * 0.33;
      
      if (amount >= thresholdBig) return 'big-prize';
      if (amount >= thresholdMid) return 'mid-prize';
      return 'small-prize';
    }

    function getPrizeLevelText(level) {
      switch(level) {
        case 'big-prize': return '💎 豪礼';
        case 'mid-prize': return '✨ 幸运';
        case 'small-prize': return '🎈 参与';
        default: return '奖励';
      }
    }

    function initGame() {
      const cardCount = parseInt(document.getElementById('cardCount').value) || 9;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 60;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 2;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 25;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      const prizes = distributePrizes(cardCount, totalAmount, minAmount, maxAmount);
      if (!prizes) return;

      gameState.prizes = prizes;
      gameState.remainingFlips = Math.min(limitCount, cardCount);
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      document.getElementById('statusText').textContent = `游戏就绪！请挑选并翻开您的幸运卡牌吧 👇`;
      updateStats();
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';
      
      gameState.prizes.forEach((prize, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;
        card.onclick = () => flipCard(index, card);
        
        const prizeLevel = getPrizeLevel(prize, gameState.minAmount, gameState.maxAmount);
        
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back ${prizeLevel}">
              <div class="card-amount">￥${prize.toFixed(2)}</div>
              <div class="card-label">${getPrizeLevelText(prizeLevel)}</div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function flipCard(index, cardElement) {
      if (gameState.remainingFlips <= 0 || gameState.isProcessing) return;
      if (cardElement.classList.contains('flipped')) return;

      gameState.isProcessing = true;
      playSound('flip');
      cardElement.classList.add('flipped');
      
      gameState.remainingFlips--;
      gameState.wonAmount += gameState.prizes[index];
      updateStats();
      
      // 控制状态延时
      setTimeout(() => {
        gameState.isProcessing = false;
        
        // 当翻牌次数耗尽时触发游戏结束与透视效果
        if (gameState.remainingFlips === 0) {
          endGameAndRevealOthers();
        }
      }, 300);
    }

    // 【核心新增逻辑】翻牌结束后淡灰色显示未翻底牌答案
    function endGameAndRevealOthers() {
      gameState.isProcessing = true;
      document.getElementById('statusText').innerHTML = `🎉 翻牌结束！最终共获得：<span style="color:var(--primary-color); font-size:1.4rem;">￥${gameState.wonAmount.toFixed(2)}</span> 元！`;
      playSound('end');

      // 自动翻转所有剩余未揭晓的底牌
      gameState.prizes.forEach((_, index) => {
        const cardEl = document.getElementById(`card-${index}`);
        if (!cardEl.classList.contains('flipped')) {
          cardEl.classList.add('flipped', 'dimmed'); // 添加 dimmed 实现淡灰色暗淡样式
          cardEl.onclick = null; // 移除点击回调
        }
      });
    }

    function updateStats() {
      document.getElementById('remainingFlips').innerText = gameState.remainingFlips;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    function showToast(msg) {
      alert(msg);
    }

    window.onload = initGame;
  </script>
</body>
</html>
