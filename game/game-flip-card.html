<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 幸运翻牌</title>
  <style>
    :root {
      --primary-color: #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold: #f7b801;
      --dark-bg: #0a0e27;
      --light-text: #ffffff;
      --text-secondary: #a0aec0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid var(--primary-color);
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 15px 40px;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .config-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .config-item label {
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .config-item input {
      padding: 8px 12px;
      border-radius: 5px;
      border: 2px solid rgba(247, 184, 1, 0.2);
      background: rgba(26, 35, 50, 0.9);
      color: var(--light-text);
      width: 90px;
      font-size: 0.95rem;
    }

    .btn-start {
      padding: 10px 30px;
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 15px;
      align-self: center;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .stats {
      margin: 20px 0;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 30px;
      color: var(--text-secondary);
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.3rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      perspective: 1000px;
      margin: 40px 0;
      padding: 20px;
      justify-items: center;
      align-items: start;
    }

    .card {
      width: 100%;
      max-width: 120px;
      aspect-ratio: 0.714;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
      transform-style: flat;
    }

    .card:hover:not(.flipped) {
      transform: translateY(-5px);
    }

    .card.flipped {
      cursor: default;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      top: 0;
      left: 0;
    }

    .card-front {
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      color: #b8860b;
      font-size: 2rem;
      border: 2px solid rgba(184, 134, 11, 0.5);
      z-index: 1;
    }

    .card-back {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 8px;
      border: 2px solid rgba(255, 215, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .card-amount {
      font-size: 1.8rem;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }

    .card-label {
      font-size: 0.75rem;
      opacity: 0.9;
      position: relative;
      z-index: 1;
      letter-spacing: 2px;
    }

    .card-back.big-prize {
      background: linear-gradient(135deg, #ff4d4f, #cf1322);
      border-color: rgba(255, 77, 79, 0.5);
    }

    .card-back.mid-prize {
      background: linear-gradient(135deg, #faad14, #f7b500);
      border-color: rgba(250, 173, 20, 0.5);
      color: #000;
    }

    .card-back.small-prize {
      background: linear-gradient(135deg, #52c41a, #389e0d);
      border-color: rgba(82, 196, 26, 0.5);
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .main-content { padding: 80px 12px 30px; }
      .title { font-size: 1.6rem; }
      .card-grid { gap: 15px; padding: 15px; margin: 30px 0; }
      .card { max-width: 100px; }
      .card-front { font-size: 1.5rem; }
      .card-amount { font-size: 1.4rem; }
    }

    @media (max-width: 480px) {
      .navbar-nav { display: none; }
      .main-content { padding: 70px 10px 20px; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      .config-panel { gap: 8px; padding: 12px; }
      .config-item input { width: 60px; font-size: 0.8rem; }
      .card-grid { gap: 12px; padding: 10px; margin: 20px 0; }
      .card { max-width: 85px; }
      .card-front { font-size: 1.2rem; }
      .card-amount { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="game-flip-card.html" class="active">🎰 翻牌</a>
      <a href="game-red-envelope.html">🧧 红包</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">
      <div class="header">
        <div class="title">🎰 幸运翻牌</div>
      </div>

      <div class="config-panel">
        <div class="config-item">
          <label>牌张数</label>
          <input type="number" id="cardCount" value="9" min="1" max="20">
        </div>
        <div class="config-item">
          <label>促销总额</label>
          <input type="number" id="totalAmount" value="60" min="1">
        </div>
        <div class="config-item">
          <label>最小金额</label>
          <input type="number" id="minAmount" value="3" step="0.1">
        </div>
        <div class="config-item">
          <label>最大金额</label>
          <input type="number" id="maxAmount" value="20" step="0.1">
        </div>
        <div class="config-item">
          <label>可翻牌数</label>
          <input type="number" id="limitCount" value="3" min="1">
        </div>
        <button class="btn-start" onclick="initGame()">重新翻牌</button>
      </div>

      <div class="stats">
        <div>剩余次数: <span id="remainingFlips" class="stat-val">0</span></div>
        <div>已翻总额: <span id="wonAmount" class="stat-val">0.00</span></div>
      </div>

      <div id="cardGrid" class="card-grid"></div>
    </div>
  </div>

  <script>
    let gameState = {
      prizes: [],
      remainingFlips: 0,
      wonAmount: 0,
      isProcessing: false,
      totalFlips: 0,
      maxAmount: 0,
      minAmount: 0
    };

    function distributePrizes(count, total, min, max) {
      if (count * min > total) return Array(count).fill(Math.round(total / count * 10) / 10);
      if (count * max < total) return Array(count).fill(max);

      let prizes = Array(count).fill(0);
      let remaining = total;
      
      for (let i = 0; i < count; i++) {
        const itemsLeft = count - i;
        const minNeeded = min * itemsLeft;
        const maxPossible = Math.min(max, remaining - minNeeded);
        const amount = Math.round((min + Math.random() * (maxPossible - min)) * 10) / 10;
        prizes[i] = amount;
        remaining -= amount;
      }

      if (remaining > 0.01) {
        const idx = Math.floor(Math.random() * count);
        prizes[idx] = Math.round((prizes[idx] + remaining) * 10) / 10;
      }

      return prizes.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      const cardCount = parseInt(document.getElementById('cardCount').value) || 9;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 60;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 3;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 20;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      gameState.prizes = distributePrizes(cardCount, totalAmount, minAmount, maxAmount);
      gameState.remainingFlips = limitCount;
      gameState.wonAmount = 0;
      gameState.totalFlips = limitCount;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      document.getElementById('remainingFlips').textContent = gameState.remainingFlips;
      document.getElementById('wonAmount').textContent = gameState.wonAmount.toFixed(2);

      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';

      gameState.prizes.forEach((amount, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">💰</div>
            <div class="card-back ${getPrizeClass(amount)}">
              <div class="card-amount">¥${amount.toFixed(1)}</div>
              <div class="card-label">中奖</div>
            </div>
          </div>
        `;
        card.onclick = () => flipCard(card, idx);
        grid.appendChild(card);
      });
    }

    function getPrizeClass(amount) {
      if (amount >= gameState.maxAmount * 0.7) return 'big-prize';
      if (amount >= gameState.maxAmount * 0.4) return 'mid-prize';
      return 'small-prize';
    }

    function flipCard(cardEl, idx) {
      if (gameState.isProcessing || gameState.remainingFlips <= 0 || cardEl.classList.contains('flipped')) return;

      gameState.isProcessing = true;
      cardEl.classList.add('flipped');
      gameState.remainingFlips--;
      gameState.wonAmount += gameState.prizes[idx];

      document.getElementById('remainingFlips').textContent = gameState.remainingFlips;
      document.getElementById('wonAmount').textContent = gameState.wonAmount.toFixed(2);

      setTimeout(() => {
        gameState.isProcessing = false;
      }, 600);
    }

    window.addEventListener('load', initGame);
  </script>
</body>
</html>
