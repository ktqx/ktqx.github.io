<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧧 疯狂抢红包 - Game Hub</title>
  <style>
    /* ===== 全局 CSS 变量与主题 ===== */
    :root {
      --primary-color: #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold: #f7b801;
      --gold-light: #fff380;
      --dark-bg: #0a0e27;
      --light-text: #ffffff;
      --text-secondary: #a0aec0;
      --glass-bg: rgba(20, 25, 50, 0.5);
      --glass-border: rgba(217, 70, 239, 0.2);
      
      /* 红包分级颜色 */
      --pkg-normal: linear-gradient(135deg, #ef4444, #991b1b);
      --pkg-medium: linear-gradient(135deg, #f59e0b, #b45309);
      --pkg-epic: linear-gradient(135deg, #ec4899, #be185d);
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%);
      color: var(--light-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 85px;
    }

    /* ===== 统一滚动式导航栏 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .navbar-nav a:hover {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid var(--primary-color);
    }

    /* ===== 主容器与金光璀璨大边框 ===== */
    .container {
      max-width: 1000px;
      width: 95%;
      margin: 15px auto;
      flex: 1;
      background: rgba(15, 20, 45, 0.85);
      border: 3px solid transparent;
      border-image: linear-gradient(135deg, var(--accent-gold), var(--primary-color), var(--secondary-color)) 1;
      border-radius: 16px;
      box-shadow: 0 0 35px rgba(247, 184, 1, 0.2), inset 0 0 20px rgba(217, 70, 239, 0.15);
      backdrop-filter: blur(15px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ===== 页面大标题 ===== */
    .page-title-zone {
      text-align: center;
      margin-bottom: 20px;
    }

    .page-title-zone h1 {
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4e50, var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }

    .page-title-zone p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.08), rgba(217, 70, 239, 0.08));
      border: 1px solid rgba(217, 70, 239, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      transition: all 0.3s ease;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
    }

    .config-input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(10, 14, 39, 0.8);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      color: var(--light-text);
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: all 0.3s;
    }

    .config-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 10px rgba(217, 70, 239, 0.4);
    }

    /* ===== 看板状态区 ===== */
    .header-stats {
      padding: 15px;
      background: rgba(20, 25, 50, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-box { flex: 1; }
    .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 1.8rem; font-weight: 900; color: var(--accent-gold); transition: color 0.3s; }
    .budget-info { font-size: 0.75rem; color: #718096; margin-top: 2px; }

    /* ===== 核心游戏舞台区 ===== */
    .game-area {
      flex: 1;
      min-height: 320px;
      position: relative;
      background: rgba(5, 5, 15, 0.4);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(217, 70, 239, 0.1);
    }

    /* ===== 玩法分级说明条 ===== */
    .legend-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px 5px 0;
      font-size: 0.8rem;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ===== 红包雨核心（小尺寸、高流速） ===== */
    .envelope {
      position: absolute;
      width: 44px;
      height: 58px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      will-change: transform;
    }

    .envelope-inner {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      border: 1.5px solid var(--accent-gold);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .envelope-inner::after {
      content: '🧧';
      font-size: 1.2rem;
    }

    /* 档位1：普通包 */
    .pkg-normal .envelope-inner { background: var(--pkg-normal); }
    
    /* 档位2：好运包 */
    .pkg-medium .envelope-inner { 
      background: var(--pkg-medium); 
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }
    
    /* 档位3：至尊爆金包 */
    .pkg-epic .envelope-inner { 
      background: var(--pkg-epic);
      border-color: #fff380;
      animation: superGlow 0.8s infinite alternate ease-in-out;
    }
    @keyframes superGlow {
      0% { box-shadow: 0 0 6px #d946ef; filter: brightness(1); }
      100% { box-shadow: 0 0 15px #f7b801; filter: brightness(1.2); }
    }

    .envelope.hit { animation: hitAnim 0.2s ease-out forwards; pointer-events: none; }
    @keyframes hitAnim {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .float-text {
      position: absolute;
      font-weight: 900;
      color: var(--gold-light);
      pointer-events: none;
      z-index: 50;
      animation: floatUp 0.6s ease-out forwards;
      text-shadow: 0 0 6px rgba(247,184,1,0.8), 0 1px 3px #000;
      font-size: 1.1rem;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
    }

    /* ===== 底部控制按钮 ===== */
    .footer { padding-top: 20px; display: flex; justify-content: center; }

    .main-btn {
      width: 100%;
      max-width: 400px;
      height: 50px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      color: white;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4);
    }

    .main-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217, 70, 239, 0.6); }
    .main-btn.running { cursor: not-allowed; transform: none; box-shadow: none; background: #1a1e36; border: 1px solid var(--glass-border); }
    .main-btn.settled { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
    
    .btn-progress { position: absolute; left: 0; top: 0; height: 100%; background: rgba(255, 255, 255, 0.15); width: 0%; }
    .btn-content { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* ===== 完美响应式适配体系 ===== */
    @media (max-width: 768px) {
      body { padding-top: 75px; }
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .container { padding: 15px; margin: 10px auto; }
      .page-title-zone h1 { font-size: 1.7rem; }
      .config-panel { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
      .stat-value { font-size: 1.4rem; }
    }

    @media (max-width: 480px) {
      .navbar-spacer { display: none; }
      .navbar-nav {
        display: flex; 
        overflow-x: auto; 
        -webkit-overflow-scrolling: touch;
        gap: 8px;
        flex: 1;
        margin-left: 8px;
        scrollbar-width: none; 
      }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 4px 8px; font-size: 0.8rem; }
      
      .config-panel { grid-template-columns: repeat(2, 1fr); }
      .config-group:last-child { grid-column: span 2; }
      
      .envelope { width: 38px; height: 50px; }
      .envelope-inner::after { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo"><span>🎮</span> Game Hub</a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 枪击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html" class="active">🧧 抢红包</a>
      <a href="dice-arena.html">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-title-zone">
      <h1>🧧 疯狂抢红包</h1>
      <p>考验极致反应与手速，看准时机，绝不错过至尊大封包！</p>
    </div>

    <div class="config-panel" id="configPanel">
      <div class="config-group">
        <label class="config-label">总预算 (元)</label>
        <input type="number" class="config-input" id="cfgTotalBudget" value="150">
      </div>
      <div class="config-group">
        <label class="config-label">红包总数 (个)</label>
        <input type="number" class="config-input" id="cfgTotalCount" value="80">
      </div>
      <div class="config-group">
        <label class="config-label">游戏时长 (秒)</label>
        <input type="number" class="config-input" id="cfgDuration" value="20">
      </div>
      <div class="config-group">
        <label class="config-label">单项最小 (元)</label>
        <input type="number" class="config-input" id="cfgMinAmt" value="0.2" step="0.1">
      </div>
      <div class="config-group">
        <label class="config-label">单项最大 (元)</label>
        <input type="number" class="config-input" id="cfgMaxAmt" value="8" step="0.1">
      </div>
    </div>

    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-label">已抢总金额</div>
        <div class="stat-value" id="scoreBox">¥<span id="score">0.00</span></div>
        <div class="budget-info">剩余可用预算: ¥<span id="remBudget">0.00</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">击中红包数</div>
        <div class="stat-value" id="countBox"><span id="count">0</span></div>
        <div class="budget-info">待落空红包: <span id="remCount">0</span>个</div>
      </div>
    </div>

    <div class="game-area" id="gameArea"></div>

    <div class="legend-bar">
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div>普通包 (落速平稳)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>好运包 (金额更高/速度略快)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ec4899;"></div>至尊爆金包 (超级大额/极速闪现)</div>
    </div>

    <div class="footer">
      <button class="main-btn" id="mainBtn" onclick="handleBtnClick()">
        <div class="btn-progress" id="btnProgress"></div>
        <span class="btn-content" id="btnText">🚀 开启红包雨</span>
      </button>
    </div>
  </div>

  <script>
    // 模拟声音反馈
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playClickSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(950, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.06);
    }

    const gameArea = document.getElementById('gameArea');
    const mainBtn = document.getElementById('mainBtn');
    const btnProgress = document.getElementById('btnProgress');
    const btnText = document.getElementById('btnText');
    const configPanel = document.getElementById('configPanel');
    const scoreBox = document.getElementById('scoreBox');
    const countBox = document.getElementById('countBox');

    let state = {
      active: false,
      settled: false,
      score: 0,
      count: 0,
      timeLeft: 0,
      remBudget: 0,
      remCount: 0,
      cfg: {}
    };

    // 统一按钮接管中心
    function handleBtnClick() {
      if (state.active) return; // 运行中禁止重复点
      if (state.settled) {
        resetGame(); // 结算状态下点击，直接刷新重置
      } else {
        startGame(); // 初始状态下点击，启动游戏
      }
    }

    function startGame() {
      state.cfg = {
        totalBudget: parseFloat(document.getElementById('cfgTotalBudget').value) || 50,
        totalCount: parseInt(document.getElementById('cfgTotalCount').value) || 60,
        duration: parseInt(document.getElementById('cfgDuration').value) || 5,
        minAmt: parseFloat(document.getElementById('cfgMinAmt').value) || 0.2,
        maxAmt: parseFloat(document.getElementById('cfgMaxAmt').value) || 8
      };

      if (state.cfg.minAmt * state.cfg.totalCount > state.cfg.totalBudget) {
        alert("❌ 配置冲突：最小金额 × 总数量 已经超出了总预算，请调整！");
        return;
      }

      // 重置高亮颜色
      scoreBox.style.color = 'var(--accent-gold)';
      countBox.style.color = 'var(--accent-gold)';

      state.active = true;
      state.settled = false;
      state.score = 0;
      state.count = 0;
      state.timeLeft = state.cfg.duration;
      state.remBudget = state.cfg.totalBudget;
      state.remCount = state.cfg.totalCount;

      configPanel.style.pointerEvents = 'none';
      configPanel.style.opacity = '0.3';
      mainBtn.className = 'main-btn running'; 
      updateDisplay();

      btnProgress.style.transition = 'none';
      btnProgress.style.width = '0%';
      setTimeout(() => {
        btnProgress.style.transition = `width ${state.cfg.duration}s linear`;
        btnProgress.style.width = '100%';
      }, 50);

      const gameTimer = setInterval(() => {
        state.timeLeft--;
        btnText.textContent = `⏱️ 倒计时: ${state.timeLeft}s`;
        
        if (state.timeLeft <= 0) {
          clearInterval(gameTimer);
          endGame();
        }
      }, 1000);

      spawnLoop();
    }

    function spawnLoop() {
      if (!state.active || state.remCount <= 0) return;

      const idealDensity = state.remCount / (state.timeLeft || 1);
      const spawnCount = Math.ceil(idealDensity / 3.5);

      for(let i = 0; i < spawnCount; i++) {
        if (state.remCount > 0) createEnvelope();
      }

      setTimeout(spawnLoop, 220 + Math.random() * 100);
    }

    function createEnvelope() {
      const envelope = document.createElement('div');
      envelope.className = 'envelope';
      const inner = document.createElement('div');
      inner.className = 'envelope-inner';
      envelope.appendChild(inner);

      const left = Math.random() * (gameArea.clientWidth - 45);
      envelope.style.left = left + 'px';
      envelope.style.top = '-65px';

      const safetyBuffer = (state.remCount - 1) * state.cfg.minAmt;
      const currentMax = Math.min(state.cfg.maxAmt, state.remBudget - safetyBuffer);
      const amount = Math.random() * (currentMax - state.cfg.minAmt) + state.cfg.minAmt;

      const range = (state.cfg.maxAmt - state.cfg.minAmt) / 3;
      let speedFactor = 1; 

      if (amount < state.cfg.minAmt + range) {
        envelope.classList.add('pkg-normal');
        speedFactor = 1.0; 
      } else if (amount < state.cfg.minAmt + (range * 2)) {
        envelope.classList.add('pkg-medium');
        speedFactor = 1.4;
      } else {
        envelope.classList.add('pkg-epic');
        speedFactor = 2.0; 
      }

      const baseSpeed = 4.5 + Math.random() * 3;
      const finalSpeed = baseSpeed * speedFactor;

      state.remCount--; 
      updateDisplay();
      gameArea.appendChild(envelope);

      let currentTop = -65;
      const fall = () => {
        if (!state.active && !envelope.classList.contains('hit')) {
          envelope.remove();
          return;
        }

        currentTop += finalSpeed;
        envelope.style.transform = `translateY(${currentTop}px) rotate(${(currentTop / 3) % 16 - 8}deg)`;

        if (currentTop > gameArea.clientHeight) {
          state.remCount++;
          envelope.remove();
          updateDisplay();
        } else if (envelope.parentElement) {
          requestAnimationFrame(fall);
        }
      };

      envelope.onclick = (e) => {
        e.stopPropagation();
        if (state.remBudget >= amount) {
          hitEnvelope(envelope, amount);
        } else if (state.remBudget > 0) {
          hitEnvelope(envelope, state.remBudget);
        }
      };

      requestAnimationFrame(fall);
    }

    function hitEnvelope(el, amt) {
      if (el.classList.contains('hit')) return;
      el.classList.add('hit');
      playClickSound();

      state.score += amt;
      state.count++;
      state.remBudget -= amt;

      showFloatText(el.offsetLeft, el.offsetTop, `+¥${amt.toFixed(2)}`);
      updateDisplay();

      setTimeout(() => el.remove(), 200);
    }

    function showFloatText(x, y, text) {
      const ft = document.createElement('div');
      ft.className = 'float-text';
      ft.style.left = (x + 5) + 'px';
      ft.style.top = y + 'px';
      ft.textContent = text;
      gameArea.appendChild(ft);
      setTimeout(() => ft.remove(), 550);
    }

    function updateDisplay() {
      document.getElementById('score').textContent = state.score.toFixed(2);
      document.getElementById('count').textContent = state.count;
      document.getElementById('remBudget').textContent = Math.max(0, state.remBudget).toFixed(2);
      document.getElementById('remCount').textContent = Math.max(0, state.remCount);
    }

    // 核心更改：原页面留存结算逻辑
    function endGame() {
      state.active = false;
      state.settled = true;

      // 1. 清空留存在屏幕里的残余红包
      gameArea.innerHTML = '';

      // 2. 将数据看板的数据变绿/闪烁高亮，表明这是最终成果
      scoreBox.style.color = '#10b981';
      countBox.style.color = '#10b981';

      // 3. 释放配置面板，允许玩家在原地直接修改参数
      configPanel.style.pointerEvents = 'auto';
      configPanel.style.opacity = '1';

      // 4. 将控制按钮转换为结算复位形态，并展示最终核心成绩
      mainBtn.className = 'main-btn settled';
      btnProgress.style.width = '0%';
      btnText.innerHTML = `✨ 结算: ¥${state.score.toFixed(2)} (${state.count}个) | 重新开始`;
    }

    function resetGame() {
      state.settled = false;
      gameArea.innerHTML = '';
      mainBtn.className = 'main-btn';
      btnText.textContent = '🚀 开启红包雨';
      btnProgress.style.width = '0%';
      scoreBox.style.color = 'var(--accent-gold)';
      countBox.style.color = 'var(--accent-gold)';
      state.score = 0;
      state.count = 0;
      updateDisplay();
    }
  </script>
</body>
