<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎲 骰子对战游戏 - 多人竞技</title>
  <style>
    /* ===== CSS 变量 & 赛博霓虹配色 ===== */
    :root {
      --primary-neon:    #ff006e;
      --secondary-neon:  #00f5ff;
      --accent-gold:     #ffd60a;
      --dark-bg:         #0a0e27;
      --panel-bg:        #1a1f3a;
      --card-bg:         #16213e;
      --text-primary:    #ffffff;
      --text-secondary:  #b0b3c1;
      --success-color:   #00ff41;
      --warning-color:   #ff9500;
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a0033 50%, var(--dark-bg) 100%);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(10, 14, 39, 0.95);
      border: 2px solid var(--primary-neon);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 40px rgba(255, 0, 110, 0.3), inset 0 0 40px rgba(0, 245, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    /* ===== 标题区 ===== */
    .game-header {
      text-align: center;
      margin-bottom: 25px;
      animation: glowPulse 2s ease-in-out infinite;
    }

    .game-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .game-subtitle {
      font-size: 0.95rem;
      color: var(--secondary-neon);
      font-weight: 600;
      letter-spacing: 1px;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 0, 110, 0.4); }
      50% { text-shadow: 0 0 40px rgba(0, 245, 255, 0.6); }
    }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(22, 33, 62, 0.8), rgba(26, 31, 58, 0.8));
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.1);
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .config-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--secondary-neon);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-input, .config-select {
      padding: 12px 15px;
      background: rgba(26, 31, 58, 0.9);
      border: 2px solid rgba(0, 245, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
    }

    .config-input:focus, .config-select:focus {
      border-color: var(--secondary-neon);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
    }

    .config-select option {
      background: var(--panel-bg);
      color: var(--text-primary);
    }

    /* ===== 按钮样式 ===== */
    .btn-start-game {
      grid-column: 1 / -1;
      padding: 15px 30px;
      background: linear-gradient(90deg, var(--primary-neon), #ff0066);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
    }

    .btn-start-game:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.6);
    }

    .btn-start-game:active {
      transform: translateY(0);
    }

    .btn-start-game:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ===== 游戏区域 ===== */
    .game-arena {
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    .game-arena.active {
      display: flex;
    }

    /* ===== 排行榜 ===== */
    .leaderboard {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.05), rgba(255, 0, 110, 0.05));
      border: 2px solid var(--secondary-neon);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .leaderboard-item {
      background: rgba(26, 31, 58, 0.8);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .leaderboard-item.leading {
      background: rgba(255, 0, 110, 0.2);
      border-color: var(--primary-neon);
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
      transform: scale(1.05);
    }

    .leaderboard-rank {
      font-size: 0.8rem;
      color: var(--secondary-neon);
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .leaderboard-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent-gold);
      margin-bottom: 6px;
    }

    .leaderboard-score {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--secondary-neon);
    }

    /* ===== 玩家卡片容器 ===== */
    .players-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
      width: 100%;
    }

    @media (min-width: 1024px) {
      .players-container {
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      }
    }

    /* ===== 玩家卡片 ===== */
    .player-card {
      background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(26, 31, 58, 0.9));
      border: 2px solid rgba(0, 245, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .player-card.active::before {
      opacity: 1;
    }

    .player-card.active {
      border-color: var(--secondary-neon);
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.3);
      transform: translateY(-5px);
    }

    .player-card.winner {
      border-color: var(--success-color);
      background: linear-gradient(135deg, rgba(0, 255, 65, 0.1), rgba(0, 255, 65, 0.05));
      box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
    }

    .player-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 245, 255, 0.2);
    }

    .player-name {
      font-size: 1.3rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--secondary-neon), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .player-round {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: rgba(0, 245, 255, 0.1);
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 700;
    }

    /* ===== 骰子舞台 ===== */
    .dice-stage {
      background: rgba(10, 14, 39, 0.8);
      border: 1px dashed rgba(0, 245, 255, 0.3);
      border-radius: 10px;
      padding: 15px;
      min-height: 120px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      margin-bottom: 15px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* ===== 3D 骰子 ===== */
    .cube-container {
      width: 50px;
      height: 50px;
      position: relative;
      flex-shrink: 0;
    }

    .cube-shadow {
      position: absolute;
      bottom: -12px;
      left: 2px;
      width: 46px;
      height: 8px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 50%;
      filter: blur(4px);
      transform: scale(1);
      transition: transform 0.2s ease;
      pointer-events: none;
      z-index: 1;
    }

    .cube {
      width: 100%;
      height: 100%;
      position: absolute;
      transform-style: preserve-3d;
      z-index: 2;
      transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
    }

    .cube-face {
      position: absolute;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #ececec 60%, #c5c5c5 100%);
      border: 2px solid #a6a6a6;
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 4px;
      box-sizing: border-box;
      align-items: center;
      justify-items: center;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2), 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .face-1 { transform: rotateY(0deg)    translateZ(25px); }
    .face-6 { transform: rotateY(180deg)  translateZ(25px); }
    .face-2 { transform: rotateY(90deg)   translateZ(25px); }
    .face-5 { transform: rotateY(-90deg)  translateZ(25px); }
    .face-3 { transform: rotateX(90deg)   translateZ(25px); }
    .face-4 { transform: rotateX(-90deg)  translateZ(25px); }

    .pip {
      width: 12px;
      height: 12px;
      background-color: #111;
      border-radius: 50%;
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.8);
    }

    /* 1点和4点为红色 */
    .face-1 .pip, .face-4 .pip {
      background-color: #d90429;
    }

    .face-1 .pip {
      width: 20px;
      height: 20px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.6);
    }

    .pip.top-left    { grid-area: 1 / 1; }
    .pip.top-right   { grid-area: 1 / 3; }
    .pip.mid-left    { grid-area: 2 / 1; }
    .pip.mid-right   { grid-area: 2 / 3; }
    .pip.center      { grid-area: 2 / 2; }
    .pip.bottom-left  { grid-area: 3 / 1; }
    .pip.bottom-right { grid-area: 3 / 3; }

    @keyframes diceImpact {
      0%   { transform: translateY(0)     scaleY(1);    }
      15%  { transform: translateY(-12px) scaleY(1.08); }
      45%  { transform: translateY(2px)   scaleY(0.90); }
      70%  { transform: translateY(-2px)  scaleY(1.02); }
      100% { transform: translateY(0)     scaleY(1);    }
    }

    .cube.impact-effect {
      animation: diceImpact 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    /* ===== 点数统计 ===== */
    .round-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat-box {
      background: rgba(0, 245, 255, 0.05);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--secondary-neon);
    }

    .stat-box.total {
      grid-column: 1 / -1;
      background: rgba(255, 0, 110, 0.1);
      border-color: var(--primary-neon);
    }

    .stat-box.total .stat-value {
      color: var(--primary-neon);
      font-size: 2rem;
    }

    /* ===== 摇骰按钮 ===== */
    .btn-roll {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, var(--secondary-neon), #00e5ff);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
    }

    .btn-roll:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
    }

    .btn-roll:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-roll:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-roll.completed {
      background: linear-gradient(90deg, var(--success-color), #00ff41);
      color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
    }

    /* ===== 游戏控制区 ===== */
    .game-controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-reset {
      flex: 1;
      padding: 12px;
      background: rgba(255, 149, 0, 0.2);
      border: 2px solid var(--warning-color);
      color: var(--warning-color);
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-reset:hover {
      background: rgba(255, 149, 0, 0.3);
      box-shadow: 0 0 15px rgba(255, 149, 0, 0.3);
    }

    /* ===== 结果弹窗 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, var(--panel-bg), var(--card-bg));
      border: 3px solid var(--primary-neon);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      animation: modalBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 50px rgba(255, 0, 110, 0.5);
    }

    @keyframes modalBounce {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-title {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .modal-winner {
      font-size: 2rem;
      font-weight: 800;
      color: var(--success-color);
      margin: 20px 0;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .modal-stats {
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
    }

    .modal-stat-line {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed rgba(0, 245, 255, 0.2);
      font-size: 0.95rem;
    }

    .modal-stat-line:last-child {
      border-bottom: none;
    }

    .modal-stat-name {
      font-weight: 700;
      color: var(--accent-gold);
    }

    .modal-stat-value {
      color: var(--secondary-neon);
      font-weight: 800;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 25px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-btn-primary {
      background: linear-gradient(90deg, var(--primary-neon), #ff0066);
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 0, 110, 0.3);
    }

    .modal-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(255, 0, 110, 0.5);
    }

    .modal-btn-secondary {
      background: rgba(0, 245, 255, 0.1);
      color: var(--secondary-neon);
      border: 2px solid var(--secondary-neon);
    }

    .modal-btn-secondary:hover {
      background: rgba(0, 245, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
    }

    /* ===== 响应式设计 ===== */
    @media (max-width: 768px) {
      .container {
        padding: 15px;
        border-radius: 15px;
      }

      .game-title {
        font-size: 1.8rem;
      }

      .players-container {
        grid-template-columns: 1fr;
      }

      .config-panel {
        grid-template-columns: 1fr;
      }

      .modal-content {
        padding: 30px 20px;
        margin: 20px;
      }

      .modal-title {
        font-size: 1.8rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="container">

    <!-- 游戏标题 -->
    <div class="game-header">
      <div class="game-title">🎲 骰子对战竞技场 🎲</div>
      <div class="game-subtitle">多人实时竞技 · 一决高下</div>
    </div>

    <!-- 配置面板 -->
    <div class="config-panel" id="configPanel">
      <div class="config-group">
        <label class="config-label">参与人数</label>
        <select class="config-select" id="playerCount" onchange="updatePlayerNames()">
          <option value="2" selected>2 人对战</option>
          <option value="3">3 人对战</option>
          <option value="4">4 人对战</option>
          <option value="5">5 人对战</option>
        </select>
      </div>

      <div class="config-group">
        <label class="config-label">每次骰子数</label>
        <select class="config-select" id="dicePerRound">
          <option value="3">3 颗</option>
          <option value="5" selected>5 颗</option>
          <option value="7">7 颗</option>
          <option value="10">10 颗</option>
        </select>
      </div>

      <div class="config-group">
        <label class="config-label">总轮次</label>
        <select class="config-select" id="totalRounds">
          <option value="1" selected>1 轮</option>
          <option value="2">2 轮</option>
          <option value="3">3 轮</option>
          <option value="5">5 轮</option>
        </select>
      </div>

      <div class="config-group">
        <label class="config-label">胜负判定</label>
        <select class="config-select" id="winCondition">
          <option value="high" selected>比 大 (点数多赢)</option>
          <option value="low">比 小 (点数少赢)</option>
        </select>
      </div>

      <button class="btn-start-game" onclick="startGame()">🚀 开始游戏</button>
    </div>

    <!-- 游戏区域 -->
    <div class="game-arena" id="gameArena">

      <!-- 排行榜 -->
      <div class="leaderboard" id="leaderboard"></div>

      <!-- 玩家卡片容器 -->
      <div class="players-container" id="playersContainer"></div>

      <!-- 游戏控制 -->
      <div class="game-controls">
        <button class="btn-reset" onclick="resetGame()">↩️ 返回配置</button>
      </div>

    </div>

  </div>

  <!-- 结果弹窗 -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal-content">
      <div class="modal-title">🏆 游戏结束 🏆</div>
      <div class="modal-winner" id="winnerText"></div>
      <div class="modal-stats" id="finalStats"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-primary" onclick="resetGame()">🔄 再来一局</button>
        <button class="modal-btn modal-btn-secondary" onclick="closeResultModal()">✕ 关闭</button>
      </div>
    </div>
  </div>

  <script>
    /* ===== 游戏状态 ===== */
    const gameState = {
      players: [],
      playerCount: 2,
      dicePerRound: 5,
      totalRounds: 1,
      currentRound: 0,
      winCondition: 'high',
      gameActive: false,
      roundInProgress: false
    };

    const playerNames = ['甲', '乙', '丙', '丁', '戊'];

    /* ===== 音效系统 ===== */
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playRollSound(duration) {
      initAudio();
      if (!audioCtx) return;

      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noiseNode = audioCtx.createBufferSource();
      noiseNode.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(500, audioCtx.currentTime);
      filter.Q.setValueAtTime(3.0, audioCtx.currentTime);

      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      noiseNode.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      noiseNode.start();
      noiseNode.stop(audioCtx.currentTime + duration);
    }

    function playClickSound(pitch = 1.0) {
      initAudio();
      if (!audioCtx) return;

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(200 * pitch, now);
      osc.frequency.exponentialRampToValueAtTime(150 * pitch, now + 0.1);

      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.1);
    }

    /* ===== 骰子面配置 ===== */
    const faceTransforms = {
      1: { x: 0,    y: 0,   z: 0 },
      2: { x: 0,    y: -90, z: 0 },
      3: { x: -90,  y: 0,   z: 0 },
      4: { x: 90,   y: 0,   z: 0 },
      5: { x: 0,    y: 90,  z: 0 },
      6: { x: 180,  y: 0,   z: 0 }
    };

    const facePipsConfig = {
      1: ['center'],
      2: ['top-left', 'bottom-right'],
      3: ['top-left', 'center', 'bottom-right'],
      4: ['top-left', 'top-right', 'bottom-left', 'bottom-right'],
      5: ['top-left', 'top-right', 'center', 'bottom-left', 'bottom-right'],
      6: ['top-left', 'top-right', 'mid-left', 'mid-right', 'bottom-left', 'bottom-right']
    };

    /* ===== 初始化玩家 ===== */
    function updatePlayerNames() {
      const count = parseInt(document.getElementById('playerCount').value);
      gameState.playerCount = count;
    }

    /* ===== 开始游戏 ===== */
    function startGame() {
      gameState.playerCount = parseInt(document.getElementById('playerCount').value);
      gameState.dicePerRound = parseInt(document.getElementById('dicePerRound').value);
      gameState.totalRounds = parseInt(document.getElementById('totalRounds').value);
      gameState.winCondition = document.getElementById('winCondition').value;
      gameState.currentRound = 0;
      gameState.gameActive = true;

      // 初始化玩家
      gameState.players = [];
      for (let i = 0; i < gameState.playerCount; i++) {
        gameState.players.push({
          id: i,
          name: playerNames[i],
          rounds: [],
          totalScore: 0,
          currentRoundDice: [],
          currentRoundScore: 0
        });
      }

      // 隐藏配置面板，显示游戏区域
      document.getElementById('configPanel').style.display = 'none';
      document.getElementById('gameArena').classList.add('active');

      renderGame();
    }

    /* ===== 渲染游戏界面 ===== */
    function renderGame() {
      renderLeaderboard();
      renderPlayerCards();
    }

    /* ===== 渲染排行榜 ===== */
    function renderLeaderboard() {
      const leaderboard = document.getElementById('leaderboard');
      leaderboard.innerHTML = '';

      const sorted = [...gameState.players].sort((a, b) => {
        if (gameState.winCondition === 'high') {
          return b.totalScore - a.totalScore;
        } else {
          return a.totalScore - b.totalScore;
        }
      });

      sorted.forEach((player, index) => {
        const item = document.createElement('div');
        item.className = 'leaderboard-item';
        if (index === 0 && gameState.gameActive) {
          item.classList.add('leading');
        }
        item.innerHTML = `
          <div class="leaderboard-rank">第 ${index + 1} 名</div>
          <div class="leaderboard-name">${player.name}</div>
          <div class="leaderboard-score">${player.totalScore} 点</div>
        `;
        leaderboard.appendChild(item);
      });
    }

    /* ===== 渲染玩家卡片 ===== */
    function renderPlayerCards() {
      const container = document.getElementById('playersContainer');
      container.innerHTML = '';

      gameState.players.forEach((player, index) => {
        const card = document.createElement('div');
        card.className = 'player-card';
        if (gameState.currentRound === index) {
          card.classList.add('active');
        }
        card.id = `player-card-${player.id}`;

        card.innerHTML = `
          <div class="player-header">
            <div class="player-name">${player.name}</div>
            <div class="player-round">第 ${gameState.currentRound + 1}/${gameState.totalRounds} 轮</div>
          </div>

          <div class="dice-stage" id="dice-stage-${player.id}"></div>

          <div class="round-stats">
            <div class="stat-box">
              <div class="stat-label">本轮点数</div>
              <div class="stat-value" id="round-score-${player.id}">-</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">本轮骰数</div>
              <div class="stat-value" id="round-dice-${player.id}">0</div>
            </div>
            <div class="stat-box total">
              <div class="stat-label">累计总分</div>
              <div class="stat-value" id="total-score-${player.id}">${player.totalScore}</div>
            </div>
          </div>

          <button class="btn-roll" id="btn-roll-${player.id}" onclick="rollDiceForPlayer(${player.id})">
            🎲 ${player.name}的回合 - 摇一摇！
          </button>
        `;

        container.appendChild(card);
      });
    }

    /* ===== 玩家摇骰 ===== */
    function rollDiceForPlayer(playerId) {
      if (gameState.roundInProgress) return;

      const player = gameState.players[playerId];
      gameState.roundInProgress = true;

      const diceStage = document.getElementById(`dice-stage-${playerId}`);
      diceStage.innerHTML = '';

      const diceCount = gameState.dicePerRound;
      const results = [];
      let finishedCount = 0;

      playRollSound(2.5);

      for (let i = 0; i < diceCount; i++) {
        (function(diceIndex) {
          const targetPoint = Math.floor(Math.random() * 6) + 1;
          const duration = 1.2 + Math.random() * 0.8;
          const delay = Math.random() * 0.12;
          const totalTime = (duration + delay) * 1000;

          const containerDom = document.createElement('div');
          containerDom.className = 'cube-container';

          const shadowDom = document.createElement('div');
          shadowDom.className = 'cube-shadow';
          containerDom.appendChild(shadowDom);

          const cubeDom = document.createElement('div');
          cubeDom.className = 'cube';
          cubeDom.style.transition = `transform ${duration}s cubic-bezier(0.2, 0.8, 0.3, 1) ${delay}s`;

          for (let faceNum = 1; faceNum <= 6; faceNum++) {
            const faceDom = document.createElement('div');
            faceDom.className = `cube-face face-${faceNum}`;
            const pipsArr = facePipsConfig[faceNum];
            for (let pIdx = 0; pIdx < pipsArr.length; pIdx++) {
              const pipDom = document.createElement('div');
              pipDom.className = `pip ${pipsArr[pIdx]}`;
              faceDom.appendChild(pipDom);
            }
            cubeDom.appendChild(faceDom);
          }

          containerDom.appendChild(cubeDom);
          diceStage.appendChild(containerDom);

          const baseAngle = faceTransforms[targetPoint];
          const rotX = baseAngle.x + (Math.floor(Math.random() * 3) + 3) * 360;
          const rotY = baseAngle.y + (Math.floor(Math.random() * 3) + 3) * 360;
          const rotZ = baseAngle.z + Math.floor(Math.random() * 2) * 180;

          setTimeout(() => {
            cubeDom.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
            shadowDom.style.transform = 'scale(1.3)';
          }, 20);

          setTimeout(() => {
            cubeDom.classList.add('impact-effect');
            shadowDom.style.transform = 'scale(0.9)';
            playClickSound(0.8 + targetPoint * 0.15);

            // 关键修复：更新骰子正面显示的点数图案
            const primaryFace = cubeDom.querySelector('.face-1');
            if (primaryFace) {
              primaryFace.innerHTML = '';
              const newPips = facePipsConfig[targetPoint];
              newPips.forEach(pClass => {
                const pDiv = document.createElement('div');
                pDiv.className = `pip ${pClass}`;
                
                // 1点和4点显示红色，其他黑色
                if (targetPoint === 1 || targetPoint === 4) {
                  pDiv.style.backgroundColor = '#d90429';
                } else {
                  pDiv.style.backgroundColor = '#111';
                }

                // 统一 1 点的大小，防止停止后变大/变小
                if (targetPoint === 1) {
                  pDiv.style.width = '20px';
                  pDiv.style.height = '20px';
                } else {
                  pDiv.style.width = '12px';
                  pDiv.style.height = '12px';
                }
                
                primaryFace.appendChild(pDiv);
              });
            }

            results[diceIndex] = targetPoint;
            finishedCount++;

            if (finishedCount === diceCount) {
              completePlayerRound(playerId, results);
            }
          }, totalTime + 50);
        })(i);
      }
    }

    /* ===== 完成玩家回合 ===== */
    function completePlayerRound(playerId, diceResults) {
      const player = gameState.players[playerId];
      const roundScore = diceResults.reduce((a, b) => a + b, 0);

      player.currentRoundDice = diceResults;
      player.currentRoundScore = roundScore;
      player.rounds.push(roundScore);
      player.totalScore += roundScore;

      // 更新 UI
      document.getElementById(`round-score-${playerId}`).textContent = roundScore;
      document.getElementById(`round-dice-${playerId}`).textContent = diceResults.length;
      document.getElementById(`total-score-${playerId}`).textContent = player.totalScore;
      document.getElementById(`btn-roll-${playerId}`).classList.add('completed');
      document.getElementById(`btn-roll-${playerId}`).disabled = true;
      document.getElementById(`btn-roll-${playerId}`).textContent = '✓ 已完成';

      renderLeaderboard();

      gameState.roundInProgress = false;

      // 检查是否所有玩家都完成了本轮
      const allCompleted = gameState.players.every(p => p.rounds.length > gameState.currentRound);
      if (allCompleted) {
        gameState.currentRound++;
        if (gameState.currentRound >= gameState.totalRounds) {
          endGame();
        } else {
          setTimeout(() => {
            startNewRound();
          }, 1500);
        }
      }
    }

    /* ===== 开始新一轮 ===== */
    function startNewRound() {
      gameState.players.forEach(player => {
        player.currentRoundDice = [];
        player.currentRoundScore = 0;
      });
      renderGame();
    }

    /* ===== 游戏结束 ===== */
    function endGame() {
      gameState.gameActive = false;

      const sorted = [...gameState.players].sort((a, b) => {
        if (gameState.winCondition === 'high') {
          return b.totalScore - a.totalScore;
        } else {
          return a.totalScore - b.totalScore;
        }
      });

      const winner = sorted[0];

      // 显示结果弹窗
      const winnerText = document.getElementById('winnerText');
      winnerText.textContent = `🎉 ${winner.name} 获胜！🎉`;

      const finalStats = document.getElementById('finalStats');
      finalStats.innerHTML = sorted.map((player, index) => `
        <div class="modal-stat-line">
          <span class="modal-stat-name">🥇 第 ${index + 1} 名: ${player.name}</span>
          <span class="modal-stat-value">${player.totalScore} 点</span>
        </div>
      `).join('');

      document.getElementById('resultModal').classList.add('active');

      // 更新卡片样式
      gameState.players.forEach(player => {
        const card = document.getElementById(`player-card-${player.id}`);
        if (player.id === winner.id) {
          card.classList.add('winner');
        }
      });
    }

    /* ===== 关闭结果弹窗 ===== */
    function closeResultModal() {
      document.getElementById('resultModal').classList.remove('active');
    }

    /* ===== 重置游戏 ===== */
    function resetGame() {
      gameState.gameActive = false;
      gameState.roundInProgress = false;
      gameState.players = [];
      gameState.currentRound = 0;

      document.getElementById('configPanel').style.display = 'grid';
      document.getElementById('gameArena').classList.remove('active');
      document.getElementById('resultModal').classList.remove('active');
      document.getElementById('playersContainer').innerHTML = '';
      document.getElementById('leaderboard').innerHTML = '';
    }
  </script>
</body>
</html>
