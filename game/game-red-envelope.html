<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧧 疯狂抢红包 PRO</title>
  <style>
    :root {
      --primary-color: #d946ef;
      --secondary-color: #06b6d4;
      --accent-gold: #f7b801;
      --dark-bg: #0a0e27;
      --light-text: #ffffff;
      --text-secondary: #a0aec0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid var(--primary-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--primary-color);
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .navbar-nav a:hover {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: var(--primary-color);
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid var(--primary-color);
    }

    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 15px 40px;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .config-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .config-item label {
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .config-item input {
      padding: 8px 12px;
      border-radius: 5px;
      border: 2px solid rgba(247, 184, 1, 0.2);
      background: rgba(26, 35, 50, 0.9);
      color: var(--light-text);
      width: 90px;
      font-size: 0.95rem;
    }

    .btn-start {
      padding: 10px 30px;
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s ease;
      margin-top: 15px;
      align-self: center;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .stats {
      margin: 20px 0;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 30px;
      color: var(--text-secondary);
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.3rem;
    }

    .envelope-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 40px 0;
      padding: 20px;
      justify-items: center;
    }

    .envelope {
      width: 100%;
      max-width: 100px;
      aspect-ratio: 1;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ff4d4f, #cf1322);
      border: 3px solid rgba(255, 77, 79, 0.5);
      border-radius: 8px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    .envelope:hover:not(.grabbed) {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 12px 24px rgba(255, 77, 79, 0.5);
    }

    .envelope.grabbed {
      opacity: 0.5;
      cursor: default;
      background: linear-gradient(135deg, #999, #666);
      border-color: rgba(150, 150, 150, 0.5);
    }

    .envelope-amount {
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 768px) {
      .navbar { padding: 0 15px; height: 60px; }
      .navbar-logo { font-size: 1.2rem; }
      .navbar-logo span { width: 35px; height: 35px; font-size: 1rem; }
      .main-content { padding: 80px 12px 30px; }
      .title { font-size: 1.6rem; }
      .envelope-grid { gap: 15px; padding: 15px; margin: 30px 0; }
      .envelope { max-width: 90px; font-size: 2rem; }
    }

    @media (max-width: 480px) {
      .navbar-nav { display: none; }
      .main-content { padding: 70px 10px 20px; }
      .container { padding: 15px; border-radius: 15px; }
      .title { font-size: 1.3rem; margin-bottom: 15px; }
      .config-panel { gap: 8px; padding: 12px; }
      .config-item input { width: 60px; font-size: 0.8rem; }
      .envelope-grid { gap: 12px; padding: 10px; margin: 20px 0; }
      .envelope { max-width: 80px; font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span>🎮</span>
      Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="game-red-envelope.html" class="active">🧧 红包</a>
      <a href="game-dice-arena.html">🎲 骰子</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="container">
      <div class="header">
        <div class="title">🧧 疯狂抢红包 PRO</div>
      </div>

      <div class="config-panel">
        <div class="config-item">
          <label>红包数量</label>
          <input type="number" id="envelopeCount" value="9" min="1" max="20">
        </div>
        <div class="config-item">
          <label>总金额</label>
          <input type="number" id="totalAmount" value="100" min="1">
        </div>
        <div class="config-item">
          <label>最小金额</label>
          <input type="number" id="minAmount" value="5" step="0.1">
        </div>
        <div class="config-item">
          <label>最大金额</label>
          <input type="number" id="maxAmount" value="30" step="0.1">
        </div>
        <button class="btn-start" onclick="initGame()">重新开始</button>
      </div>

      <div class="stats">
        <div>已抢: <span id="grabbedCount" class="stat-val">0</span></div>
        <div>总收获: <span id="totalGrabbed" class="stat-val">¥0.00</span></div>
      </div>

      <div id="envelopeGrid" class="envelope-grid"></div>
    </div>
  </div>

  <script>
    let gameState = {
      envelopes: [],
      grabbedCount: 0,
      totalGrabbed: 0
    };

    function distributeMoney(count, total, min, max) {
      if (count * min > total) return Array(count).fill(Math.round(total / count * 10) / 10);
      if (count * max < total) return Array(count).fill(max);

      let amounts = Array(count).fill(0);
      let remaining = total;
      
      for (let i = 0; i < count; i++) {
        const itemsLeft = count - i;
        const minNeeded = min * itemsLeft;
        const maxPossible = Math.min(max, remaining - minNeeded);
        const amount = Math.round((min + Math.random() * (maxPossible - min)) * 10) / 10;
        amounts[i] = amount;
        remaining -= amount;
      }

      if (remaining > 0.01) {
        const idx = Math.floor(Math.random() * count);
        amounts[idx] = Math.round((amounts[idx] + remaining) * 10) / 10;
      }

      return amounts.sort(() => Math.random() - 0.5);
    }

    function initGame() {
      const count = parseInt(document.getElementById('envelopeCount').value) || 9;
      const total = parseFloat(document.getElementById('totalAmount').value) || 100;
      const min = parseFloat(document.getElementById('minAmount').value) || 5;
      const max = parseFloat(document.getElementById('maxAmount').value) || 30;

      gameState.envelopes = distributeMoney(count, total, min, max);
      gameState.grabbedCount = 0;
      gameState.totalGrabbed = 0;

      document.getElementById('grabbedCount').textContent = gameState.grabbedCount;
      document.getElementById('totalGrabbed').textContent = '¥0.00';

      const grid = document.getElementById('envelopeGrid');
      grid.innerHTML = '';

      gameState.envelopes.forEach((amount, idx) => {
        const envelope = document.createElement('div');
        envelope.className = 'envelope';
        envelope.innerHTML = `<span class="envelope-amount">🧧</span>`;
        envelope.dataset.amount = amount;
        envelope.onclick = () => grabEnvelope(envelope, amount);
        grid.appendChild(envelope);
      });
    }

    function grabEnvelope(envelopeEl, amount) {
      if (envelopeEl.classList.contains('grabbed')) return;

      envelopeEl.classList.add('grabbed');
      envelopeEl.innerHTML = `<span class="envelope-amount">¥${amount.toFixed(1)}</span>`;
      
      gameState.grabbedCount++;
      gameState.totalGrabbed += amount;

      document.getElementById('grabbedCount').textContent = gameState.grabbedCount;
      document.getElementById('totalGrabbed').textContent = '¥' + gameState.totalGrabbed.toFixed(2);
    }

    window.addEventListener('load', initGame);
  </script>
</body>
</html>
