<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幸运砸金蛋</title>
  <style>
    /* ===== 基础重置 ===== */
    :root { --accent-gold: #f7b801; --dark-bg: #0f1419; --primary-purple: #d946ef; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%); color: #fff; font-family: sans-serif; padding-top: 80px; overflow-x: hidden; }

    /* ===== 导航栏 ===== */
    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(10, 14, 39, 0.95); border-bottom: 2px solid var(--primary-purple); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
    .navbar-logo { font-size: 1.3rem; font-weight: 900; color: var(--primary-purple); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .menu-toggle { display: block; cursor: pointer; padding: 10px; }
    .menu-toggle span { display: block; width: 25px; height: 3px; background: var(--primary-purple); margin: 5px 0; }
    
    /* 侧边弹出导航 */
    .navbar-nav { position: fixed; top: 70px; right: -200px; width: 200px; height: calc(100vh - 70px); background: rgba(10, 14, 39, 0.98); display: flex; flex-direction: column; padding: 20px; transition: right 0.3s; z-index: 999; }
    .navbar-nav.mobile-open { right: 0; }
    .navbar-nav a { color: #a0aec0; text-decoration: none; padding: 15px 0; border-bottom: 1px solid #2d3748; font-size: 1rem; }
    .navbar-nav a.active { color: var(--primary-purple); }

    /* ===== 游戏容器 ===== */
    .container { width: 95%; max-width: 500px; margin: 0 auto; text-align: center; }
    .btn-spin { background: linear-gradient(135deg, #ff6b35, #ff8c42); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin: 20px 0; }
    .stats { margin: 15px 0; color: #b0b3c1; font-size: 1rem; }
    
    /* ===== 砸蛋网格 ===== */
    .egg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
    .egg-container { aspect-ratio: 1; position: relative; cursor: pointer; }
    .egg { width: 100%; height: 100%; background: #f7b801; border-radius: 50% 50% 40% 40%; transition: transform 0.3s; }
    .egg.broken { background: #555; transform: scale(0.9); }

    /* ===== LED战报 ===== */
    .config-panel { display: none; background: #000; border: 2px solid #ff0055; padding: 15px; border-radius: 10px; margin-top: 20px; }
    .config-panel.led-active { display: block; }
    .led-title { font-size: 1rem; color: #fff; margin-bottom: 5px; }
    .led-result { font-size: 1.5rem; color: #ffcc00; font-weight: bold; }
  </style>
</head>
<body>
  <canvas id="goldRainCanvas"></canvas>

  <nav class="navbar">
    <a href="#" class="navbar-logo">🥚 砸金蛋中心</a>
    <div class="menu-toggle" id="mobileMenuBtn"><span></span><span></span><span></span></div>
    <div class="navbar-nav" id="navbarNav"></div>
  </nav>

  <div class="container">
    <div id="shell-merchant-dynamic-card"></div>
    <div id="mainBoard" class="config-panel">
      <div class="led-title">🎰 🔴 FINAL REPORT 🔴 🎰</div>
      <div class="led-result" id="finalResult">￥0.00</div>
    </div>
    
    <button class="btn-spin" onclick="initGame()">重新开始</button>
    <div class="stats">剩余机会: <span id="remainingSmashes">0</span> | 已揽总额: ￥<span id="wonAmount">0.00</span></div>
    <div id="eggGrid" class="egg-grid"></div>
  </div>

  <script>
    // 游戏核心变量
    let gameState = { prizes: [], remainingSmashes: 3, wonAmount: 0, isProcessing: false };

    // 重新开始逻辑（修复：彻底清理状态）
    function initGame() {
      stopGoldRain();
      gameState.remainingSmashes = 3;
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      
      const board = document.getElementById('mainBoard');
      board.classList.remove('led-active');
      
      // 生成奖金池（演示用）
      gameState.prizes = [1.2, 5.5, 0, 10.0, 2.1, 0, 8.8, 0, 3.5];
      
      updateStats();
      renderEggs();
    }

    function renderEggs() {
      const grid = document.getElementById('eggGrid');
      grid.innerHTML = '';
      for(let i=0; i<9; i++) {
        const div = document.createElement('div');
        div.className = 'egg-container';
        div.innerHTML = `<div class="egg" id="egg-${i}"></div>`;
        div.onclick = () => smashEgg(i);
        grid.appendChild(div);
      }
    }

    function smashEgg(i) {
      if(gameState.isProcessing || gameState.remainingSmashes <= 0) return;
      const el = document.getElementById(`egg-${i}`);
      if(el.classList.contains('broken')) return;
      
      el.classList.add('broken');
      gameState.wonAmount += gameState.prizes[i];
      gameState.remainingSmashes--;
      updateStats();
      
      if(gameState.remainingSmashes === 0) {
        gameState.isProcessing = true;
        setTimeout(endGame, 500);
      }
    }

    function updateStats() {
      document.getElementById('remainingSmashes').innerText = gameState.remainingSmashes;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    function endGame() {
      document.getElementById('mainBoard').classList.add('led-active');
      document.getElementById('finalResult').innerText = `终极战报：￥${gameState.wonAmount.toFixed(2)}`;
      startGoldRain();
    }

    // 手机导航逻辑
    document.getElementById('mobileMenuBtn').onclick = () => {
      document.getElementById('navbarNav').classList.toggle('mobile-open');
    };

    // 引入外部配置后的初始化
    window.onload = initGame;
  </script>
  
  <script src="nav-config.js"></script>

  <script>
    const canvas = document.getElementById('goldRainCanvas');
    const ctx = canvas.getContext('2d');
    let animationFrameId = null;
    function stopGoldRain() { if(animationFrameId) cancelAnimationFrame(animationFrameId); ctx.clearRect(0,0,canvas.width,canvas.height); }
    function startGoldRain() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      function loop() {
        ctx.fillStyle = "rgba(255, 215, 0, 0.2)";
        ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 10);
        animationFrameId = requestAnimationFrame(loop);
      }
      loop();
    }
  </script>
</body>
</html>
