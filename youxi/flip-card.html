<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎰 幸运大翻牌 - Game Hub</title>
  <style>
    /* ===== 统一导航栏样式 ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.3rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .navbar-logo span {
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .navbar-spacer { flex: 1; }

    .navbar-nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      font-size: 0.9rem;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
      --big-prize:       #ff4d4f;
      --mid-prize:       #faad14;
      --small-prize:     #52c41a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      padding-top: 70px; 
    }

    /* ===== 金币大捷雨 ===== */
    .gold-rain-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .rain-drop {
      position: absolute;
      top: -50px;
      font-weight: 900;
      color: rgba(247, 184, 1, 0.75);
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.4);
      user-select: none;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(115vh) rotate(360deg); }
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 600px; 
      background: rgba(15, 20, 25, 0.95);
      border: 2px solid var(--accent-gold);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 0 40px rgba(247, 184, 1, 0.15);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      z-index: 20;
    }

    /* ===== 标题区 ===== */
    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 8px; 
      min-height: 40px;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 15px rgba(247, 184, 1, 0.4);
      letter-spacing: 1px;
    }

    /* 齿轮配置按钮 */
    .settings-toggle {
      position: absolute;
      left: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--accent-gold);
      transition: transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
    }
    .settings-toggle:hover {
      transform: translateY(-50%) rotate(45deg);
    }

    /* ===== 独立防击穿轻量遮罩层 ===== */
    .config-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .config-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== 设置面板 ===== */
    .config-panel {
      position: absolute;
      top: 45px;
      left: 4px;
      background: linear-gradient(135deg, #fff8dc 0%, #ffd666 100%);
      border: 2px solid #ffd700;
      border-radius: 14px;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px;
      width: 280px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(255, 215, 0, 0.1);
      transform: translateY(-10px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1005;
      text-align: left;
    }

    .config-panel.active {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .config-group.full-width {
      grid-column: span 2;
    }

    .config-label {
      font-size: 0.8rem;
      font-weight: 800;
      color: #7a3b00;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    .config-input {
      width: 100%; 
      padding: 8px;
      background: #ffffff;
      border: 2px solid #ff9800;
      border-radius: 8px;
      color: #222222;
      font-size: 1rem;
      font-weight: 900;
      outline: none;
      text-align: center;
      position: relative;
      z-index: 1010;
      transition: all 0.2s;
    }
    .config-input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
      background: #111111;
      color: #ffffff;
    }

    /* ===== 游戏数据统计 ===== */
    .stats {
      margin: 0 auto 10px; 
      font-size: 1rem;
      display: flex;
      justify-content: center;
      gap: 25px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 15px;
      border-radius: 10px;
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .stat-val {
      color: var(--accent-gold);
      font-weight: bold;
      font-size: 1.2rem;
      text-shadow: 0 0 8px rgba(247, 184, 1, 0.3);
    }

    /* ===== 游戏核心舞台 ===== */
    .game-stage {
      position: relative;
      width: 100%;
      margin: 0 auto 15px;
    }

    /* ===== LED 中置战报面板 ===== */
    .marquee-report-panel {
      position: absolute;
      top: 33%; 
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      width: 96%;
      max-width: 480px;
      background: linear-gradient(135deg, rgba(30, 5, 10, 0.98) 0%, rgba(10, 2, 5, 0.99) 100%);
      border: 3px solid #ff4757;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(255, 71, 87, 0.9), inset 0 0 20px rgba(255, 71, 87, 0.4);
      border-radius: 16px;
      padding: 14px 8px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      opacity: 0;
      pointer-events: none; 
      z-index: 90; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .marquee-report-panel.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .report-item { text-align: center; }
    .report-title { font-size: 0.75rem; color: #f3a6b0; margin-bottom: 2px; letter-spacing: 1px; }
    .report-val-big { font-size: 1.5rem; font-weight: 900; color: #ff4757; text-shadow: 0 0 10px rgba(255, 71, 87, 0.6); line-height: 1.1; }
    .report-val-big.gold { color: var(--accent-gold); text-shadow: 0 0 10px rgba(247, 184, 1, 0.6); }

    /* ===== 翻牌卡片矩阵区域 ===== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; 
      perspective: 1000px;
      padding: 4px;
      width: 100%;
    }

    .card {
      width: 100%;
      aspect-ratio: 0.714;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s;
      transform-style: flat;
    }

    .card:hover:not(.flipped) {
      transform: translateY(-4px);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      top: 0;
      left: 0;
    }

    .card-front {
      background-color: #0b112c; 
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(255, 220, 100, 0.2) 0%, transparent 65%),
        radial-gradient(rgba(255, 255, 255, 0.15) 15%, transparent 16%),
        radial-gradient(rgba(255, 215, 0, 0.12) 15%, transparent 16%);
      background-size: 100% 100%, 16px 16px, 16px 16px;
      background-position: 0 0, 0 0, 8px 8px;
      color: #ffd700;
      font-size: 2.2rem;
      border: 2px solid rgba(255, 215, 0, 0.6);
      text-shadow: 0 0 10px rgba(255, 235, 120, 0.6);
      z-index: 1;
      overflow: hidden;
    }
    
    .card-front::before {
      content: '✦';
      position: absolute;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.85);
      top: 12%;
      left: 15%;
      text-shadow: 0 0 6px #fff;
    }
    .card-front::after {
      content: '✦';
      position: absolute;
      font-size: 0.8rem;
      color: rgba(255, 215, 0, 0.7);
      bottom: 12%;
      right: 15%;
      text-shadow: 0 0 4px #ffd700;
    }

    .card-back {
      background: linear-gradient(135deg, #ffd700, #ffb300, #ff8f00);
      color: #4a2600;
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 4px;
      border: 1.5px solid rgba(247, 184, 1, 0.3);
      overflow: hidden;
    }

    .card-amount { font-size: 1.1rem; font-weight: bold; position: relative; z-index: 1; }
    .card-label { font-size: 0.7rem; opacity: 0.9; position: relative; z-index: 1; background: rgba(0, 0, 0, 0.3); padding: 1px 4px; border-radius: 3px; }

    .card-back.big-prize { background: linear-gradient(135deg, #ff4d4f, #cf1322); border-color: rgba(255, 77, 79, 0.5); color: #ffffff; }
    .card-back.mid-prize { background: linear-gradient(135deg, #2b1055, #511281); border-color: rgba(250, 173, 20, 0.6); color: #f7b801; }
    .card-back.small-prize { background: linear-gradient(135deg, #52c41a, #389e0d); border-color: rgba(82, 196, 26, 0.5); color: #ffffff; }

    .card.dimmed {
      opacity: 0.35;
      filter: grayscale(50%);
      transition: all 0.3s ease;
    }

    /* ===== 操作按钮 ===== */
    .btn-spin {
      width: 180px;
      margin: 0 auto;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.25);
      display: block;
    }

    #restartBtn {
      margin:12px auto 0;
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.08)}
    }

    /* ===== 移动端专属响应式微调 ===== */
    @media (max-width: 480px) {
      body { padding: 66px 6px 10px; }
      .navbar { padding: 0 8px; justify-content: space-between; height: 56px; }
      .navbar-spacer { display: none; }
      .navbar-nav { display: flex; overflow-x: auto; gap: 8px; flex: 1; margin-left: 6px; scrollbar-width: none; }
      .navbar-nav::-webkit-scrollbar { display: none; }
      .navbar-nav a { padding: 4px 8px; font-size: 0.8rem; }
      
      .container { padding: 10px 8px; border-radius: 16px; }
      .title { font-size: 1.4rem; }
      .settings-toggle { font-size: 1.4rem; left: 2px; }
      .stats { gap: 15px; font-size: 0.9rem; padding: 6px 10px; margin-bottom: 8px; }
      .stat-val { font-size: 1.05rem; }
      
      .card-grid { gap: 5px; padding: 2px; }
      .card-front { font-size: 1.7rem; border-width: 2px; }
      .card-amount { font-size: 0.95rem; }
      .card-label { font-size: 0.65rem; padding: 1px 3px; }
      
      .btn-spin { width: 150px; font-size: 0.95rem; padding: 8px 12px; }
      
      .marquee-report-panel { 
        padding: 10px 4px; 
        width: 98%; 
        top: 33.5%; 
      }
      .report-val-big { font-size: 1.25rem; }
      .report-title { font-size: 0.7rem; }
      
      .config-panel {
        width: 250px;
        gap: 8px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="gold-rain-container" id="goldRainContainer"></div>

  <nav class="navbar">
    <a href="#" class="navbar-logo">
      <span>🎮</span> Game Hub
    </a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav">
      <a href="index.html">首页</a>
      <a href="lucky-wheel.html">🎡 大转盘</a>
      <a href="flip-card.html" class="active">🎰 幸运牌</a>
      <a href="dart-wheel.html">🎯 射击轮盘</a>
      <a href="golden-egg.html">🥚 砸金蛋</a>
      <a href="red-envelope.html">🧧 抢红包</a>
      <a href="dice-arena.html">🎲 摇骰子</a>
    </div>
  </nav>

  <div class="config-overlay" id="configOverlay" onclick="toggleSettings()"></div>

  <div class="container">
    <div class="header">
      <button class="settings-toggle" onclick="toggleSettings()" title="游戏设置">⚙️</button>
      <div class="title">🎰 幸运大翻牌</div>

      <div class="config-panel" id="configPanel">
        <div class="config-group full-width">
          <label class="config-label">总奖池金额 (￥)</label>
          <input type="number" id="totalAmount" class="config-input" value="50" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">单张最小</label>
          <input type="number" id="minAmount" class="config-input" value="2" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">单张最大</label>
          <input type="number" id="maxAmount" class="config-input" value="10" step="0.1">
        </div>
        <div class="config-group">
          <label class="config-label">卡牌总张数</label>
          <input type="number" id="cardCount" class="config-input" value="9" min="3" max="30">
        </div>
        <div class="config-group">
          <label class="config-label">可翻牌次数</label>
          <input type="number" id="limitCount" class="config-input" value="3" min="1">
        </div>
      </div>
    </div>

    <div class="stats">
      <div>剩余机会: <span id="remainingFlips" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div class="game-stage">
      <div class="marquee-report-panel" id="marqueeReportPanel">
        <div class="report-item">
          <div class="report-title">🎉 战绩速递</div>
          <div style="font-size: 0.85rem; font-weight: 800; color: #ff4757;">翻牌大捷！</div>
        </div>
        <div class="report-item">
          <div class="report-title">🔥 斩获总奖金</div>
          <div class="report-val-big gold" id="ledTotal">￥0.00</div>
        </div>
        <div class="report-item">
          <div class="report-title">✨ 欧气评价</div>
          <div class="report-val-big" id="ledEval" style="font-size: 1.05rem; padding-top: 3px;">一本万利</div>
        </div>
      </div>

      <div id="cardGrid" class="card-grid"></div>
    </div>

    <button id="restartBtn" class="btn-spin" onclick="initGame()" style="display:none">重新洗牌</button>
  </div>

  <script src="flip-card.js"></script>
</body>
</html>flip-card.html
