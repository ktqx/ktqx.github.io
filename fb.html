<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎯 飞镖转盘 Pro - 多模式概率对战</title>
  <style>
    /* ===== CSS 变量 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:     #f7b801;
      --dark-bg:         #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 15px;
      cursor: crosshair;
    }

    /* ===== 主容器 ===== */
    .container {
      width: 100%;
      max-width: 950px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
    }

    /* ===== 标题区 ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* ===== 配置面板 ===== */
    .config-panel {
      background: linear-gradient(135deg, rgba(0, 78, 137, 0.15), rgba(255, 107, 53, 0.15));
      border: 2px solid rgba(247, 184, 1, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      width: 100%;
      overflow: hidden;
    }

    .config-input, .config-select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .config-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-input, .config-select {
      padding: 10px 12px;
      background: rgba(26, 35, 50, 0.9);
      border: 2px solid rgba(247, 184, 1, 0.2);
      border-radius: 8px;
      color: var(--light-text);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      transition: all 0.3s ease;
    }

    .config-input:focus, .config-select:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 15px rgba(247, 184, 1, 0.3);
    }

    /* 分布预览提示 */
    .distribution-preview {
      grid-column: 1 / -1;
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 4px solid var(--accent-gold);
      margin-top: 5px;
    }

    /* ===== 转盘区域 ===== */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin-bottom: 25px;
    }

    .wheel-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: crosshair;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fff;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 0 0 8px var(--accent-gold),
        0 0 0 12px rgba(247, 184, 1, 0.3);
      position: relative;
      overflow: hidden;
      transition: transform 0.05s linear;
    }

    .wheel svg {
      width: 100%;
      height: 100%;
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, var(--accent-gold) 0%, #d4a500 100%);
      border-radius: 50%;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .darts-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .dart {
      position: absolute;
      width: 24px;
      height: 24px;
      font-size: 1.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.6));
    }

    .crosshair {
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 6;
      display: none;
    }

    .crosshair.active {
      display: block;
    }

    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: var(--accent-gold);
      box-shadow: 0 0 10px var(--accent-gold);
    }

    .crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
    .crosshair::after { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }

    /* ===== 控制面板 ===== */
    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 100%;
    }

    .status-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-align: center;
      min-height: 30px;
    }

    .btn-start {
      width: 100%;
      max-width: 320px;
      padding: 18px 30px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 107, 53, 0.5); }
    .btn-start:disabled { opacity: 0.6; cursor: not-allowed; }

    /* 响应式适配 */
    @media (max-width: 768px) {
      .container { padding: 15px; }
      .title { font-size: 1.6rem; }
      .config-panel { grid-template-columns: 1fr; }
      .wheel-container { max-width: 340px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">🎯 飞镖转盘 Pro</div>
    </div>

    <!-- 配置面板 -->
    <div class="config-panel">
      <div class="config-group">
        <label class="config-label">转盘总等分数</label>
        <input type="number" class="config-input" id="sectorCount" value="20" min="4" max="60" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">转盘文字内容</label>
        <input type="text" class="config-input" id="sectorTexts" value="8,9,10" placeholder="如: 8,9,10" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">概率分布模式</label>
        <select class="config-select" id="distMode" onchange="updateWheel()">
          <option value="equal">⚖️ 绝对平分 (所有项概率相同)</option>
          <option value="jackpot">🏆 大奖模式 (首项稀有，其余平分)</option>
          <option value="asc">📈 递增分布 (按顺序概率变大)</option>
          <option value="desc">📉 递减分布 (按顺序概率变小)</option>
          <option value="polar">🔥 极化分布 (两头多，中间少)</option>
          <option value="manual">⌨️ 专家自定义 (手动输入数量)</option>
        </select>
      </div>

      <div class="config-group" id="manualInputGroup" style="display: none;">
        <label class="config-label">手动分配数量 (需总和等于等分数)</label>
        <input type="text" class="config-input" id="sectorCounts" value="7,7,6" placeholder="如: 7,7,6" onchange="updateWheel()">
      </div>

      <div class="config-group">
        <label class="config-label">减速时长(秒)</label>
        <input type="number" class="config-input" id="decelerationTime" value="5" min="1" max="20" step="0.5">
      </div>

      <div class="distribution-preview" id="distPreview">当前分配：正在计算...</div>
    </div>

    <!-- 转盘区域 -->
    <div class="wheel-section">
      <div class="wheel-container" id="wheelContainer">
        <div class="crosshair" id="crosshair"></div>
        <div class="wheel" id="wheel">
          <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
          <div class="darts-container" id="dartsContainer"></div>
          <div class="wheel-center">🎯</div>
        </div>
      </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
      <div class="status-text" id="statusText">准备就绪</div>
      <button class="btn-start" id="startBtn" onclick="startGame()">🚀 开始游戏</button>
    </div>
  </div>

  <script>
    /* ===== 游戏状态 ===== */
    const gameState = {
      isSpinning: false,
      isDecelerating: false,
      currentRotation: 0,
      wheelRotationSpeed: 0,
      sectors: [],
      dartAngle: null
    };

    const colors = ["#ff6b35", "#004e89", "#f7b801", "#2ec4b6", "#e71d36", "#7209b7", "#4cc9f0"];

    /* ===== 初始化转盘 ===== */
    function updateWheel() {
      const sectorCount = parseInt(document.getElementById('sectorCount').value) || 20;
      const texts = document.getElementById('sectorTexts').value.split(',').map(s => s.trim());
      const mode = document.getElementById('distMode').value;
      
      const manualGroup = document.getElementById('manualInputGroup');
      manualGroup.style.display = (mode === 'manual') ? 'flex' : 'none';

      let counts = [];
      const n = texts.length;

      if (mode === 'equal') {
        const base = Math.floor(sectorCount / n);
        counts = new Array(n).fill(base);
        for(let i=0; i < sectorCount % n; i++) counts[i]++;
      } 
      else if (mode === 'jackpot') {
        counts = new Array(n).fill(Math.floor((sectorCount - 1) / (n - 1)));
        counts[0] = 1;
        let sum = counts.reduce((a,b) => a+b, 0);
        while(sum < sectorCount) { counts[n-1]++; sum++; }
      }
      else if (mode === 'asc' || mode === 'desc') {
        let totalWeight = (n * (n + 1)) / 2;
        let unit = sectorCount / totalWeight;
        counts = texts.map((_, i) => Math.max(1, Math.round((i + 1) * unit)));
        if (mode === 'desc') counts.reverse();
        adjustCounts(counts, sectorCount);
      }
      else if (mode === 'polar') {
        counts = texts.map((_, i) => {
          const mid = (n - 1) / 2;
          const dist = Math.abs(i - mid);
          return Math.max(1, Math.round(dist + 1));
        });
        adjustCounts(counts, sectorCount);
      }
      else if (mode === 'manual') {
        counts = document.getElementById('sectorCounts').value.split(',').map(s => parseInt(s.trim()) || 1);
        while(counts.length < n) counts.push(1);
        counts = counts.slice(0, n);
      }

      // 渲染文字预览
      document.getElementById('distPreview').textContent = `当前分布：` + texts.map((t, i) => `${t}(${counts[i]}份)`).join(' | ');

      // 生成打乱后的扇区
      gameState.sectors = [];
      texts.forEach((text, i) => {
        for(let j=0; j < counts[i]; j++) gameState.sectors.push(text);
      });
      
      // 智能随机洗牌：尽量避免相同内容相邻
      gameState.sectors = smartShuffle(gameState.sectors);

      renderWheel(texts);
    }

    function adjustCounts(counts, target) {
      let sum = counts.reduce((a,b) => a+b, 0);
      while(sum !== target) {
        if(sum < target) { counts[counts.length-1]++; sum++; }
        else { 
          const maxIdx = counts.indexOf(Math.max(...counts));
          if(counts[maxIdx] > 1) { counts[maxIdx]--; sum--; }
          else break;
        }
      }
    }

    // 智能洗牌算法：尝试将相同元素分散开
    function smartShuffle(arr) {
      let result = [];
      let tempArr = [...arr];
      
      // 先打乱原始数组
      for (let i = tempArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tempArr[i], tempArr[j]] = [tempArr[j], tempArr[i]];
      }

      // 贪心放置，尽量不让连续两个相同
      while (tempArr.length > 0) {
        let found = false;
        for (let i = 0; i < tempArr.length; i++) {
          if (result.length === 0 || tempArr[i] !== result[result.length - 1]) {
            result.push(tempArr.splice(i, 1)[0]);
            found = true;
            break;
          }
        }
        // 如果剩下的全是相同的，只能强行放入
        if (!found) {
          result.push(tempArr.splice(0, 1)[0]);
        }
      }

      // 处理首尾相接的情况（因为转盘是圆的）
      if (result.length > 1 && result[0] === result[result.length - 1]) {
        for (let i = 1; i < result.length - 1; i++) {
          if (result[i] !== result[0] && result[i+1] !== result[0]) {
            // 交换位置
            [result[result.length - 1], result[i]] = [result[i], result[result.length - 1]];
            break;
          }
        }
      }

      return result;
    }

    function renderWheel(texts) {
      const svg = document.getElementById('wheelSvg');
      svg.innerHTML = '';
      const sectorCount = gameState.sectors.length;
      const anglePerSector = 360 / sectorCount;
      
      const colorMap = {};
      texts.forEach((t, i) => colorMap[t] = colors[i % colors.length]);

      gameState.sectors.forEach((text, idx) => {
        const startAngle = idx * anglePerSector;
        const endAngle = (idx + 1) * anglePerSector;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (endAngle - 90) * Math.PI / 180;

        const x1 = 200 + 200 * Math.cos(startRad);
        const y1 = 200 + 200 * Math.sin(startRad);
        const x2 = 200 + 200 * Math.cos(endRad);
        const y2 = 200 + 200 * Math.sin(endRad);

        const path = `M 200 200 L ${x1} ${y1} A 200 200 0 ${anglePerSector > 180 ? 1 : 0} 1 ${x2} ${y2} Z`;
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', path);
        p.setAttribute('fill', colorMap[text]);
        p.setAttribute('stroke', '#fff');
        p.setAttribute('stroke-width', '1');
        svg.appendChild(p);

        const midAngle = (startAngle + endAngle) / 2;
        const midRad = (midAngle - 90) * Math.PI / 180;
        const tx = 200 + 130 * Math.cos(midRad);
        const ty = 200 + 130 * Math.sin(midRad);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', tx); t.setAttribute('y', ty);
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'middle');
        t.setAttribute('font-size', sectorCount > 30 ? '12' : '18');
        t.setAttribute('font-weight', 'bold'); t.setAttribute('fill', '#fff');
        t.setAttribute('transform', `rotate(${midAngle} ${tx} ${ty})`);
        t.textContent = text;
        svg.appendChild(t);
      });
    }

    /* ===== 游戏逻辑 ===== */
    function startGame() {
      if (gameState.isSpinning) return;
      gameState.isSpinning = true;
      gameState.isDecelerating = false;
      gameState.dartAngle = null;
      document.getElementById('startBtn').disabled = true;
      document.getElementById('statusText').textContent = '转盘已启动！瞄准转盘点击投掷飞镖！';
      document.getElementById('dartsContainer').innerHTML = '';
      gameState.wheelRotationSpeed = 10;
      animateWheel();
    }

    function animateWheel() {
      if (!gameState.isSpinning) return;
      gameState.currentRotation += gameState.wheelRotationSpeed;
      document.getElementById('wheel').style.transform = `rotate(${gameState.currentRotation}deg)`;
      if (gameState.isDecelerating) {
        gameState.wheelRotationSpeed *= 0.985;
        if (gameState.wheelRotationSpeed < 0.05) {
          gameState.wheelRotationSpeed = 0;
          gameState.isSpinning = false;
          getResult();
          return;
        }
      }
      requestAnimationFrame(animateWheel);
    }

    const wheelContainer = document.getElementById('wheelContainer');
    wheelContainer.addEventListener('mousemove', (e) => {
      if (!gameState.isSpinning || gameState.isDecelerating) return;
      const rect = wheelContainer.getBoundingClientRect();
      const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
      const dist = Math.sqrt(Math.pow(mouseX - rect.width/2, 2) + Math.pow(mouseY - rect.height/2, 2));
      const crosshair = document.getElementById('crosshair');
      if (dist < rect.width/2) {
        crosshair.classList.add('active');
        crosshair.style.left = (mouseX - 20) + 'px'; crosshair.style.top = (mouseY - 20) + 'px';
      } else crosshair.classList.remove('active');
    });

    wheelContainer.addEventListener('click', (e) => {
      if (!gameState.isSpinning || gameState.isDecelerating) return;
      const rect = wheelContainer.getBoundingClientRect();
      const cx = rect.width/2, cy = rect.height/2;
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (Math.sqrt(Math.pow(mx - cx, 2) + Math.pow(my - cy, 2)) >= cx) return;

      gameState.dartAngle = Math.atan2(my - cy, mx - cx) * 180 / Math.PI;
      const dart = document.createElement('div');
      dart.className = 'dart'; dart.textContent = '🎯';
      dart.style.left = mx + 'px'; dart.style.top = my + 'px';
      dart.style.transform = `translate(-50%, -50%) rotate(${gameState.dartAngle}deg)`;
      document.getElementById('dartsContainer').appendChild(dart);

      gameState.isDecelerating = true;
      const decelTime = parseFloat(document.getElementById('decelerationTime').value) || 5;
      setTimeout(() => { if(gameState.isSpinning) { gameState.wheelRotationSpeed = 0; gameState.isSpinning = false; getResult(); } }, decelTime * 1000);
    });

    function getResult() {
      if (gameState.dartAngle === null) return;
      const sectorCount = gameState.sectors.length;
      const anglePerSector = 360 / sectorCount;
      const normalizedDartAngle = (gameState.dartAngle + 90 + 360) % 360;
      const sectorIndex = Math.floor(normalizedDartAngle / anglePerSector) % sectorCount;
      const result = gameState.sectors[sectorIndex];
      document.getElementById('statusText').innerHTML = `🎯 命中结果：<span style="font-size: 1.8rem; color: var(--primary-color);">${result}</span>`;
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '🔄 重新开始';
    }

    window.addEventListener('load', updateWheel);
  </script>
</body>
</html>
