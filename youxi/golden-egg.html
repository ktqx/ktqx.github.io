<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专属商户互动营销中心</title>
  <style>
    /* ===== 🧱 优化后的高端暗黑紫金导航栏（兼容手机端折叠隐藏） ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 2px solid #d946ef;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(217, 70, 239, 0.2);
    }

    .navbar-logo {
      font-size: 1.4rem;
      font-weight: 900;
      color: #d946ef;
      text-shadow: 0 0 10px rgba(217, 70, 239, 0.5);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .navbar-logo span {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d946ef, #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .navbar-nav {
      display: flex;
      gap: 15px;
      align-items: center;
      transition: all 0.3s ease;
    }

    .navbar-nav a {
      color: #a0aec0;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.95rem;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .navbar-nav a:hover {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.1);
    }

    .navbar-nav a.active {
      color: #d946ef;
      background: rgba(217, 70, 239, 0.2);
      border: 1px solid #d946ef;
    }
    
    /* 手机端独享汉堡切换按钮 */
    .menu-toggle {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 26px;
      height: 20px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 1100;
    }
    .menu-toggle span {
      width: 100%;
      height: 3px;
      background-color: #d946ef;
      border-radius: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 0 5px #d946ef;
    }

    /* ===== 全局变量与重置 ===== */
    :root {
      --primary-color:   #ff6b35;
      --secondary-color: #004e89;
      --accent-gold:      #f7b801;
      --dark-bg:          #0f1419;
      --light-text:      #ffffff;
      --text-secondary:  #b0b3c1;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
      color: var(--light-text);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      padding-top: 95px; /* 防止被通栏导航遮挡 */
      position: relative;
    }

    #goldRainCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: rgba(15, 20, 25, 0.95);
      border: 3px solid var(--accent-gold);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 0 50px rgba(247, 184, 1, 0.2), inset 0 0 30px rgba(247, 184, 1, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .header { text-align: center; margin-bottom: 25px; }
    .title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(247, 184, 1, 0.4);
      letter-spacing: 2px;
    }

    /* 商家动态引流名片区 */
    .merchant-display-card {
      background: rgba(0,0,0,0.4);
      border: 1px dashed var(--accent-gold);
      border-radius: 12px;
      padding: 12px;
      margin: 0 auto 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: center;
      gap: 10px;
      max-width: 600px;
    }
    .merchant-meta-item { font-size: 0.85rem; color: var(--text-secondary); text-align: left; }
    .merchant-meta-item b { color: var(--accent-gold); }

    .board-wrapper { width: 100%; margin-bottom: 20px; perspective: 1000px; }

    /* 🧠 核心重设：隐藏原生的配置面板，仅在游戏结算时变形为LED大屏 */
    .config-panel {
      display: none !important; /* 强制前台和商家完全隐藏 */
    }

    .config-panel.led-active {
      display: flex !important; /* 结算时解除隐藏 */
      background: radial-gradient(circle at center, #110022 0%, #000000 100%);
      border: 4px solid #ff0055;
      box-shadow: 0 0 30px #ff0055, inset 0 0 20px #ff0055, 0 0 50px #ffcc00;
      animation: ledStretch 0.6s ease forwards, ledBlink 1.5s infinite alternate 0.6s;
      padding: 20px;
      border-radius: 15px;
      justify-content: center;
      width: 100%;
    }

    @keyframes ledStretch {
      0% { transform: scale(1); filter: brightness(1); }
      30% { transform: scaleX(1.1) scaleY(0.4) skewX(-15deg); filter: brightness(3); border-color: #ffcc00; }
      100% { transform: scale(1) skewX(0); filter: brightness(1); }
    }
    @keyframes ledBlink {
      0% { border-color: #ff0055; box-shadow: 0 0 25px #ff0055, inset 0 0 15px #ff0055, 0 0 40px #ffcc00; }
      100% { border-color: #ffcc00; box-shadow: 0 0 35px #ffcc00, inset 0 0 25px #ffcc00, 0 0 60px #ff0055; }
    }

    .led-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Impact', 'Arial Black', sans-serif;
      letter-spacing: 2px;
    }
    .led-title { font-size: 1.8rem; color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; margin-bottom: 10px; }
    .led-result { font-size: 2.5rem; color: #ffcc00; text-shadow: 0 0 15px #ffcc00, 0 0 30px #ff8800; font-weight: 900; }

    .btn-spin {
      width: 200px;
      margin: 0 auto 25px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary-color), #ff8c42);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
      display: block;
    }
    .btn-spin:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5); }

    .stats {
      margin: 15px 0;
      font-size: 1.1rem;
      display: flex;
      justify-content: center;
      gap: 40px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.2);
      padding: 10px;
      border-radius: 10px;
    }
    .stat-val { color: var(--accent-gold); font-weight: bold; font-size: 1.4rem; text-shadow: 0 0 10px rgba(247, 184, 1, 0.3); }

    .egg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      perspective: 1000px;
      margin: 25px 0;
      padding: 10px;
      justify-content: center;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .egg-container { width: 100%; aspect-ratio: 1; cursor: pointer; position: relative; transition: transform 0.3s; display: flex; align-items: center; justify-content: center; }
    .egg-container:hover:not(.smashed) { transform: translateY(-8px) scale(1.05); }
    
    .egg {
      width: 85%;
      height: 100%;
      background: radial-gradient(circle at 35% 25%, #ffffff 0%, #fff4b3 15%, #fcd34d 35%, #d97706 70%, #78350f 100%);
      border-radius: 50% 50% 50% 50% / 68% 68% 32% 32%;
      box-shadow: inset -10px -20px 35px rgba(0,0,0,0.5), inset 6px 12px 18px rgba(255,255,255,0.8), 0 15px 25px rgba(0, 0, 0, 0.4);
      position: absolute; top: 0; left: 7.5%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .egg::after { content: ''; position: absolute; top: 12%; left: 18%; width: 25%; height: 15%; background: rgba(255, 255, 255, 0.6); border-radius: 50%; filter: blur(4px); transform: rotate(-25deg); }

    .egg-shadow { position: absolute; bottom: 5px; width: 80%; height: 12px; background: rgba(0, 0, 0, 0.6); border-radius: 50%; filter: blur(3px); z-index: 1; }
    .egg.broken { background: none; box-shadow: none; animation: crackDown 0.6s ease-out forwards; border: none; }
    .egg.broken::before { content: ''; position: absolute; bottom: 0; left: 7px; width: 90%; height: 40px; background: radial-gradient(circle at 50% 100%, #f7b801 20%, #cc9900 80%); clip-path: polygon(0% 100%, 100% 100%, 95% 40%, 80% 60%, 65% 20%, 50% 50%, 35% 15%, 20% 55%, 5% 30%); }
    .egg-fragment { position: absolute; pointer-events: none; z-index: 10; opacity: 0; }

    @keyframes crackDown {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: translateY(20px) scaleY(0.6); opacity: 0; pointer-events: none; }
    }
    @keyframes fragment-fly {
      0% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.3); opacity: 0; }
    }

    .prize-label { position: absolute; font-size: 1.3rem; font-weight: 800; color: #fff; background: linear-gradient(135deg, #ff4d4f, #cf1322); padding: 8px 12px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transform: translate(-50%, -50%) scale(0); z-index: 3; pointer-events: none; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.4); top: 70%; left: 50%; }
    .egg-container.smashed .prize-label { transform: translate(-50%, -50%) scale(1); }
    .egg-container.dimmed .egg { opacity: 0.4; }
    .egg-container.dimmed .prize-label { background: rgba(220, 220, 220, 0.85); color: #2d3748; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-shadow: none; }

    .status-text { font-size: 1.1rem; font-weight: 700; color: var(--accent-gold); text-align: center; min-height: 35px; margin-top: 15px; }

    /* ===== 📱 移动响应式完美折叠菜单 CSS 控制 ===== */
    @media (max-width: 768px) {
      .menu-toggle { display: flex; }
      .navbar { padding: 0 20px; }
      .navbar-nav {
        position: fixed; top: 70px; left: 0; right: 0;
        background: rgba(10, 14, 39, 0.98);
        border-bottom: 2px solid #d946ef;
        flex-direction: column; padding: 20px; gap: 15px;
        transform: translateY(-150%); opacity: 0; pointer-events: none;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      }
      .navbar-nav.mobile-open { transform: translateY(0); opacity: 1; pointer-events: auto; }
      .menu-toggle.open span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
      .menu-toggle.open span:nth-child(2) { opacity: 0; }
      .menu-toggle.open span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }
      
      .egg-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="goldRainCanvas"></canvas>

  <nav class="navbar">
    <a href="#" class="navbar-logo">
      <span>🎮</span> <span id="shell-brand-name">游戏中心</span>
    </a>
    <button class="menu-toggle" id="mobileMenuBtn">
      <span></span><span></span><span></span>
    </button>
    <div class="navbar-nav" id="navbarNav"></div>
  </nav>

  <div class="container">
    <div class="header">
      <div class="title" id="shell-game-title">🥚 幸运砸金蛋</div>
    </div>
    
    <div id="shell-merchant-dynamic-card"></div>

    <div class="board-wrapper">
      <div class="config-panel" id="mainBoard">
        <input type="number" id="totalAmount" value="50">
        <input type="number" id="minAmount" value="2" step="0.1">
        <input type="number" id="maxAmount" value="10" step="0.1">
        <input type="number" id="eggCount" value="9">
        <input type="number" id="limitCount" value="3">
      </div>
    </div>

    <button class="btn-spin" onclick="initGame()">重新开始</button>

    <div class="stats">
      <div>剩余机会: <span id="remainingSmashes" class="stat-val">0</span> 次</div>
      <div>已揽总额: ￥<span id="wonAmount" class="stat-val">0.00</span></div>
    </div>

    <div id="eggGrid" class="egg-grid"></div>

    <div class="status-text" id="statusText">请点击上方按钮初始化或开始砸蛋</div>
  </div>

  <script>
    // ===== ⚙️ 动态全局菜单配置：以后有任何变动，只需要修改这个数组，全局自动同步刷新！ =====
    const GAMES_CONFIG = [
      { name: "🎮 游戏中心", url: "index.html" },
      { name: "🎡 大转盘", url: "lucky-wheel.html" },
      { name: "🎯 射击轮盘", url: "dart-wheel.html" },
      { name: "🥚 砸金蛋", url: "golden-egg.html" },
      { name: "🧧 抢红包", url: "red-envelope.html" }
    ];

    // 智能渲染和高亮导航
    function renderNavbar() {
      const navContainer = document.getElementById('navbarNav');
      const currentFile = window.location.pathname.split('/').pop() || "golden-egg.html";
      const urlParams = window.location.search; 

      let navHtml = "";
      GAMES_CONFIG.forEach(game => {
        const isActive = currentFile === game.url ? "class='active'" : "";
        navHtml += `<a href="${game.url}${urlParams}" ${isActive}>${game.name}</a>`;
      });
      navContainer.innerHTML = navHtml;
    }
    renderNavbar();

    // 手机端汉堡按钮绑定
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navbarNav = document.getElementById('navbarNav');
    mobileMenuBtn.onclick = () => {
      mobileMenuBtn.classList.toggle('open');
      navbarNav.classList.toggle('mobile-open');
    };

    // ===== 🎛️ 自动云同步：连接你的 Cloudflare Worker 完整真实 API 地址 =====
    const GLOBAL_API_URL = "https://game.hahagw2023.workers.dev/";

    async function syncMerchantCloudConfig() {
      const urlParams = new URLSearchParams(window.location.search);
      const mId = urlParams.get('m');
      if (!mId) return;

      try {
        const res = await fetch(GLOBAL_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ merchant_id: mId, game_id: "golden-egg" })
        });
        const result = await res.json();

        if (res.ok && result.success && result.data) {
          const info = result.data;

          // 1. 静默灌注云端游戏参数
          if (info.game_custom_settings) {
            const settings = JSON.parse(info.game_custom_settings);
            if(document.getElementById('totalAmount')) document.getElementById('totalAmount').value = settings.totalAmount || 50;
            if(document.getElementById('minAmount')) document.getElementById('minAmount').value = settings.minAmount || 2;
            if(document.getElementById('maxAmount')) document.getElementById('maxAmount').value = settings.maxAmount || 10;
            if(document.getElementById('eggCount')) document.getElementById('eggCount').value = settings.eggCount || 9;
            if(document.getElementById('limitCount')) document.getElementById('limitCount').value = settings.limitCount || 3;
            // 重新初始化触发抓取
            initGame();
          }

          // 2. 刷新专属商家LOGO与品牌
          document.getElementById('shell-brand-name').innerText = info.merchant_name || "游戏中心";
          document.getElementById('shell-game-title').innerText = `🥚 ${info.merchant_name || ''}·专属砸金蛋`;

          // 3. 引流项卡片动态渲染
          if (info.contact_info) {
            const metaObj = JSON.parse(info.contact_info);
            let metaHtml = `<div class="merchant-display-card">`;
            for (const [key, value] of Object.entries(metaObj)) {
              metaHtml += `<div class="merchant-meta-item"><b>${key}：</b>${value}</div>`;
            }
            if (info.qr_code) {
              metaHtml += `<div class="merchant-meta-item"><img src="${info.qr_code}" style="width:45px;height:45px;vertical-align:middle;border-radius:4px;margin-left:8px;"></div>`;
            }
            metaHtml += `</div>`;
            document.getElementById('shell-merchant-dynamic-card').innerHTML = metaHtml;
          }
        }
      } catch (e) {
        console.error("🔒 后端未响应，自动切换为默认本地数据静默驱动:", e);
      }
    }

    // ===== 🔉 音频上下文 & 核心原生游戏逻辑 =====
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      if (type === 'smash') {
        const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
        osc1.type = 'sine'; osc1.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain1.gain.setValueAtTime(0.6, audioCtx.currentTime); gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(); osc1.stop(audioCtx.currentTime + 0.1);

        const bufferSize = audioCtx.sampleRate * 0.2; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) { data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.05)); }
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 2000;
        const noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noise.start();
      } else if (type === 'end') {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      }
    }

    let gameState = { prizes: [], remainingSmashes: 0, wonAmount: 0, isProcessing: false, maxAmount: 0, minAmount: 0 };

    function distributePrizes(count, total, min, max) {
      if (count * min > total || count * max < total) return null;
      let result = []; let remaining = total;
      for (let i = 0; i < count - 1; i++) {
        let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
        let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
        let amount = Math.random() * (currentMax - currentMin) + currentMin;
        amount = Math.round(amount * 100) / 100; result.push(amount); remaining -= amount;
      }
      result.push(Math.round(remaining * 100) / 100);
      for (let i = result.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [result[i], result[j]] = [result[j], result[i]]; }
      return result;
    }

    function initGame() {
      stopGoldRain();
      const board = document.getElementById('mainBoard');
      board.classList.remove('led-active');
      board.innerHTML = `<input type="number" id="totalAmount" value="${document.getElementById('totalAmount').value}"><input type="number" id="minAmount" value="${document.getElementById('minAmount').value}"><input type="number" id="maxAmount" value="${document.getElementById('maxAmount').value}"><input type="number" id="eggCount" value="${document.getElementById('eggCount').value}"><input type="number" id="limitCount" value="${document.getElementById('limitCount').value}">`;

      const eggCount = parseInt(document.getElementById('eggCount').value) || 9;
      const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 50;
      const minAmount = parseFloat(document.getElementById('minAmount').value) || 2;
      const maxAmount = parseFloat(document.getElementById('maxAmount').value) || 10;
      const limitCount = parseInt(document.getElementById('limitCount').value) || 3;

      const prizes = distributePrizes(eggCount, totalAmount, minAmount, maxAmount);
      if (!prizes) return;

      gameState.prizes = prizes;
      gameState.remainingSmashes = Math.min(limitCount, eggCount);
      gameState.wonAmount = 0;
      gameState.isProcessing = false;
      gameState.maxAmount = maxAmount;
      gameState.minAmount = minAmount;

      updateStats();
      renderEggs();
    }

    function renderEggs() {
      const grid = document.getElementById('eggGrid'); grid.innerHTML = '';
      gameState.prizes.forEach((prize, index) => {
        const container = document.createElement('div'); container.className = 'egg-container'; container.id = `egg-${index}`;
        container.onclick = () => smashEgg(index, container);
        container.innerHTML = `<div class="egg-shadow"></div><div class="egg"></div><div class="prize-label">￥${prize.toFixed(2)}</div>`;
        grid.appendChild(container);
      });
    }

    function smashEgg(index, container) {
      if (gameState.remainingSmashes <= 0 || gameState.isProcessing || container.classList.contains('smashed')) return;
      gameState.isProcessing = true; playSound('smash');
      const eggEl = container.querySelector('.egg'); eggEl.classList.add('broken'); container.classList.add('smashed');
      createFragments(eggEl, container);
      gameState.remainingSmashes--; gameState.wonAmount += gameState.prizes[index];
      updateStats();
      setTimeout(() => { gameState.isProcessing = false; if (gameState.remainingSmashes === 0) endGameAndRevealOthers(); }, 300);
    }

    function createFragments(eggEl, container) {
      const rect = eggEl.getBoundingClientRect(); const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
      for (let i = 0; i < 15; i++) {
        const frag = document.createElement('div'); frag.className = 'egg-fragment'; const size = Math.random() * 15 + 5;
        frag.style.width = size + 'px'; frag.style.height = size + 'px'; frag.style.background = 'radial-gradient(circle at 35% 30%, #fff380, #f7b801)';
        frag.style.left = centerX + 'px'; frag.style.top = centerY + 'px'; frag.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        const tx = (Math.random() - 0.5) * 400; const ty = (Math.random() - 0.5) * 400; const tr = Math.random() * 720;
        frag.style.setProperty('--tx', `${tx}px`); frag.style.setProperty('--ty', `${ty}px`); frag.style.setProperty('--tr', `${tr}deg`);
        frag.style.animation = `fragment-fly ${Math.random() * 0.5 + 0.5}s ease-out forwards`; document.body.appendChild(frag);
        setTimeout(() => frag.remove(), 1000);
      }
    }

    // 🏆 游戏结束：彻底干掉原本的累赘“🎉砸蛋结束！”提示，原地激活华丽 LED 战报与全屏雨
    function endGameAndRevealOthers() {
      gameState.isProcessing = true;
      document.getElementById('statusText').innerHTML = ""; // 3、彻底删除冗余纯文字
      playSound('end');

      const board = document.getElementById('mainBoard');
      board.classList.add('led-active');
      board.innerHTML = `
        <div class="led-content">
          <div class="led-title">🎰 🔴 FINAL REPORT 🔴 🎰</div>
          <div class="led-result">终极战报：￥${gameState.wonAmount.toFixed(2)}</div>
        </div>
      `;

      startGoldRain();
      gameState.prizes.forEach((_, index) => {
        const container = document.getElementById(`egg-${index}`);
        if (!container.classList.contains('smashed')) { container.classList.add('smashed', 'dimmed'); container.onclick = null; }
      });
    }

    function updateStats() {
      document.getElementById('remainingSmashes').innerText = gameState.remainingSmashes;
      document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
    }

    // ===== 🌧️ 金色雨满屏 Canvas 引擎 =====
    const canvas = document.getElementById('goldRainCanvas'); const ctx = canvas.getContext('2d');
    let animationFrameId = null; let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    class GoldParticle {
      constructor() { this.reset(); this.y = Math.random() * canvas.height; }
      reset() {
        this.x = Math.random() * canvas.width; this.y = -50; this.size = Math.random() * 12 + 8; this.speedY = Math.random() * 3 + 2; this.speedX = (Math.random() - 0.5) * 1;
        this.type = Math.random() > 0.4 ? 'number' : 'dice'; this.text = this.type === 'number' ? Math.floor(Math.random() * 10).toString() : '🎲';
        this.opacity = Math.random() * 0.4 + 0.3; this.angle = Math.random() * Math.PI * 2; this.spinSpeed = (Math.random() - 0.5) * 0.05;
      }
      update() { this.y += this.speedY; this.x += this.speedX; this.angle += this.spinSpeed; if (this.y > canvas.height + 20) this.reset(); }
      draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.globalAlpha = this.opacity; ctx.shadowBlur = 10; ctx.shadowColor = '#fcd34d'; ctx.fillStyle = '#f7b801';
        if (this.type === 'number') { ctx.font = `bold ${this.size}px Arial`; ctx.fillText(this.text, 0, 0); } 
        else { ctx.font = `${this.size + 4}px Arial`; ctx.fillText(this.text, -this.size/2, this.size/2); }
        ctx.restore();
      }
    }

    function startGoldRain() {
      stopGoldRain(); particles = []; const particleCount = Math.min(120, Math.floor(canvas.width / 10));
      for (let i = 0; i < particleCount; i++) particles.push(new GoldParticle());
      function loop() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); animationFrameId = requestAnimationFrame(loop); }
      loop();
    }
    function stopGoldRain() { if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; } ctx.clearRect(0, 0, canvas.width, canvas.height); }

    window.onload = () => {
      initGame();
      syncMerchantCloudConfig(); // 载入云端商户数据
    };
  </script>
</body>
</html>
