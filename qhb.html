<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧧 疯狂抢红包 V2 - 智能重力雨阵</title>
  <style>
    :root {
      --red-primary: #ff1744;
      --red-dark: #d50000;
      --gold: #ffd700;
      --gold-light: #ffed4e;
      --dark-bg: #1a1a2e;
      --light-text: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: #000;
      color: var(--light-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 900px;
      height: 100vh;
      background: linear-gradient(180deg, #1a1a2e 0%, #000000 100%);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ===== 顶部信息区 ===== */
    .header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      z-index: 100;
    }

    .stat-group {
      display: flex;
      gap: 20px;
    }

    .stat-box {
      text-align: left;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #aaa;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--gold-light);
    }

    .combo-tag {
      background: var(--red-primary);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-left: 5px;
      display: none;
    }

    /* ===== 游戏核心区 ===== */
    .game-area {
      flex: 1;
      position: relative;
      width: 100%;
      cursor: crosshair;
    }

    /* 红包样式 */
    .envelope {
      position: absolute;
      width: 50px;
      height: 65px;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      will-change: transform;
    }

    .envelope-inner {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--red-primary), var(--red-dark));
      border-radius: 6px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .envelope-inner::after {
      content: '¥';
      color: var(--gold-light);
      font-weight: 900;
      font-size: 1.2rem;
    }

    /* 锦鲤红包特殊效果 */
    .envelope.mega .envelope-inner {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      box-shadow: 0 0 15px var(--gold);
      border: 2px solid #fff;
    }

    .envelope.mega .envelope-inner::after {
      content: '💰';
      font-size: 1.5rem;
    }

    /* 击中动效 */
    .envelope.hit {
      animation: hitAnim 0.3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes hitAnim {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* 浮动文字 */
    .float-text {
      position: absolute;
      font-weight: 900;
      color: var(--gold-light);
      pointer-events: none;
      z-index: 50;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-80px); opacity: 0; }
    }

    /* ===== 底部控制区 (包含倒计时) ===== */
    .footer {
      padding: 20px;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .main-btn {
      width: 100%;
      max-width: 350px;
      height: 60px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, var(--red-primary), var(--red-dark));
      color: white;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(255, 23, 68, 0.4);
    }

    .main-btn:disabled {
      cursor: default;
      background: #333;
    }

    /* 按钮内的倒计时进度条 */
    .btn-progress {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: rgba(255, 215, 0, 0.3);
      width: 0%;
      transition: width 1s linear;
    }

    .btn-content {
      position: relative;
      z-index: 2;
    }

    /* 游戏结束结算 */
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      backdrop-filter: blur(10px);
    }

    .overlay.active { display: flex; }

    .result-card {
      text-align: center;
      padding: 40px;
      border: 2px solid var(--gold);
      border-radius: 20px;
      background: #1a1a2e;
    }

    .result-title { font-size: 2rem; color: var(--gold); margin-bottom: 20px; }
    .result-score { font-size: 4rem; font-weight: 900; color: #fff; margin-bottom: 10px; }
    .result-detail { color: #aaa; margin-bottom: 30px; }

    /* 响应式 */
    @media (max-width: 600px) {
      .stat-value { font-size: 1.1rem; }
      .main-btn { height: 50px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部状态栏 -->
    <div class="header">
      <div class="stat-group">
        <div class="stat-box">
          <div class="stat-label">累计金额</div>
          <div class="stat-value">¥<span id="score">0.00</span></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">抢到数量</div>
          <div class="stat-value"><span id="count">0</span><span id="comboTag" class="combo-tag">Combo x1</span></div>
        </div>
      </div>
      <div class="stat-box" style="text-align: right;">
        <div class="stat-label">最高纪录</div>
        <div class="stat-value" style="color: #888;">¥<span id="bestScore">0.00</span></div>
      </div>
    </div>

    <!-- 游戏主舞台 -->
    <div class="game-area" id="gameArea"></div>

    <!-- 底部控制按钮 (集成倒计时) -->
    <div class="footer">
      <button class="main-btn" id="mainBtn" onclick="handleMainButtonClick()">
        <div class="btn-progress" id="btnProgress"></div>
        <span class="btn-content" id="btnText">🚀 开始疯狂抢红包</span>
      </button>
    </div>

    <!-- 结算层 -->
    <div class="overlay" id="overlay">
      <div class="result-card">
        <div class="result-title">🧧 恭喜发财</div>
        <div class="result-score">¥<span id="finalScore">0.00</span></div>
        <div class="result-detail">
          共抢到 <span id="finalCount">0</span> 个红包<br>
          最高连击 ×<span id="finalCombo">1</span>
        </div>
        <button class="main-btn" onclick="resetGame()" style="max-width: 200px;">再来一次</button>
      </div>
    </div>
  </div>

  <script>
    /* ===== 核心逻辑 ===== */
    const gameArea = document.getElementById('gameArea');
    const mainBtn = document.getElementById('mainBtn');
    const btnProgress = document.getElementById('btnProgress');
    const btnText = document.getElementById('btnText');
    const scoreDisplay = document.getElementById('score');
    const countDisplay = document.getElementById('count');
    const comboTag = document.getElementById('comboTag');

    let state = {
      active: false,
      score: 0,
      count: 0,
      combo: 0,
      lastHitTime: 0,
      maxCombo: 0,
      timeLeft: 30,
      bestScore: localStorage.getItem('redRainBest') || 0
    };

    document.getElementById('bestScore').textContent = parseFloat(state.bestScore).toFixed(2);

    function handleMainButtonClick() {
      if (!state.active) {
        startGame();
      }
    }

    function startGame() {
      state.active = true;
      state.score = 0;
      state.count = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.timeLeft = 30;
      
      updateDisplay();
      mainBtn.disabled = true;
      btnProgress.style.transition = 'none';
      btnProgress.style.width = '0%';
      
      // 启动视觉倒计时
      setTimeout(() => {
        btnProgress.style.transition = 'width 30s linear';
        btnProgress.style.width = '100%';
      }, 50);

      // 游戏主循环
      const gameTimer = setInterval(() => {
        state.timeLeft--;
        btnText.textContent = `⏱️ 剩余时间: ${state.timeLeft}s`;
        
        if (state.timeLeft <= 0) {
          clearInterval(gameTimer);
          endGame();
        }
      }, 1000);

      spawnLoop();
    }

    function spawnLoop() {
      if (!state.active) return;

      // 智能生成逻辑：根据时间推移增加密度
      const density = 1 + (30 - state.timeLeft) * 0.1; 
      const spawnCount = Math.floor(Math.random() * density) + 1;

      for(let i=0; i<spawnCount; i++) {
        createEnvelope();
      }

      // 随机间隔，营造“阵雨”感
      const nextSpawn = 150 + Math.random() * 300;
      setTimeout(spawnLoop, nextSpawn);
    }

    function createEnvelope() {
      const envelope = document.createElement('div');
      
      // 随机权重分配：85%普通，15%大红包
      const isMega = Math.random() > 0.85;
      envelope.className = 'envelope' + (isMega ? ' mega' : '');
      
      const inner = document.createElement('div');
      inner.className = 'envelope-inner';
      envelope.appendChild(inner);

      // 随机水平位置 (0-100%)
      const left = Math.random() * (gameArea.clientWidth - 50);
      envelope.style.left = left + 'px';
      envelope.style.top = '-80px';

      // 物理属性：金额越大下落越快
      // 普通：0.1-1.0元；大红包：5-50元
      const amount = isMega ? (Math.random() * 45 + 5) : (Math.random() * 0.9 + 0.1);
      
      // 下落速度逻辑：基础速度 + (金额/权重)
      // 金额越大，速度增量越多
      const baseSpeed = 3 + Math.random() * 2;
      const weightBonus = isMega ? (amount / 10) : (amount * 2);
      const totalSpeed = baseSpeed + weightBonus;

      gameArea.appendChild(envelope);

      // 动画处理
      let currentTop = -80;
      const fall = () => {
        if (!state.active && !envelope.classList.contains('hit')) {
          envelope.remove();
          return;
        }

        currentTop += totalSpeed;
        envelope.style.transform = `translateY(${currentTop}px) rotate(${(currentTop/5)%10 - 5}deg)`;

        if (currentTop > gameArea.clientHeight) {
          envelope.remove();
        } else if (envelope.parentElement) {
          requestAnimationFrame(fall);
        }
      };

      envelope.onclick = (e) => {
        e.stopPropagation();
        hitEnvelope(envelope, amount);
      };

      requestAnimationFrame(fall);
    }

    function hitEnvelope(el, amt) {
      if (el.classList.contains('hit')) return;
      el.classList.add('hit');

      // 连击逻辑 (0.8秒内连续点击)
      const now = Date.now();
      if (now - state.lastHitTime < 800) {
        state.combo++;
      } else {
        state.combo = 1;
      }
      state.lastHitTime = now;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;

      // 最终收益计算：基础金额 * (1 + 连击奖励)
      const bonus = 1 + (state.combo * 0.1);
      const finalAmt = amt * bonus;

      state.score += finalAmt;
      state.count++;

      // 视觉反馈
      showFloatText(el.offsetLeft, el.offsetTop, `+¥${finalAmt.toFixed(2)}`);
      updateDisplay();

      setTimeout(() => el.remove(), 300);
    }

    function showFloatText(x, y, text) {
      const ft = document.createElement('div');
      ft.className = 'float-text';
      ft.style.left = x + 'px';
      ft.style.top = y + 'px';
      ft.textContent = text;
      gameArea.appendChild(ft);
      setTimeout(() => ft.remove(), 800);
    }

    function updateDisplay() {
      scoreDisplay.textContent = state.score.toFixed(2);
      countDisplay.textContent = state.count;
      
      if (state.combo > 1) {
        comboTag.style.display = 'inline-block';
        comboTag.textContent = `Combo x${state.combo}`;
        comboTag.style.transform = 'scale(1.3)';
        setTimeout(() => comboTag.style.transform = 'scale(1)', 100);
      } else {
        comboTag.style.display = 'none';
      }
    }

    function endGame() {
      state.active = false;
      if (state.score > state.bestScore) {
        state.bestScore = state.score;
        localStorage.setItem('redRainBest', state.score);
        document.getElementById('bestScore').textContent = state.score.toFixed(2);
      }

      document.getElementById('finalScore').textContent = state.score.toFixed(2);
      document.getElementById('finalCount').textContent = state.count;
      document.getElementById('finalCombo').textContent = state.maxCombo;
      document.getElementById('overlay').classList.add('active');
    }

    function resetGame() {
      document.getElementById('overlay').classList.remove('active');
      gameArea.innerHTML = '';
      btnText.textContent = '🚀 开始疯狂抢红包';
      btnProgress.style.width = '0%';
      mainBtn.disabled = false;
      state.score = 0;
      state.count = 0;
      updateDisplay();
    }
  </script>
</body>
</html>
