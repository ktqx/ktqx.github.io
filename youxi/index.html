<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>加载中... - 营销聚能核心</title>
  <link rel="stylesheet" href="css/shell.css">
</head>
<body>

  <nav class="navbar">
    <a href="#" class="navbar-logo"><span id="shell-logo">🎮</span> <span id="shell-merchant-name">游戏中心</span></a>
    <div class="navbar-spacer"></div>
    <div class="navbar-nav" id="shell-contact-nav">
      </div>
  </nav>

  <div class="marquee-report-panel" id="shellLedPanel">
    <div class="report-item">
      <div class="report-title">🎉 实时战报</div>
      <div style="font-size: 0.85rem; font-weight: 800; color: #ff4757;" id="ledStatus">活动火热进行中</div>
    </div>
    <div class="report-item">
      <div class="report-title">🔥 刚刚产出</div>
      <div class="report-val-big gold" id="ledPrize">等待开奖...</div>
    </div>
  </div>

  <div id="game-container-slot"></div>

  <canvas id="gold-rain-canvas" style="display:none; position:fixed; top:0; left:0; pointer-events:none; z-index:999;"></canvas>

  <script type="module">
    import { initLedBoard, updateLed } from './modules/led-board.js';
    import { startGoldRain, stopGoldRain } from './modules/gold-rain.js';

    // 你的 Cloudflare Worker 免费后端接口地址
    const CF_API = "https://marketing-game-worker.hahagw2023.workers.dev";

    // 1. 解析 URL 积木参数
    const urlParams = new URLSearchParams(window.location.search);
    const activityId = urlParams.get('activityId'); // 商家专属活动ID
    const gameType = urlParams.get('game') || 'wheel'; // 游戏类型：wheel 或 flip

    if (!activityId) {
      document.body.innerHTML = "<h2 style='text-align:center;padding-top:100px;'>❌ 链接无效：缺少商家活动凭证</h2>";
      throw new Error("Missing activityId");
    }

    // 2. 核心流：从 Cloudflare 读取该商家的定制数据
    async function bootShell() {
      try {
        const response = await fetch(`${CF_API}/api/get-activity?activityId=${activityId}`);
        const activeConfig = await response.json();

        // 3. 动态配置外壳（换皮肤和名称）
        document.title = activeConfig.merchantName + " 的专属活动";
        document.getElementById('shell-merchant-name').innerText = activeConfig.merchantName;
        if(activeConfig.merchantLogo) document.getElementById('shell-logo').innerText = activeConfig.merchantLogo;
        
        // 动态注入商家联系方式到导航栏
        document.getElementById('shell-contact-nav').innerHTML = `
          <a href="tel:${activeConfig.contactPhone || ''}" class="active">📞 联系商家: ${activeConfig.contactPhone || '暂无'}</a>
        `;

        // 4. 启动公共战报积木
        initLedBoard(CF_API, activityId);

        // 5. 【核心操作】像搭积木一样，动态加载游戏主体
        await mountGameComponent(gameType, activeConfig.gameSettings);

      } catch (err) {
        console.error("初始化外壳失败:", err);
      }
    }

    // 插拔积木的调度函数
    async function mountGameComponent(type, settings) {
      const slot = document.getElementById('game-container-slot');
      slot.innerHTML = ''; // 清空上一个游戏的主体

      try {
        // 动态加载对应目录下的游戏逻辑积木
        const gameModule = await import(`./games/${type}/game.js`);
        
        // 运行游戏主体的初始化，并把商家的定制参数、以及“游戏结束”的回调传给它
        gameModule.init(slot, settings, async (gameResult) => {
          
          // 统一触发黄金雨公共积木
          startGoldRain();
          
          // 统一更新 LED 战报公共积木
          updateLed(gameResult);

          // 统一上报中奖数据给 Cloudflare 数据库
          await fetch(`${CF_API}/api/submit-log`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ activityId, prize: gameResult, user: '用户_' + Math.floor(Math.random()*9000) })
          });
        });
      } catch (e) {
        slot.innerHTML = `<p style='text-align:center;color:red;'>加载游戏积木 [${type}] 失败</p>`;
        console.error(e);
      }
    }

    // 启动外壳
    bootShell();
  </script>
</body>
</html>
