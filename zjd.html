<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运砸金蛋 - 华丽版</title>
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --bg-color: #f0f2f5;
            --primary-color: #ff4d4f;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: radial-gradient(circle, #2c3e50, #000);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        /* 配置面板 */
        .config-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .config-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .config-item label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #ccc;
        }

        .config-item input {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 100px;
        }

        .btn-start {
            padding: 10px 30px;
            background: linear-gradient(to bottom, #ff4d4f, #cf1322);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
            align-self: center;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 77, 79, 0.5);
        }

        /* 游戏区域 */
        .game-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            perspective: 1000px;
            min-height: 300px;
            padding: 40px;
        }

        .egg-wrapper {
            position: relative;
            width: 120px;
            height: 160px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .egg-wrapper:hover {
            transform: translateY(-10px);
        }

        .egg {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #fff7ad, #ffd700, #b8860b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .egg.broken {
            background: none !important;
            box-shadow: none;
            cursor: default;
        }

        /* 碎片效果 */
        .egg-fragment {
            position: absolute;
            background: var(--gold);
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        @keyframes fragment-fly {
            0% { transform: translate(0, 0) rotate(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
        }

        /* 奖项展示 */
        .prize-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff4d4f;
            text-shadow: 0 0 10px #fff;
            white-space: nowrap;
            z-index: 10;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .egg-wrapper.is-broken .prize-label {
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 状态统计 */
        .stats {
            margin-top: 40px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 30px;
            color: #ddd;
        }

        .stat-val {
            color: var(--gold);
            font-weight: bold;
            font-size: 1.5rem;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 77, 79, 0.9);
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: bold;
        }

        /* 锤子动画 */
        .hammer {
            position: fixed;
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 100;
            display: none;
            transform-origin: bottom right;
        }

        @keyframes hammer-hit {
            0% { transform: rotate(45deg); }
            50% { transform: rotate(-30deg); }
            100% { transform: rotate(45deg); }
        }

        .hit-anim {
            animation: hammer-hit 0.3s ease-out;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>幸运砸金蛋</h1>

        <div class="config-panel">
            <div class="config-item">
                <label>金蛋总数</label>
                <input type="number" id="eggCount" value="9" min="1" max="30">
            </div>
            <div class="config-item">
                <label>活动总额</label>
                <input type="number" id="totalAmount" value="60" min="1">
            </div>
            <div class="config-item">
                <label>最小金额</label>
                <input type="number" id="minAmount" value="3" step="0.1">
            </div>
            <div class="config-item">
                <label>最大金额</label>
                <input type="number" id="maxAmount" value="20" step="0.1">
            </div>
            <div class="config-item">
                <label>可砸个数</label>
                <input type="number" id="limitCount" value="3" min="1">
            </div>
            <button class="btn-start" onclick="initGame()">重新开始</button>
        </div>

        <div class="stats">
            <div>剩余机会: <span id="remainingClicks" class="stat-val">0</span></div>
            <div>已中奖总额: <span id="wonAmount" class="stat-val">0.00</span></div>
        </div>

        <div id="gameBoard" class="game-board">
            <!-- 金蛋将在这里生成 -->
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- 锤子图标 (SVG) -->
    <svg id="hammer" class="hammer" viewBox="0 0 512 512">
        <path fill="#8B4513" d="M448 320l-96-96-256 256 96 96z"/>
        <path fill="#708090" d="M480 32l-224 224 96 96 224-224z"/>
        <path fill="#A9A9A9" d="M416 0l-160 160 96 96 160-160z"/>
    </svg>

    <!-- 音效模拟 (使用 Web Audio API) -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBreakSound() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);

            // 增加一点高频碎裂感
            const noise = audioCtx.createOscillator();
            noise.type = 'square';
            noise.frequency.setValueAtTime(1000, audioCtx.currentTime);
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.05);
        }

        let gameState = {
            prizes: [],
            remainingClicks: 0,
            wonAmount: 0,
            isProcessing: false
        };

        function distributePrizes(count, total, min, max) {
            if (count * min > total) {
                showToast("错误：总额不足以支撑最小金额设定");
                return null;
            }
            if (count * max < total) {
                showToast("错误：总额超出了最大金额设定的上限");
                return null;
            }

            let result = [];
            let remaining = total;
            
            for (let i = 0; i < count - 1; i++) {
                let currentMax = Math.min(max, remaining - (count - 1 - i) * min);
                let currentMin = Math.max(min, remaining - (count - 1 - i) * max);
                
                // 智能随机：在允许范围内进行随机，增加波动性
                let amount = Math.random() * (currentMax - currentMin) + currentMin;
                amount = Math.round(amount * 100) / 100;
                
                result.push(amount);
                remaining -= amount;
            }
            
            result.push(Math.round(remaining * 100) / 100);
            
            // 洗牌
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            
            return result;
        }

        function initGame() {
            const eggCount = parseInt(document.getElementById('eggCount').value);
            const totalAmount = parseFloat(document.getElementById('totalAmount').value);
            const minAmount = parseFloat(document.getElementById('minAmount').value);
            const maxAmount = parseFloat(document.getElementById('maxAmount').value);
            const limitCount = parseInt(document.getElementById('limitCount').value);

            const prizes = distributePrizes(eggCount, totalAmount, minAmount, maxAmount);
            if (!prizes) return;

            gameState.prizes = prizes;
            gameState.remainingClicks = Math.min(limitCount, eggCount);
            gameState.wonAmount = 0;
            gameState.isProcessing = false;

            updateStats();
            renderEggs();
        }

        function renderEggs() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            gameState.prizes.forEach((prize, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'egg-wrapper';
                wrapper.onclick = (e) => breakEgg(index, wrapper, e);
                
                wrapper.innerHTML = `
                    <div class="egg" id="egg-${index}"></div>
                    <div class="prize-label">￥${prize.toFixed(2)}</div>
                `;
                board.appendChild(wrapper);
            });
        }

        function breakEgg(index, wrapper, event) {
            if (gameState.remainingClicks <= 0 || gameState.isProcessing) {
                if (gameState.remainingClicks <= 0) showToast("没有剩余次数了！");
                return;
            }
            
            const egg = wrapper.querySelector('.egg');
            if (egg.classList.contains('broken')) return;

            gameState.isProcessing = true;
            
            // 锤子定位
            const hammer = document.getElementById('hammer');
            hammer.style.display = 'block';
            hammer.style.left = (event.clientX - 40) + 'px';
            hammer.style.top = (event.clientY - 40) + 'px';
            hammer.classList.add('hit-anim');

            setTimeout(() => {
                playBreakSound();
                createFragments(wrapper);
                egg.classList.add('broken');
                wrapper.classList.add('is-broken');
                
                gameState.remainingClicks--;
                gameState.wonAmount += gameState.prizes[index];
                updateStats();
                
                // 震动
                wrapper.style.transform = 'scale(0.9) translateY(5px)';
                
                setTimeout(() => {
                    wrapper.style.transform = '';
                    hammer.classList.remove('hit-anim');
                    hammer.style.display = 'none';
                    gameState.isProcessing = false;
                    
                    if (gameState.remainingClicks === 0) {
                        setTimeout(() => showToast(`恭喜！共获得 ￥${gameState.wonAmount.toFixed(2)}`), 500);
                    }
                }, 200);
            }, 150);
        }

        function createFragments(container) {
            const fragmentCount = 20;
            const colors = ['#ffd700', '#fff7ad', '#b8860b', '#fdf5e6'];
            for (let i = 0; i < fragmentCount; i++) {
                const frag = document.createElement('div');
                frag.className = 'egg-fragment';
                
                const size = Math.random() * 12 + 4;
                frag.style.width = size + 'px';
                frag.style.height = size + 'px';
                frag.style.left = '50%';
                frag.style.top = '50%';
                frag.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                frag.style.clipPath = `polygon(${Math.random()*100}% ${Math.random()*100}%, ${Math.random()*100}% ${Math.random()*100}%, ${Math.random()*100}% ${Math.random()*100}%)`;
                
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400 - 100;
                const tr = Math.random() * 1080;
                
                frag.style.setProperty('--tx', `${tx}px`);
                frag.style.setProperty('--ty', `${ty}px`);
                frag.style.setProperty('--tr', `${tr}deg`);
                
                frag.style.animation = `fragment-fly ${Math.random() * 0.6 + 0.4}s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
                
                container.appendChild(frag);
                setTimeout(() => frag.remove(), 1000);
            }
        }

        function updateStats() {
            document.getElementById('remainingClicks').innerText = gameState.remainingClicks;
            document.getElementById('wonAmount').innerText = gameState.wonAmount.toFixed(2);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 3000);
        }

        window.onload = initGame;
    </script>
</body>
</html>
