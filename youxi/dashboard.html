<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>营销王 - 商家自主配置后台</title>
  <style>
    body { font-family: sans-serif; background: #f3f4f6; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { border-bottom: 2px solid #3b82f6; padding-bottom: 10px; color: #1e3a8a; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; }
    input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
    .btn { background: #3b82f6; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; }
    .btn:hover { background: #2563eb; }
    .result-box { margin-top: 25px; padding: 15px; background: #ecfdf5; border: 1px solid #10b981; border-radius: 8px; display: none; }
    .link-text { word-break: break-all; font-weight: bold; color: #059669; margin: 10px 0; }
    .game-options { border-left: 4px solid #10b981; padding-left: 15px; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>🎪 商家专属促销游戏一键配置中心</h2>
  
  <div class="form-group">
    <label>1. 商家店面/活动名称：</label>
    <input type="text" id="merchantName" placeholder="例如：星巴克(五道口店)夏季狂欢派对">
  </div>

  <div class="form-group">
    <label>2. 商家联系电话（展示在活动顶端）：</label>
    <input type="text" id="contactPhone" placeholder="请输入您的服务热线或手机号">
  </div>

  <div class="form-group">
    <label>3. 挑选促销游戏积木：</label>
    <select id="gameType" onchange="toggleGameSettings()">
      <option value="wheel">🎡 幸运蓄力大转盘</option>
      <option value="flip">🎰 狂欢九宫格翻翻乐</option>
    </select>
  </div>

  <div id="wheelSettings" class="game-options" style="display: block;">
    <label>转盘等分配置 (多个奖品用逗号隔开)：</label>
    <input type="text" id="wheelPrizes" value="一等奖,谢谢参与,二等奖,再来一次,特等奖,未中奖">
  </div>

  <div id="flipSettings" class="game-options">
    <label>每张卡片随机金额范围 (元)：</label>
    <div style="display:flex; gap:10px;">
      <input type="number" id="flipMin" value="0.5" step="0.1" placeholder="最低">
      <input type="number" id="flipMax" value="8.8" step="0.1" placeholder="最高">
    </div>
  </div>

  <button class="btn" onclick="generatePromotionLink()">⚡ 一键发布并生成专属促销链接</button>

  <div class="result-box" id="resultBox">
    <span style="font-weight: bold; color: #065f46;">🎉 发布成功！您的专属促销游戏链接已上线：</span>
    <div class="link-text" id="linkText"></div>
    <p style="font-size:0.85rem; color:#6b7280;">您可以直接复制此链接分发给您的微信客户、打印成二维码贴在收银台、或者插入公众号推文中。</p>
  </div>
</div>

<script>
  const CF_API = "https://your-worker.yourname.workers.dev"; // 部署的 Cloudflare Worker 后端地址

  function toggleGameSettings() {
    const type = document.getElementById('gameType').value;
    document.getElementById('wheelSettings').style.display = type === 'wheel' ? 'block' : 'none';
    document.getElementById('flipSettings').style.display = type === 'flip' ? 'block' : 'none';
  }

  async function generatePromotionLink() {
    const merchantName = document.getElementById('merchantName').value.trim();
    const contactPhone = document.getElementById('contactPhone').value.trim();
    const gameType = document.getElementById('gameType').value;

    if(!merchantName) {
      alert("请输入您的店铺活动名称！");
      return;
    }

    // 拼装商家对游戏的定制 JSON 配置参数
    let gameSettings = {};
    if(gameType === 'wheel') {
      const prizeArr = document.getElementById('wheelPrizes').value.split(',').map(p => p.trim());
      // 自动给转盘生成配色积木
      const colors = ["#ff6b35", "#004e89", "#f7b801", "#1a2332", "#d946ef", "#6b7280"];
      gameSettings.sectors = prizeArr.map((text, index) => ({
        text: text,
        color: colors[index % colors.length]
      }));
    } else if(gameType === 'flip') {
      gameSettings.minAmount = document.getElementById('flipMin').value;
      gameSettings.maxAmount = document.getElementById('flipMax').value;
      gameSettings.maxFlips = 3;
    }

    // 随机生成唯一的活动 ID 凭证
    const activityId = "act_" + Math.random().toString(36).substring(2, 10);

    // 发送给 Cloudflare 后端保存进 D1 数据库
    try {
      const res = await fetch(`${CF_API}/api/create-activity`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          activityId: activityId,
          merchantName: merchantName,
          contactPhone: contactPhone,
          gameType: gameType,
          gameSettings: gameSettings
        })
      });

      if(res.ok) {
        // 构建出指向你唯一的活动外壳 index.html 的链接
        const currentDomain = window.location.origin + window.location.pathname.replace('dashboard.html', 'index.html');
        const finalUrl = `${currentDomain}?activityId=${activityId}&game=${gameType}`;
        
        document.getElementById('linkText').innerText = finalUrl;
        document.getElementById('resultBox').style.display = 'block';
      } else {
        alert("Cloudflare 服务器响应失败");
      }
    } catch (e) {
      console.error(e);
      alert("提交失败，请检查您的 Cloudflare Worker 跨域设置或连接状态");
    }
  }
</script>
</body>
</html>
